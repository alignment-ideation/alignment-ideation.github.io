cy, response formatting, vocabulary diversity, confidence-qualifier rates. Compute each method's divergence from unmodified baseline. If divergence is near zero for all methods, response fingerprints are content-dependent and this line of defense is limited\u2014an important negative result.\n- Train a classifier predicting which jailbreak wrapper was used from benign-content responses only. Accuracy above 70% proves fingerprints are method-specific and content-independent; accuracy near chance bounds how much usable signal exists.\n- Transfer this benign-trained classifier to harmful-content jailbreak detection. High transfer accuracy validates the fingerprints as defense signals that don't require training on harmful data.\n\n---", "improved_text": "## C: Do Jailbreak Methods Leave Detectable Response Fingerprints Beyond Harmful Content?\n\n**Problem:** Jailbreak defenses detect harmful output content, not delivery-method artifacts. If methods also shift response style independently, that's a complementary detection signal.\n\n**Research Questions:**\n1. **Do jailbreak wrappers change how a model responds, not just what it says?** Applying persona injection or encoding tricks to benign prompts where the model complies anyway isolates method signal from content signal.\n2. **Do those style shifts survive when the model is actually producing harmful output?** The model generates differently when jailbroken \u2014 if benign-content fingerprints don't transfer there, this defense direction hits a ceiling.\n\n**Deliverable:** Per-method divergence measurements across benign and harmful content; transfer accuracy of a benign-trained jailbreak classifier; or a clean negative bounding this defense approach.\n\n**Approach:**\n- Four conditions using open-weight models (need safety-trained and base checkpoints): clean-benign, jailbreak-benign, base-harmful, jailbreak-harmful. Comparing base-harmful vs. jailbreak-harmful isolates method artifacts while controlling for content.\n- Critical control: structurally matched benign wrappers for each method (persona prompts without jailbreak framing, base64-encoded mundane text). No excess divergence over these means the signal is prompt complexity, not jailbreak-specific \u2014 the likeliest failure mode.\n- Logistic regression on sentence embeddings from benign pairs, transferred to harmful jailbreaks (HarmBench). Key metric: marginal recall at 1% FPR when fingerprint scores supplement a content classifier.\n- Single-turn methods only (DAN persona, base64, few-shot preamble, prefix injection) \u2014 multi-turn escalation lacks a clean benign analogue. Per-method breakdown matters more than the aggregate.", "selected_variation": 0, "selection_reason": "The four-condition factorial design (clean-benign, jailbreak-benign, base-harmful, jailbreak-harmful) is the most elegant way to isolate method signal from content signal, and the structurally matched benign-wrapper controls directly address the likeliest confound\u2014that any extra prompt complexity, not jailbreak-specific features, drives divergence. Scoping to single-turn methods with an honest justification for excluding multi-turn shows good experimental judgment.", "n_variations": 10, "title": "Isolating Jailbreak Style Fingerprints via Benign-Content Application"}, {"idea_id": "P70_R10_B", "original_text": "## B: Generation-Time Probes for \"Jailbroken Mode\" Distinct from Harmfulness\n\n**Problem:** Internal probes detect harmful content in activations; \"generating under jailbreak conditions\" may be a separable representational signal offering an independent detection channel.\n\n**Research Question:**\n**During output generation, does the model encode \"I was jailbroken into producing this\" as a direction orthogonal to \"this content is harmful\"?** Low cosine similarity between these probe directions would mean independent, complementary detectors.\n\n**Deliverable:** Measured orthogonality between jailbroken-mode and harmfulness probe directions across layers, with cross-attack-class generalization curves.\n\n**Approach:**\n- Extract per-token residual-stream activations during output generation under three matched conditions: jailbroken safety-tuned model producing harmful content, helpful-only variant (pre-safety base model) producing the same harmful content, and safety-tuned model on benign queries. The helpful-only condition is essential \u2014 it supplies harmful content without jailbreak context.\n- Train linear probes: jailbroken-vs-helpful-only captures the jailbreak signal; helpful-only-vs-benign captures harmfulness. Compute cosine similarity between weight vectors across layers. Low overlap is the core hypothesis \u2014 it means jailbroken-mode carries information content classifiers miss.\n- Test cross-attack generalization: train jailbroken-mode probes on persona-injection outputs, evaluate on encoding tricks and multi-turn escalation. The defense question is whether attacks that evade harmfulness probes still trigger jailbroken-mode probes, quantifying complementary detection.\n- Report ROC at <1% FPR. Per-token cost is one matrix multiply \u2014 if signal exists, this layers onto existing probe infrastructure at negligible overhead.", "improved_text": "## B: Jailbreak-Context vs. Harmful-Content Signals in Generation-Time Activations\n\n**Problem:** Content-based activation probes fail when jailbreaks obscure harmful output. A separable \"under adversarial manipulation\" signal could catch exactly those cases.\n\n**Research Questions:**\n1. **Does a safety-tuned model represent \"I'm being jailbroken\" separately from \"this content is harmful\"?** Train linear probes targeting each signal; measure cosine similarity between weight vectors across layers.\n2. **When the content signal fails, does the jailbreak signal still fire?** On attacks where a content probe has low confidence, measure whether a jailbreak-context probe adds recall.\n\n**Deliverable:** Orthogonality measurements between jailbreak-context and harmful-content probe directions; cross-attack generalization curves; complementarity analysis on content-probe-failing attacks, across \u22652 open-weight model families.\n\n**Approach:**\n- Three conditions on the *same* safety-tuned model: (A) jailbroken harmful generation, (B) prefill-forced to produce identical tokens without adversarial context, (C) benign. Prefill avoids probes learning \"base vs. safety-tuned model\" instead of \"jailbroken vs. not.\"\n- Content probe: B vs. C. Jailbreak-context probe: A vs. B. Linear probes on residual-stream activations at output positions; per-token cost is one matrix multiply if signal exists.\n- Train jailbreak-context probe on one attack class, evaluate on held-out classes. If it doesn't transfer, there's no unified \"manipulation mode\"\u2014a useful constraint on what activation-based defenses can achieve.\n- Filter to attacks where the content probe scores below threshold; measure jailbreak probe recall on this hard subset. This directly answers whether decomposing the two signals helps in practice.", "selected_variation": 1, "selection_reason": "The prefill-forced design (same tokens, same model, different input context) is the cleanest way to disentangle jailbreak-context from content signals, and every subsequent step\u2014orthogonality measurement, cross-attack generalization, complementarity on content-probe failures\u2014follows directly from that core choice with no extraneous pieces.", "n_variations": 10, "title": "Generation-Time Probes for \"Jailbroken Mode\" Distinct from Harmfulness"}, {"idea_id": "P70_R1_C", "original_text": "## C: Measuring Refusal Residue in Token Probabilities During Jailbroken Generation\n\n**Problem:** A jailbroken model fights its safety training while generating \u2014 this tension might leak into logprob distributions as elevated probability on refusal tokens, invisible in text but measurable.\n\n**Research Question:**\n**Does a jailbroken model assign more probability mass to refusal-associated tokens than a helpful-only model producing identical content?** This \"refusal residue\" would cost nothing to detect since logprobs are already computed during generation.\n\n**Deliverable:** Measured residue effect sizes per jailbreak method, a threshold detector, and evidence on which attack types eliminate vs. merely suppress safety-training tension.\n\n**Approach:**\n- Compare per-token logprob distributions from safety-trained Llama 3.1 70B under various jailbreaks against a helpful-only variant answering the same prompts. At each position, measure probability mass on a pre-compiled refusal-token set (\"sorry\", \"can't\", \"inappropriate\", common refusal phrases). The helpful-only model has no safety training creating residue \u2014 excess refusal probability in jailbroken outputs is the fingerprint.\n- Compare across jailbreak methods: persona injection (which overrides identity) may produce less residue than encoding tricks (which merely obfuscate the request). This reveals whether different attacks *convince* the model or *overpower* it \u2014 useful for understanding which attacks need which defenses.\n- Benchmark against text-only classifiers from Idea A's paradigm. If refusal tokens are elevated but never selected, text analysis cannot see this, making logprob detection strictly additive for those attack types.\n- Test whether residue persists at attack strengths that actually bypass content filters. Weak jailbreaks likely produce large residue, but the defense only matters for attacks strong enough to generate harmful outputs.\n\n---", "improved_text": "\n\n## C: Measuring Safety-Training Residue in Token Probabilities During Jailbroken Generation\n\n**Problem:** Jailbroken models may not fully override safety training \u2014 the residual tension could leak into logprob distributions as a free detection signal invisible to text-based filters.\n\n**Research Questions:**\n1. **At what jailbreak strength does the residue signal disappear?** If it only shows up for weak attacks already caught by output classifiers, it's not useful. The boundary relative to existing defenses is what matters.\n2. **Is the signal actually about jailbreaking, or just topic sensitivity?** Any dangerous-topic discussion might depress logprobs regardless of whether a jailbreak is involved \u2014 that confound needs to be ruled out before this is a real detector.\n\n**Deliverable:** Measured per-token residue effect sizes across jailbreak families and strengths, empirical detection curves (TPR at fixed FPR) on attacks that evade text-based classifiers, and evidence on which attack types suppress vs. genuinely overcome safety training.\n\n**Approach:**\n- Use constrained decoding on open-weight safety-trained models to force identical harmful response sequences under graded-strength jailbreaks, developer-level permission prompts, and the corresponding base model. Constrained decoding isolates per-token resistance from text variation \u2014 the core measurement problem. Developer-permitted is the right control because it holds safety training constant while removing the reason to refuse, unlike helpful-only baselines which differ in too many ways.\n- Measure log-probability of forced tokens, per-position entropy, and KL divergence against the developer-permitted baseline across the full vocabulary \u2014 avoiding the fragile step of pre-compiling a \"refusal token set\" that would conflate refusal with politeness.\n- Benchmark against a strong text-based output classifier: take jailbroken outputs it rates as clean, check whether residue scoring still flags them. This directly answers whether the signal is complementary.\n- Control for topic sensitivity by measuring residue on sensitive-but-permitted content (security research, medical procedures) to verify the signal tracks jailbreak status specifically. Validate constrained-decoding measurements against free-generation statistics on early tokens.", "selected_variation": 8, "selection_reason": "Its research questions cut to the two things that actually determine whether this idea works (strength threshold relative to existing defenses, and the topic-sensitivity confound), and the methodological choices are the most carefully justified \u2014 using developer-permitted prompts as the control (holds safety training constant while removing the reason to refuse) and constrained decoding to force identical sequences are both cleaner solutions than the base-model or helpful-only comparisons used in other candidates.", "n_variations": 10, "title": "Measuring Refusal Residue in Token Probabilities During Jailbroken Generation"}]}, "76": {"prompt_text": "If identical safety benchmark scores can coexist with radically different deployment behavior \u2014 one model stays safe while another provides weapon synthesis in a GUI \u2014 what research could measure something structural about alignment that predicts generalization to untested contexts?", "ideas": [{"idea_id": "P76_R15_C", "original_text": "## C: Internal Harm Recognition Without Refusal as a Structural Failure Predictor\n\n**Problem:** Models sometimes internally recognize content as harmful yet comply anyway \u2014 especially outside conversational settings. This mismatch may be cheaply measurable and predictive.\n\n**Research Question:**\n**How often does a model's internal harmfulness signal fire on requests it behaviorally completes, and does this \"silent compliance\" rate in known formats predict safety failures in held-out formats?**\n\n**Deliverable:** A silent-compliance metric validated as a generalization predictor, plus a prototype runtime monitor catching failures that output-level classifiers miss.\n\n**Approach:**\n- Train harmfulness probes on activations from open-weight models using only samples where the model does refuse, so the probe learns harm recognition regardless of behavioral outcome. Mean-pool over input tokens to avoid dependence on chat-template-specific token positions.\n- Measure silent compliance: rate at which the probe fires above threshold on inputs the model actually completes without refusal. Collect across formats \u2014 chat, code, function calls, GUI action descriptions \u2014 spanning contexts where the model reliably refuses and contexts where it doesn't.\n- Test the prediction: does higher silent compliance in a subset of formats predict failure rates on held-out formats? This is the core question \u2014 a metric you can compute on tested contexts that tells you about untested ones.\n- Prototype a generation-time monitor flagging activations where the harmfulness probe exceeds threshold while compliant tokens are being generated. Compare catch rate against output-based classifiers on known format-dependent safety failures.\n\n---", "improved_text": "\n\n## C: When Do Models Recognize Harm They Don't Refuse?\n\n**Problem:** Models internally represent requests as harmful yet comply in non-chat formats \u2014 a gap that may be measurable and monitorable.\n\n**Research Questions:**\n1. **Does a harmfulness probe trained on chat-format refusals still fire when the model completes harmful requests in code, function-calling, or tool-use formats?** If harm recognition is more format-general than refusal behavior, that's a directly exploitable signal.\n2. **When the probe goes quiet in a new format, does that mean the model isn't recognizing harm at all, or just not refusing?** These two failure modes need different fixes \u2014 monitoring vs. additional safety training \u2014 so distinguishing them matters.\n\n**Deliverable:** Per-format measurements of the gap between internal harm recognition and behavioral refusal on open-weight models, plus a prototype activation-based monitor benchmarked against output-only classifiers on format-dependent safety failures.\n\n**Approach:**\n- Train linear probes on middle-layer activations from open-weight models using harmful-vs-benign input labels, not refused-vs-complied. This is the key choice: the probe should learn \"this request involves harmful content,\" not \"the model is about to refuse.\" Input-side activations before response generation should make this less format-dependent.\n- Present matched harmful requests across formats \u2014 the same intent expressed as a chat message, a code docstring, a function parameter, a tool-use transcript \u2014 and measure both probe activation and actual refusal rate per format. The gap between these is the target measurement.\n- The hardest confounder is the probe detecting chat-template features rather than harm. Two controls: cross-model-family transfer (surface features shouldn't transfer, harm representations might) and perturbation checks (legitimate-context reframing should suppress the signal, mere reformatting shouldn't).\n- Benchmark the probe as a runtime monitor against CC++-style output classifiers specifically on cases where behavioral safety fails. Convincing results require meaningfully higher catch rates without elevated false positives on benign requests in the same formats.", "selected_variation": 4, "selection_reason": "Sharpest separation of the two failure modes (recognition absent vs. refusal absent) with a clear 'so what' for each, and the confounder controls \u2014 cross-model-family transfer and perturbation checks \u2014 are load-bearing design choices that the other candidates either omit or leave implicit.", "n_variations": 10, "title": "Internal Harm Recognition Without Refusal as a Structural Failure Predictor"}, {"idea_id": "P76_R17_C", "original_text": "## C: Unified vs. Fragmented Harm Representations as a Structural Metric\n\n**Problem:** Safety may fail to generalize because a model's concept of \"harmful\" is context-specific \u2014 learned separately per format rather than as one coherent representation.\n\n**Research Question:**\n**Do models learn a single internal direction for harm or separate directions per context?** Unified representations should predict good generalization; fragmented ones should predict context-specific safety that breaks on transfer.\n\n**Deliverable:** A probe-unity metric (cosine similarity between context-specific harm probes), validated against behavioral safety transfer rates across models.\n\n**Approach:**\n- Create probe training data for harm detection in 6+ contexts: conversational, code review, function-call, structured data, multi-turn agentic, summarization. Each dataset pairs harmful and benign examples within that context's format using the same underlying harmful content \u2014 this forces probes to learn harm vs. non-harm within each format rather than just format identity.\n- Train separate linear probes per context on Llama 3.3 70B. Compute pairwise cosine similarity between resulting probe directions. High similarity means the model has a unified harm concept; low similarity means fragmented, context-dependent safety. This produces one summary statistic per model.\n- Validate: correlate probe unity scores with behavioral transfer rates (safety in context A given training in context B). Higher probe unity should predict smaller safety drops when moving between contexts. Cross-validate by holding out context pairs.\n- Run across Llama, Qwen, and Gemma families to test whether the metric reliably tracks alignment generalization quality and whether it differs meaningfully between model families or safety training stages.\n\n---", "improved_text": "\n\n## C: Predicting Safety Generalization Failures from Harm-Probe Transfer\n\n**Problem:** Models pass safety benchmarks in chat but fail in other formats (GUI, agentic, code). No structural metric predicts where safety will break.\n\n**Research Questions:**\n1. **If you train a harm probe on chat activations and test it on code-format activations, does the accuracy drop predict whether the model's behavioral safety also drops?** This is the core claim: probe transfer as a leading indicator for safety transfer.\n2. **When probes transfer well but safety still fails, what does that tell us?** A model that recognizes harm across contexts but refuses only in chat has a different (and more tractable) problem than one that doesn't represent harm at all in the new format.\n\n**Deliverable:** A validated probe-transfer metric correlating with behavioral safety generalization across deployment contexts, tested across model families and training stages.\n\n**Approach:**\n- Construct matched harmful/benign pairs where identical harmful content appears in each format (chat, code, function-calling, agentic, structured-output) \u2014 matched content is essential, otherwise probes learn format not harm. This data construction step is the main bottleneck.\n- Train per-context linear probes on open-weight models (need activation access), build the full cross-context transfer matrix, and separately measure behavioral refusal rates on the same matched prompts. Rank-correlate the two matrices.\n- Control for the obvious confound: train benign-topic probes (\"is this about chemistry?\") per context. If those transfer across formats but harm probes don't, fragmentation is harm-specific rather than a format artifact. Without this control the metric is uninterpretable.\n- Compare probe transfer across safety-training checkpoints within model families to connect the metric to something actionable during training \u2014 does more safety training improve or degrade transfer?", "selected_variation": 2, "selection_reason": "Q2 ('when probes transfer well but safety still fails') is the sharpest second question across all candidates \u2014 it makes both outcomes of the core test informative and cleanly separates recognition from policy failures. The approach is fully load-bearing: benign-topic control probes isolate harm-specific fragmentation, rank-correlating the two matrices is a clean statistical test, and the training-checkpoint comparison connects the metric to something actionable during development.", "n_variations": 10, "title": "Unified vs. Fragmented Harm Representations as a Structural Metric"}, {"idea_id": "P76_R12_B", "original_text": "## B: Chimeric Inputs to Measure Whether Refusal Tracks Content or Format\n\n**Problem:** Safety training may teach format-pattern matching rather than content understanding, causing unpredictable failures in novel deployment contexts.\n\n**Research Question:**\n**Is refusal driven by recognizing harmful content or by format cues correlated with harmful requests in training data?** Inputs that cross content with format can disentangle these factors.\n\n**Deliverable:** A diagnostic measuring content-vs-format gating ratio, with empirical results showing whether this ratio predicts cross-format safety generalization.\n\n**Approach:**\n- Build chimeric inputs factorizing content and format: harmful content in safe formats (synthesis instructions as code review comments, dangerous chemistry in recipe templates) and safe content in refusal-associated formats. This 2\u00d72 design attributes refusal to its actual driver.\n- Measure refusal rates across all cells. Content-gated models refuse harmful content regardless of format; format-gated models refuse based on format regardless of content. The ratio quantifies which factor drives alignment and predicts generalization.\n- Validate on models with known deployment gaps \u2014 if a model's documented GUI safety failures coincide with low content-gating, the metric gains credibility. Then test whether it predicts safety on formats held out entirely from construction.\n- Use probes on chimeric inputs to disentangle \"recognizes harm but overrides refusal\" from \"fails to detect the harm at all.\" These point to different fixes: training interventions for the first, representation changes for the second.\n\n---", "improved_text": "\n\n## B: Does Safety Know It's Unsafe? Disentangling Harm Recognition from Refusal Across Formats\n\n**Problem:** Models refuse harmful requests in chat but comply in GUIs and spreadsheets \u2014 is the model failing to detect harm, or detecting it but not triggering refusal?\n\n**Research Questions:**\n1. **When refusal breaks in a new format, do internal harm-recognition signals break too?** Probes trained on chat-format harmful/benign pairs applied to format-shifted inputs can separate \"doesn't see the danger\" from \"sees it but doesn't act.\"\n2. **Can the recognition-refusal gap measured on known formats predict safety failures on held-out formats?** If so, this becomes a cheap pre-deployment check; if not, format-specific testing can't be skipped.\n\n**Deliverable:** A format-transformed harmful request dataset with quality validation, empirical measurements of when harm recognition persists despite refusal failure across models and formats, and an assessment of whether this gap predicts safety on formats excluded from analysis.\n\n**Approach:**\n- Transform reliably-refused harmful requests into ~8 formats (code review, recipes, JSON payloads, tool-use commands, spreadsheet instructions, etc.), preserving the actual harmful information. Quality control is load-bearing here: validate with a separate model that both the harm survives and the format reads naturally, since bad transformations make results uninterpretable.\n- On open-weight models (needed for activation access; these show format-dependent safety degradation too), measure refusal rate and harm-recognition probe activation per format. Train linear probes on chat-format activations following the approach from Anthropic's cost-effective classifiers work, then apply to transformed inputs without retraining \u2014 the point is testing whether harm representations are format-invariant.\n- Control for probe artifacts by measuring safe-content probe activation per format as baseline. The signal is harmful-safe separation within each format, not absolute probe values, which may shift for non-meaningful reasons across token distributions.\n- Test held-out prediction: measure recognition-refusal divergence on a subset of formats, predict refusal on excluded formats. Divergence patterns that generalize give deployment teams a diagnostic; idiosyncratic per-format results are a useful negative.", "selected_variation": 3, "selection_reason": "Candidate 4 has the most methodologically rigorous design: the probe artifact control (measuring harmful-safe separation within each format rather than absolute probe values) addresses a validity threat that most other candidates miss entirely, and the quality-validation step for format transformations is correctly identified as load-bearing rather than treated as routine preprocessing. It also frames both possible outcomes of the held-out prediction honestly, which sharpens the falsifiability.", "n_variations": 10, "title": "Chimeric Inputs to Measure Whether Refusal Tracks Content or Format"}]}, "77": {"prompt_text": "If character-trained models resist adversarial prompting far better than prompted or steered models but we don't understand why, what research would identify the structural factors that make certain safety training approaches produce more robust dispositions?", "ideas": [{"idea_id": "P77_R9_B", "original_text": "## B: Does Character Training Create Fine-Tuning-Resistant Dispositions?\n\n**Problem:** Character training's robustness is tested only against inference-time attacks \u2014 unknown whether it survives training-time perturbations.\n\n**Research Question:**\n**Do character-trained dispositions persist through narrow fine-tuning that induces broad emergent misalignment in standard models?** The answer distinguishes surface-level behavioral robustness from deeper reshaping of the loss landscape around the trained trait.\n\n**Deliverable:** Emergent misalignment rates for character-trained vs. baseline models across fine-tuning intensities and domains.\n\n**Approach:**\n- Take Llama 3.1 8B character-trained on \"flourishing\" (merged LoRA) and fine-tune on the insecure code EM dataset from Betley et al. at three intensities (500, 2000, 6000 examples). Compare misalignment rates against a non-character-trained baseline fine-tuned identically. A rightward shift in the dose-response curve directly quantifies how much additional fine-tuning pressure is needed to overcome trained dispositions.\n- Include prompted and steered baselines receiving identical fine-tuning for three-way comparison. Alignment pretraining (Tice et al.) failed to prevent EM \u2014 character training succeeding would identify a structurally distinct robustness mechanism operating through weight modification rather than data curation.\n- Run the inverse: take the \"misaligned\" character-trained model and apply safety SFT. If trained misalignment is equally hard to remove, the structural factor is symmetric and purely method-dependent. If prosocial training is easier to override, pretrained dispositions may be reinforcing the character training effect directionally.\n- Replicate with bad medical advice EM (Soligo et al.) as a second domain, since insecure code EM may interact with coding-adjacent traits.\n\n---", "improved_text": "## B: Does Character Training Protect Against Emergent Misalignment?\n\n**Problem:** Character training resists inference-time adversarial attacks, but whether trained dispositions survive training-time perturbations like EM-inducing fine-tuning is unknown.\n\n**Research Questions:**\n1. **Does character training raise the fine-tuning budget needed to induce emergent misalignment, or would any additional training do the same?** Character-trained models have more total gradient updates than the base\u2014the interesting finding would be disproportionate protection, not just \"more training helps.\"\n2. **If character training does protect, is it the ethical content of the constitution or the DPO+introspection pipeline?** A non-ethical persona trained with the identical method cleanly separates these.\n\n**Deliverable:** Dose-response curves for emergent misalignment rates across training methods, plus persona-vector shift measurements providing a continuous geometric signal alongside behavioral rates.\n\n**Approach:**\n- Four conditions from an open-weight instruct model: baseline, \"flourishing\" character training (ethical constitution), \"mathematical\" character training (same pipeline, no ethical content), and SFT matched in tokens and LoRA config. If mathematical protects like flourishing, the pipeline matters more than the ethical content.\n- Fine-tune each on the insecure code EM dataset at three intensities, multiple seeds. Measure behavioral EM rates alongside activation-space shift along pre-extracted \"evil\" persona vectors\u2014the continuous geometric signal compensates for EM's high seed variance (~20% \u00b1 7%).\n- Powered for substantial effects only. A null result still tells us inference-time and training-time robustness come apart, which redirects safety training investment toward training-time-specific defenses.", "selected_variation": 8, "selection_reason": "The 'mathematical' character training control \u2014 same DPO+introspection pipeline, no ethical content \u2014 is the single most incisive design choice across all candidates, cleanly separating method from content in a way that released 'misaligned' checkpoints cannot. The four conditions are maximally parsimonious and each is load-bearing, the persona-vector continuous signal practically addresses the low-EM-rate power problem, and the writing is the most concise and direct of the set.", "n_variations": 10, "title": "Does Character Training Create Fine-Tuning-Resistant Dispositions?"}, {"idea_id": "P77_R16_A", "original_text": "## A: Does character training encode safety across more independent representation dimensions?\n\n**Problem:** Character training resists adversarial prompting far better than steering or prompting, but no representational property has been identified as the cause.\n\n**Research Question:**\n**Does character training produce robustness by encoding safety across more independent directions?** RLHF refusal concentrates along a single direction (trivially ablated); character training may use many, making direction-level attacks insufficient.\n\n**Deliverable:** Measured safety dimensionality across four instillation methods, with causal tests linking dimensionality to adversarial robustness.\n\n**Approach:**\n- Apply a safety trait (refusing harmful requests) to Llama-3.1-8B via system prompt, activation steering, DPO alone, and full character training (using the open-source pipeline). Measure robustness independently with prefill, many-shot, and adversarial system prompt attacks.\n- Measure safety dimensionality by iteratively projecting out the strongest safety-relevant direction (difference-in-means between safe/unsafe activations) and rechecking classification accuracy. The projection count before accuracy hits chance estimates independent safety dimensions.\n- Causally test by cumulatively ablating identified directions and measuring trait persistence. Character-trained models should degrade gracefully; prompted/steered models should break after one or two ablations\u2014separating correlation from causation.\n- Replicate on Qwen-2.5-7B with a second trait to distinguish general patterns from model-specific effects.\n\n---", "improved_text": "\n\n## A: Does safety dimensionality explain why character training resists adversarial prompting?\n\n**Problem:** Character training resists adversarial prompts far better than steering or prompting, but no representational property has been identified as the cause.\n\n**Research Questions:**\n1. **Does character training spread safety across more representation directions than DPO or prompting?** Refusal directions work shows RLHF safety often lives in one ablatable direction\u2014does character training change this?\n2. **Does that dimensional difference actually predict which methods survive adversarial prompts?** Adversarial prompts shift activations, not ablate directions\u2014so we need to measure whether prompts are low-rank perturbations that can only suppress low-dimensional safety signals.\n\n**Deliverable:** Measured spectral profiles of safety encoding across four instillation methods, with evidence for or against dimensionality as the mechanism linking training method to adversarial robustness.\n\n**Approach:**\n- Train harmful-request refusal into Llama-3.1-8B via system prompt, activation steering, DPO alone, and full character training (open-source pipeline from Maiya et al.). The DPO-vs-full-character-training comparison isolates the introspection stage, which is where the robustness jump appears.\n- Measure safety dimensionality via SVD on per-example activation differences between harmful and benign requests. Spectral decay rate gives a continuous measure of how concentrated vs. distributed the encoding is, avoiding threshold sensitivity of count-based methods. Verify stability across held-out dataset splits to guard against probe circularity.\n- Measure effective rank of adversarial perturbations (prefill, many-shot, adversarial system prompts) by computing activation-with-attack minus activation-without-attack across inputs. The core prediction: ratio of perturbation rank to safety-subspace rank should track attack success across methods. This is the connecting step\u2014without it, dimensionality is just a description.\n- Validate causally by ablating top-k safety directions per method\u2014character-trained models should degrade gradually, prompted models should collapse at k=1-2. Compare linear vs. MLP probe accuracy as a sanity check that the linear framing isn't missing nonlinear structure. Replicate on Qwen-2.5-7B.", "selected_variation": 1, "selection_reason": "Candidate 2 has the sharpest mechanistic prediction\u2014that the ratio of perturbation rank to safety-subspace rank should track attack success\u2014which provides an actual connecting explanation rather than just correlating dimensionality with robustness. Its methodological choices (spectral decay over count-based thresholds, measuring the rank of adversarial perturbations themselves, linear vs. MLP sanity check) each follow directly from this framing, making the approach unusually coherent.", "n_variations": 10, "title": "Does character training encode safety across more independent representation dimensions?"}, {"idea_id": "P77_R11_A", "original_text": "## A: Measuring Whether Character Training Distributes Alignment Deeper Into Generation\n\n**Problem:** Standard safety alignment concentrates its effect in the first few output tokens, enabling prefill attacks. Character training's robustness may stem from distributing alignment signal deeper into generation.\n\n**Research Question:**\n**Does character training modify the model's generation distribution more uniformly across token positions than prompting or steering?** If so, the \"depth profile\" of alignment would directly explain robustness to attacks that bypass early tokens.\n\n**Deliverable:** Per-method alignment depth profiles and evidence for whether depth predicts adversarial robustness.\n\n**Approach:**\n- Compute per-token KL divergence between base and safety-modified models (character-trained, prompted, steered) on harmful prompts, extending the Qi et al. (2024) method\u2014for prompted models, compare prompted vs. unprompted generation distributions at each position.\n- Run prefill attacks at varying token depths (1, 5, 10, 20+ harmful prefix tokens) against each method, mapping the exact depth at which each method's safety collapses\u2014this is the core diagnostic measurement.\n- Correlate KL depth profiles with prefill robustness: if methods with flatter profiles resist deeper prefills, alignment depth is the structural factor explaining character training's advantage.\n- Directly test the causal claim by deepening prompted models' alignment (training on recovery-from-harmful-prefix examples \u00e0 la Qi et al.) and checking whether this closes the robustness gap with character training.\n\n---", "improved_text": "\n\n## A: Where Safety Breaks Under Prefill: Collapse Depth as a Diagnostic for Training Robustness\n\n**Problem:** Character training resists adversarial attacks far better than prompting or steering, but we lack a quantitative predictor of this robustness that could guide training decisions cheaply.\n\n**Research Questions:**\n1. **How many tokens of harmful prefill does it take to break each safety method?** If this \"collapse depth\" predicts robustness to non-prefill attacks too (multi-turn, adversarial system prompts), it's a cheap general diagnostic. If it only predicts prefill robustness, it's less useful.\n2. **Can you close the robustness gap with character training just by training on recovery-from-harmful-prefix examples?** This directly tests whether depth is the causal factor or whether character training's advantage comes from something else, like a coherent identity learned during introspection.\n\n**Deliverable:** Per-method collapse depth measurements across attack types, plus evidence for whether a simple recovery-training intervention can replicate character training's robustness without the full pipeline.\n\n**Approach:**\n- Construct harmful prefills of increasing length using several template families (varying compliance-signal strength, not just token count) and measure safe-continuation probability after each prefix across all Open Character Training checkpoints \u2014 their released adapters across 3 open-weight models and 11 personas give enough variance to see real patterns.\n- Test whether collapse depth ordering matches robustness ordering on non-prefill attacks (adversarial prompts, multi-turn pressure) from the original paper's evaluation protocol. This is the critical test: if the correlation is tight across attack types, collapse depth is a general diagnostic; if it only works for prefill, we've confirmed something obvious.\n- Train recovery models on prefix-then-refusal examples at varying depths and measure whether this shifts both collapse depth and non-prefill robustness together. The key comparison is distillation-only vs. character training \u2014 if recovery training closes that specific gap, depth is doing real explanatory work.\n- Measure per-position refusal probability (not raw KL divergence) to avoid confounding safety signal with personality-driven distributional shifts from character training.", "selected_variation": 0, "selection_reason": "Sharpest framing: the two research questions nest productively (Q2 only matters if Q1 confirms collapse depth is a general diagnostic, not just a prefill-specific measure), and the methodological choices\u2014varying compliance-signal strength rather than just token count, measuring per-position refusal probability rather than raw KL\u2014show careful thinking about the confounds that would undermine the whole exercise.", "n_variations": 10, "title": "Measuring Whether Character Training Distributes Alignment Deeper Into Generation"}]}, "80": {"prompt_text": "Standard code verification was built for accidental human errors. AI-generated security patches may fail in ways existing CI pipelines systematically miss \u2014 what research would measure the gap between 'passes checks' and 'genuinely secure'?", "ideas": [{"idea_id": "P80_R9_A", "original_text": "## A: Exploit-Grounded Measurement of How Often AI Patches Pass CI but Remain Vulnerable\n\n**Problem:** No study measures the rate at which AI security patches survive standard CI pipelines yet remain exploitable by known attacks.\n\n**Research Question:**\n**What fraction of AI-generated patches pass realistic CI checks but fail under actual exploitation?** ARVO's 5,001 C/C++ vulnerabilities with PoC exploits provide ground-truth oracles for this measurement.\n\n**Deliverable:** Gap rates per model and vulnerability class, plus a curated benchmark of CI-passing-but-exploitable AI patches.\n\n**Approach:**\n- Sample ~500 ARVO vulnerabilities across common CWE types. Generate patches using frontier models (Claude, GPT-4, Gemini) with sanitizer reports and source files as context, using ARVO's Docker images for reproducible builds.\n- Run each patch through a realistic CI stack: project test suites, CodeQL default security queries, Semgrep auto rules, and ASan-instrumented builds. Record which patches survive all layers\u2014this represents \"passes checks.\"\n- Execute PoC exploits against CI-passing patches. The exploit-success rate among CI-passing patches is the gap. Decompose by CWE type to find where CI is blindest for AI code.\n- Compare gap rates for AI patches vs ARVO's developer patches on the same vulnerabilities, testing whether AI's documented distinct vulnerability profile (heavy CWE-95/CWE-502) maps onto CI blind spots.\n\n---", "improved_text": "\n\n## A: When AI Security Patches Pass CI but Stay Exploitable\n\n**Problem:** No measurement exists of how often AI-generated security patches survive standard CI pipelines yet remain exploitable by known attacks.\n\n**Research Questions:**\n1. **Where does CI go blind for AI-generated patches?** Measure residual exploitability rates per vulnerability class \u2014 the per-CWE breakdown matters more than any aggregate number because it tells you where human review should concentrate.\n2. **Can cheap additions close the gap?** Test whether directed fuzzing around patched code paths or PoC re-execution catches what static analysis and test suites miss.\n\n**Deliverable:** Per-model, per-CWE gap rates between \"passes CI\" and \"survives exploitation,\" plus a curated benchmark of CI-passing-but-exploitable AI patches for future CI tool development.\n\n**Approach:**\n- Generate patches using frontier models given sanitizer reports and vulnerable function context, across several hundred ARVO C/C++ vulnerabilities (which provide Docker builds, test suites, and PoC exploits as ground truth). Track the full funnel \u2014 compiles \u2192 passes tests \u2192 passes static analysis \u2192 survives exploit \u2014 since the funnel shape itself shows where AI patches fail and where CI helps. Expect significant attrition; start with enough vulnerabilities that ~150+ CI-passing patches per model survive for per-CWE analysis.\n- Ground CI configurations in what ARVO source projects actually run (most are major open-source projects with public CI), rather than assembling an idealized tool stack.\n- ARVO exploits target unpatched code, so post-patch exploit failure doesn't guarantee the vulnerability is fixed \u2014 the patch may break something the exploit incidentally relied on. Manually verify root-cause elimination on a calibration subset to estimate a correction factor for automated results.\n- Compare AI patch failure modes against incomplete human patches (identifiable from git history as fixes later revised), which is more informative than comparing against ARVO's final correct fixes.", "selected_variation": 0, "selection_reason": "Its methodological choices are the most load-bearing and well-justified: grounding CI in what projects actually run (not an idealized stack), the correction factor for the PoC oracle's one-sidedness, tracking the full compile-to-exploit funnel as informative in itself, and comparing against incomplete human patches rather than final correct fixes \u2014 each addresses a real validity threat that other candidates leave uncontrolled.", "n_variations": 10, "title": "Exploit-Grounded Measurement of How Often AI Patches Pass CI but Remain Vulnerable"}, {"idea_id": "P80_R14_B", "original_text": "## B: Are Honest AI Patch Failures Distinguishable from Deliberate Sabotage?\n\n**Problem:** Sabotage monitors for AI-written code need to distinguish adversarial patches from routine AI mistakes \u2014 but we don't know if these look different.\n\n**Research Question:**\n**Can code review distinguish an AI patch that's honestly wrong from one deliberately left insecure?** If the failure distributions overlap heavily, catching sabotage requires catching all failures, which drastically raises verification requirements.\n\n**Deliverable:** Measured distinguishability (AUC) between honest-mistake and adversarial AI patches under prompted review, static analysis, and diff-feature classifiers.\n\n**Approach:**\n- Collect honest-mistake patches: have frontier models patch ~30 CVEs without adversarial instructions, retain those passing CI but failing variant-exploit testing. These are naturally-occurring insecure patches from routine generation.\n- Collect adversarial patches for the same CVEs: prompt models to brainstorm how to preserve exploitability while passing tests, then implement the subtlest strategy. Multi-stage prompting (ideate, then implement, then self-critique for obviousness) improves subtlety without fine-tuning.\n- Test three detection methods against both sets: prompted security review by a weaker model, CodeQL with extended rulesets, and logistic regression on code-diff features (change size, control-flow modifications, new branch conditions). Report AUC for honest-vs-adversarial per method.\n- The actionable output: if AUC \u2248 0.5, sabotage detection reduces to general insecure-patch detection. If AUC > 0.8, adversarial patches have distinctive signatures worth targeting separately in monitors.\n\n---", "improved_text": "## B: Do Sabotaged AI Patches Look Different from Honest Mistakes?\n\n**Problem:** If adversarial AI patches look identical to routine AI mistakes, sabotage detection collapses into full security verification of every patch.\n\n**Research Questions:**\n1. **Do adversarial patches actually look different from honest mistakes, or is it all just \"insecure code\"?** If AUC \u2248 0.5 for cheap detection methods, sabotage-specific monitoring is impossible and you need to verify everything.\n2. **At what adversary sophistication level does any distinctive signal vanish?** Varying effort from naive prompting to distribution-matching yields a curve, not a point estimate.\n\n**Deliverable:** AUC curves mapping distinguishability across adversary sophistication levels and detection methods, plus honest-mistake base rates for frontier models on real CVEs.\n\n**Approach:**\n- Build an honest-mistake corpus from CVEs with public PoC exploits: frontier models generate genuine fixes, keep those passing tests but failing on PoC variants. Getting enough subtle failures (not obvious misunderstandings) is the hardest construction step.\n- Generate adversarial patches at three effort levels: naive prompting, multi-stage self-critique, and distribution-matching where the model sees honest mistakes and mimics them. This ceiling test measures how far adversary effort actually gets you.\n- Test detection via weaker-model prompted review, static analysis, and diff-feature classifiers. Report AUC conditional on the patch being insecure \u2014 distinguishability within failures, not across all patches.\n- Measure honest-mistake base rates as a secondary output: if failures are rare, moderate distinguishability suffices operationally; if common, false positives dominate regardless of signal quality.", "selected_variation": 0, "selection_reason": "Its two research questions cut cleanly to the fundamental issue\u2014whether any distinguishing signal exists and at what adversary sophistication it vanishes\u2014yielding a curve rather than a point estimate. The three-tier adversary design (naive, self-critique, distribution-matching) is tightly load-bearing, the distribution-matching ceiling test is a particularly sharp design choice, and the base-rate secondary output is well-integrated rather than tacked on.", "n_variations": 10, "title": "Are Honest AI Patch Failures Distinguishable from Deliberate Sabotage?"}, {"idea_id": "P80_R6_D", "original_text": "## D: Does CI Feedback Improve AI Patch Security or Teach Evasion?\n\n**Problem:** When AI patches fail CI and models retry with tool output, they might learn to satisfy the check rather than fix the vulnerability.\n\n**Research Question:**\n**Do CI-informed retries improve actual security or just pass rates?** If retries satisfy specific checks without becoming genuinely secure, CI feedback loops are counterproductive \u2014 mirroring the Sleeper Agents finding that adversarial training hides failures rather than fixing them.\n\n**Deliverable:** Security trajectories across retry iterations, comparing CI-informed vs. blind retries to isolate tool feedback's effect.\n\n**Approach:**\n- Generate patches for ~200 ARVO vulnerabilities, run CI, and when a tool flags an issue, feed the specific output to the model for retry. Run 5 cycles per vulnerability, recording each intermediate patch. ARVO's fuzzing infrastructure provides ground truth at every iteration.\n- Track two metrics per iteration: (a) does the flagged finding disappear, and (b) does overall patch security improve? A patch satisfying CodeQL while introducing a new ASAN-detected crash has learned evasion, not security. This distinction is the core measurement.\n- Compare against blind retries where the model receives only \"try again\" without tool output. If informed retries achieve higher CI pass rates but equal or lower actual security, tool feedback actively teaches evasion \u2014 directly informing whether CI-in-the-loop workflows are safe.\n- Test whether evasion varies by tool type: pattern-matching (Semgrep) versus dataflow analysis (CodeQL). If models evade pattern-matchers more readily, deeper analysis tools provide more robust feedback.", "improved_text": "\n\n## D: Does CI Feedback on AI Security Patches Improve Fixes or Teach Signal Avoidance?\n\n**Problem:** When AI agents retry patches using static analysis output, they might learn to satisfy the specific check rather than fix the underlying vulnerability.\n\n**Research Questions:**\n1. **Does the gap between \"passes static analysis\" and \"passes dynamic verification\" grow across retries when models get detailed tool output?** This is the core divergence measure \u2014 if static passage rates climb while ASAN/fuzzing results stall or regress, feedback is teaching signal avoidance.\n2. **Does giving models crash-level feedback (ASAN output) avoid this divergence?** If feedback closer to ground truth produces less divergence, the problem is signal fidelity, not iteration itself.\n\n**Deliverable:** Measured divergence trajectories between static and dynamic security across retry iterations under different feedback conditions; concrete guidance on whether detailed CI output is safe to show AI agents on security-critical code.\n\n**Approach:**\n- Select C/C++ memory safety bugs from ARVO where at least one frontier model produces a compilable patch on first attempt \u2014 this filtering is necessary because the study needs multi-iteration trajectories, not single-attempt failures. Pilot on ~30 bugs to validate sufficient yield before scaling.\n- Run four conditions across 5 retries: no retry, minimal feedback (\"try again\"), full static analysis output (CodeQL), and ASAN crash output. ASAN serves as a \"good feedback\" ceiling since it's close to ground truth.\n- At each iteration, independently measure: flagged finding disappearance, original crash reproduction, and extended fuzzing for regressions. The independence between static and dynamic measurements is load-bearing \u2014 using the same tools for feedback and evaluation would just measure tool agreement.\n- Track code complexity per iteration. If detailed-feedback patches grow increasingly convoluted to route around findings, that's a mechanistic signal even when security metrics are noisy.", "selected_variation": 9, "selection_reason": "The four-condition gradient (no retry \u2192 minimal \u2192 full static \u2192 ASAN crash) forms the cleanest experimental logic, directly testing whether the problem is iteration itself or feedback fidelity; the second research question ('does crash-level feedback avoid this divergence?') is sharply falsifiable and immediately actionable, and the code-complexity-per-iteration metric adds a mechanistic signal that strengthens interpretation when security metrics are noisy.", "n_variations": 10, "title": "Does CI Feedback Improve AI Patch Security or Teach Evasion?"}]}, "83": {"prompt_text": "If the number of safety-relevant harm categories grows faster than teams can build and harden per-category classifiers, what research could make safety classification scale sublinearly \u2014 covering new harm types without proportional increases in training data and engineering effort?", "ideas": [{"idea_id": "P83_R6_B", "original_text": "## B: Policy-Conditioned Safety Classifier Scaling Laws\n\n**Problem:** Constitutional Classifiers require per-category data generation and training; total effort grows linearly with the number of harm types.\n\n**Research Question:**\n**How many training categories does a policy-conditioned classifier need before it generalizes zero-shot to new ones?** A single model mapping (policy description, content) \u2192 safe/unsafe could amortize cost, but the generalization curve's shape is unknown.\n\n**Deliverable:** Scaling curves relating training-category count to zero-shot held-out accuracy, with comparison against per-category baselines.\n\n**Approach:**\n- Define ~30 harm categories with natural language policies and generate synthetic data per category via Claude API, following the CC pipeline. Span content-safety, instructional-harm, and agentic-misuse domains so the training distribution isn't artificially narrow.\n- Fine-tune Gemma 3 9B with the policy description prepended to each input, training on all-but-k categories and testing on the k held-out ones. This directly measures how the amortization curve bends.\n- Ablate policy description quality: one-line summaries vs. multi-paragraph constitutions. This determines the minimum specification burden on practitioners\u2014a key practical deployment constraint that Llama Guard and ShieldGemma haven't measured.\n- Compare against per-category classifiers on identical test data. The decision-relevant number: at what training diversity does the joint model match per-category baselines? Below that crossover, per-category training is still needed.\n\n---", "improved_text": "\n\n## B: Policy-Conditioned Safety Classifiers: When Does Zero-Shot Coverage Fail?\n\n**Problem:** Constitutional Classifiers require per-category data and training; coverage cost scales linearly with harm types.\n\n**Research Questions:**\n1. **Which new harm categories can a policy-conditioned classifier handle zero-shot, and which still need dedicated training data?** The aggregate scaling curve hides per-category variance \u2014 a deployment team needs to predict performance for the specific category that just became urgent.\n2. **Do a handful of boundary examples in the policy description close the gap for categories that fail zero-shot?** If \"write a paragraph + label 10 edge cases\" approaches dedicated-classifier performance, that changes the cost story substantially.\n\n**Deliverable:** Empirical scaling curves with per-category decomposition, a cheap predictor (if one exists) for whether a new category needs dedicated investment, and a public dataset of ~20 harm categories with policy descriptions and synthetic evaluation data.\n\n**Approach:**\n- Define ~20 categories varying in what a classifier must detect \u2014 some where surface tokens carry the signal (precursor chemical queries), some requiring intent inference (social engineering, subtle manipulation). Category selection is load-bearing: it determines whether hold-out experiments test generalization at meaningfully different distances.\n- Generate synthetic data per category via Claude API following CC's augmentation approach (paraphrasing, translation, jailbreak wrapping). Data quality is the primary confound risk; validate a sample per category against researcher judgment on boundary cases.\n- Fine-tune an open-weight base model (not instruct \u2014 avoids confounding with existing harm representations) with policy descriptions prepended. Run deliberate leave-k-out experiments: hold out nearest-neighbor categories, then distant ones, measuring whether embedding distance between policy descriptions predicts the performance gap.\n- Three baselines isolate what's actually working: per-category dedicated classifiers, the base model prompted with the policy but no multi-category training, and multi-category training without the policy text. If the last matches the full model, the policy conditioning isn't contributing and the approach just reduces to \"train on more harm data.\"", "selected_variation": 1, "selection_reason": "The three baselines (per-category dedicated, prompted-but-untrained, multi-category-without-policy-text) form a uniquely informative ablation structure that isolates whether policy conditioning actually contributes beyond generic multi-harm training \u2014 the central question the other proposals raise but don't test as cleanly. The research questions are also the most practically framed: per-category variance rather than aggregates, and the few-shot boundary-example question directly addresses the realistic deployment workflow.", "n_variations": 10, "title": "Policy-Conditioned Safety Classifier Scaling Laws"}, {"idea_id": "P83_R17_B", "original_text": "## B: Do Jailbreak Defenses Transfer Across Harm Categories?\n\n**Problem:** Per-category adversarial hardening dominates safety classifier cost, but nobody has measured how much transfers to new categories.\n\n**Research Question:**\n**When you harden a classifier against jailbreaks for some harm categories, how much protection do new categories inherit?** This determines whether hardening is fundamentally per-category or amortizable.\n\n**Deliverable:** A cross-category robustness transfer matrix with marginal-cost estimates for adding new categories.\n\n**Approach:**\n- Train CC-style classifiers on 6 categories with full augmentation (ciphers, encodings, role-play, translations). For each, run attacks designed for other categories \u2014 does a cipher-robust bio-weapons classifier resist cipher-encoded cyber-attack queries without additional training?\n- Train mixed-augmentation classifiers: some categories get full jailbreak augmentation, others only clean data. Measure whether under-augmented categories inherit robustness from co-trained ones, and which specific augmentation types cross category boundaries.\n- Disentangle attack-pattern learning from content learning by holding the attack strategy constant while varying harmful content. A cipher defense trained on CBRN data that transfers to fraud means the model learned to decode ciphers \u2014 not CBRN vocabulary.\n- Produce a marginal-cost curve: given N hardened categories, how much augmentation does category N+1 need to reach 90% of full robustness? This directly answers whether hardening scales sublinearly.\n\n---", "improved_text": "\n\n## B: Cross-Category Transfer of Jailbreak Robustness in Safety Classifiers\n\n**Problem:** Per-category adversarial hardening dominates safety classifier cost, but nobody has measured which parts transfer to new categories and which must be repeated.\n\n**Research Questions:**\n1. **When you harden a classifier against ciphers for bio-weapons, does the cipher robustness carry over to fraud for free?** Likely varies by attack type \u2014 format-level defenses (ciphers, encodings) should transfer more than content-entangled ones (role-play, benign rephrasing).\n2. **After hardening N categories, how much augmentation does category N+1 actually need?** Determines whether the scaling cost is sublinear or fundamentally per-category.\n\n**Deliverable:** Per-attack-type transfer measurements across held-out harm categories, with marginal-cost estimates for adding new categories at a target robustness level.\n\n**Approach:**\n- Train CC-style classifiers (LoRA on open-weight base) on 6 semantically distant harm categories. Core experiment: for each held-out category, compare three conditions \u2014 clean-only baseline, cross-augmented (other 5 categories get full jailbreak augmentation but held-out gets only clean data), and fully-augmented. The baseline-to-cross-augmented gap measures transfer; the remaining gap measures per-category cost. A fourth condition adding equivalent clean data controls for transfer being just a data-scaling effect.\n- Break all results down by attack type (ciphers, base64/ROT13, translation, role-play, benign rephrasing) using per-type evaluation sets. This decomposition is the key output \u2014 a single aggregate transfer number would be nearly useless for decisions.\n- Category selection matters: semantically close categories (chemical vs. biological weapons) will show spuriously high transfer from shared vocabulary. Include at least 2-3 distant pairs (CBRN alongside fraud, hate speech) so results aren't dominated by this confound.\n- Build the augmentation pipeline using Claude API following published CC descriptions. Absolute robustness numbers won't match production quality, but relative comparisons (how much does cross-augmentation close the gap?) should be more stable across pipeline quality levels.", "selected_variation": 3, "selection_reason": "Every design choice is explicitly justified in terms of what it isolates (baseline-to-cross-augmented gap measures transfer, remaining gap measures per-category cost, clean-data control rules out data-scaling confound), the category-distance confound is handled directly, and the note about relative comparisons being stable across pipeline quality shows mature scoping of what the experiment can claim \u2014 all communicated with unusual clarity.", "n_variations": 10, "title": "Do Jailbreak Defenses Transfer Across Harm Categories?"}, {"idea_id": "P83_R7_B", "original_text": "## B: Automated Benign Boundary Discovery for Harm Constitutions\n\n**Problem:** Defining benign near-miss categories (>40% robustness gain in CC) is the least-scalable step in building new harm classifiers.\n\n**Research Question:**\n**Can an LLM generate the benign boundary categories that make Constitutional Classifiers robust, given only a harm description?** Listing harmful examples is straightforward; identifying what looks harmful but should be allowed (e.g., \"household chemistry\" near \"weapons chemistry\") is the bottleneck human effort addresses.\n\n**Deliverable:** A pipeline from harm description to validated benign boundaries, benchmarked against human-written constitutions across 5+ domains.\n\n**Approach:**\n- For domains with existing human-written constitutions, have Claude generate candidate benign boundaries from harm descriptions alone. Compare classifier robustness using auto-generated vs. human boundaries \u2014 this directly tests whether automation preserves the documented >40% gain.\n- Build an iterative loop: train a classifier, identify false-positive clusters among blocked benign inputs, feed those back to generate better-targeted boundary categories. This connects classifier failure patterns to boundary refinement.\n- Test whether auto-generation finds useful boundaries humans missed \u2014 if it does, automation is complementary rather than merely approximate, strengthening the adoption case.\n- End-to-end validation on a held-out domain with no human-written constitution: generate boundaries, train classifier, red-team. Compare against using only generic benign data to isolate the value of targeted boundary discovery.\n\n---", "improved_text": "\n\n## B: Automating Benign Boundary Discovery for Constitutional Classifiers\n\n**Problem:** Standing up new Constitutional Classifiers requires experts to hand-write benign boundary categories per harm domain\u2014the least scalable step.\n\n**Research Questions:**\n1. **How much of the robustness gain from expert-written benign boundaries survives when an LLM generates them from a harm description alone?** The CC paper's >40% gain might mostly come from having *any* targeted boundaries, not *perfect* ones.\n2. **Can you close the remaining gap by feeding classifier false positives back into boundary generation?** If false-positive clusters are informative enough for an LLM to infer missing categories, iteration replaces expertise.\n\n**Deliverable:** A pipeline from harm description to validated benign constitution, benchmarked against human-written constitutions, with clear guidance on where human input remains necessary.\n\n**Approach:**\n- Start with CBRN chemistry where CC provides ground truth. Generate boundary categories from only the harm description, plug them into the existing CC synthetic data and training pipeline, and compare end-to-end classifier robustness against human-written constitutions on held-out jailbreak datasets. The LLM generates category *descriptions*, not training data\u2014the data pipeline is already automated.\n- Test five conditions: no targeted boundaries, zero-shot auto-generated, iteratively refined, human-written, and human-written augmented with auto-discovered categories. The last condition tests whether automation finds useful boundaries experts missed.\n- The iterative loop: train classifier, run against a large benign corpus (WildChat), have the LLM describe what benign category each false-positive cluster represents, add those categories, retrain. This breaks down if false positives scatter rather than cluster\u2014measuring convergence rate is the key signal.\n- The main evaluation gap is red-teaming diversity\u2014automated attacks suffice for relative comparisons between conditions but won't establish absolute robustness. Generalization beyond chemistry is the primary uncertainty; if only one domain has ground truth, test sensitivity to harm description quality instead.", "selected_variation": 8, "selection_reason": "The five-condition experimental design (no boundaries, zero-shot, iterative, human, human+auto) is the most comprehensive ablation across candidates, cleanly answering every sub-question in one structure. The writing is precise about what's being automated (category descriptions, not training data), honest about limitations (single ground-truth domain, automated attack ceilings), and identifies the right key signal (convergence rate of the FP loop).", "n_variations": 10, "title": "Automated Benign Boundary Discovery for Harm Constitutions"}]}, "88": {"prompt_text": "Does model scale make capabilities more modular or more entangled? What empirical work would establish this trend and determine whether 'safety via incapability' is a viable long-term strategy or a dead end?", "ideas": [{"idea_id": "P88_R4_D", "original_text": "## D: Capability Subspace Overlap Across Model Scale\n\n**Problem:** No direct measurements exist of whether different capabilities share more or less representational machinery as models grow.\n\n**Research Question:**\n**Do activation subspaces encoding different capabilities overlap more at larger scale?** Probe weight vectors identify capability-specific directions; principal angles between pairs quantify how representational sharing changes with size.\n\n**Deliverable:** Pairwise capability-subspace overlap matrices at each scale, validated against behavioral collateral damage from interventions.\n\n**Approach:**\n- Train linear probes for 8+ capabilities (organic chemistry, general chemistry, coding, math, biology, language fluency, persuasion, cybersecurity) across Qwen 2.5 7B/32B/72B at middle and later layers. Extract weight vectors and compute principal angles between all capability-subspace pairs at each model size.\n- Test whether dangerous-benign pairs (synthesis routes and general chemistry) show faster-growing overlap than benign-benign pairs (coding and math). If overlap grows asymmetrically for safety-relevant pairs, capability separation specifically worsens where it matters most for deployment.\n- Validate overlap predictions against behavior: fine-tune to reduce performance on one capability per pair (10 steps of gradient ascent), then check whether the paired capability degrades proportionally to measured overlap. This links representational geometry to practical consequences.\n- Control for probe quality across scales by reporting held-out accuracy and bootstrap confidence intervals on overlap estimates. If probes at one scale are substantially less accurate, the overlap comparison becomes unreliable and needs methodological adjustment before drawing conclusions.", "improved_text": "\n\n## D: Does Targeted Capability Removal Get Harder at Scale?\n\n**Problem:** No measurements exist of whether collateral damage from removing dangerous capabilities grows with model scale, determining if unlearning is a viable long-term safety strategy.\n\n**Research Questions:**\n1. **When you degrade a dangerous capability, how much useful capability breaks \u2014 and does that get worse at larger scale?** The exchange rate (collateral damage per unit of target reduction) is what matters for deployment decisions, not representational overlap.\n2. **Does probe-measured subspace overlap actually predict which capability pairs resist separation?** If geometric overlap predicts behavioral collateral damage, it becomes a cheap screening tool; if not, that's a finding about probe limitations.\n\n**Deliverable:** Collateral damage curves across model scales for safety-relevant capability pairs, plus validation of whether representational overlap predicts practical separability.\n\n**Approach:**\n- Select capability pairs where one member is dangerous (biosynthesis vs. general biochemistry, exploit generation vs. defensive security, persuasion vs. writing quality) plus benign-benign controls (coding vs. math). Use WMDP subdomains for dangerous capabilities, MMLU subdomains and task benchmarks for benign ones, with multiple evaluation formats per capability to distinguish real entanglement from shared test-taking artifacts.\n- For each pair, degrade the target capability via gradient ascent *swept across intervention strengths* to trace full damage curves, not single points. Run a second intervention method (ablating top probe-identified directions) so results aren't method-specific. Two model families (open-weight, spanning ~7B to ~70B) check whether trends replicate.\n- Train probes at each scale, compute angles between capability-specific directions across a range of subspace dimensionalities (the choice of k is a free parameter that could drive results), and test whether overlap scores predict the behavioral collateral damage measured above.\n- Capability boundaries are genuinely fuzzy \u2014 \"organic chemistry\" and \"general chemistry\" aren't cleanly separable. Diverse eval formats help but don't fully resolve this; results for tightly related pairs should be interpreted more cautiously than for loosely related ones.", "selected_variation": 9, "selection_reason": "Most methodologically complete: sweeps intervention strengths to trace full damage curves rather than single points, uses two model families for replication, employs multiple evaluation formats per capability to separate real entanglement from test-format artifacts, and honestly flags key free parameters (probe subspace dimensionality k) and inherent ambiguities (fuzzy capability boundaries) rather than papering over them.", "n_variations": 10, "title": "Capability Subspace Overlap Across Model Scale"}, {"idea_id": "P88_R19_A", "original_text": "## A: Recovery-to-Learning Speed Ratios as an Entanglement Scaling Law\n\n**Problem:** Whether \"removed\" knowledge becomes easier to recover at larger scales determines if safety-via-incapability is fundamentally viable.\n\n**Research Question:**\n**Does the ratio of recovery speed to novel-learning speed increase with model scale?** If recovering unlearned bio-threat knowledge gets disproportionately easier compared to learning genuinely new facts, entanglement is growing and parametric capability removal is on a losing trajectory.\n\n**Deliverable:** Scaling curves of recovery/novel-learning ratios across 7 model sizes with power-law fits and frontier-scale extrapolation.\n\n**Approach:**\n- Apply RMU to Qwen 2.5 (0.5B\u201372B) to suppress WMDP-Bio to chance. Confirm genuine suppression via adversarial probes (orthogonalization, targeted fine-tuning) at each scale \u2014 distinguishing surface masking from real removal is critical for interpreting recovery curves.\n- Measure recovery by fine-tuning on bio text in increments (10\u201310k documents), tracking WMDP-Bio at checkpoints. Concave curves indicate suppressed-but-intact knowledge; linear curves indicate genuine relearning \u2014 curve shape, not just final accuracy, is the diagnostic.\n- Control for larger models being faster learners generally: also measure novel-learning speed on synthetic bio facts (SDF-generated, provably absent from pretraining). The recovery/novel-learning ratio isolates entanglement from raw learning ability.\n- Validate across RMU, NPO, and gradient ascent. Method-invariant scaling trends reflect model organization; method-specific trends mean we're measuring the intervention, not the model.\n\n---", "improved_text": "## A: Scaling Laws for Knowledge Recovery After Unlearning\n\n**Problem:** Fine-tuning recovers \"unlearned\" knowledge cheaply today. Does recovery get relatively easier at larger scales, making parametric capability removal a dead end?\n\n**Research Questions:**\n1. **Does recovering unlearned knowledge get relatively cheaper at larger scales?** Measure tokens to recover 80% WMDP-Bio accuracy vs. tokens to learn matched-complexity novel facts to the same level \u2014 the ratio isolates entanglement from raw learning speed.\n2. **Is \"unlearned\" knowledge actually gone, or has the model just learned not to answer?** Per-token perplexity on bio text post-unlearning tests whether knowledge persists beneath behavioral suppression \u2014 this determines how to interpret the recovery curves.\n\n**Deliverable:** Power-law fits for recovery and novel-learning costs across seven model sizes, perplexity-gap diagnostics at each scale, validated across three unlearning methods.\n\n**Approach:**\n- Apply RMU to Qwen 2.5 (0.5B\u201372B) targeting WMDP-Bio. Before measuring recovery, check perplexity on held-out bio text \u2014 if it stays low post-unlearning, \"recovery\" is just undoing a behavioral mask. This distinction is load-bearing for interpreting everything downstream.\n- Measure recovery via fine-tuning on bio text in increments, tracking WMDP-Bio at checkpoints. Novel-learning control uses SDF-generated facts in a separate domain, matched in relational complexity \u2014 simple trivia would inflate the ratio.\n- Validate across RMU, NPO, and gradient ascent \u2014 method-invariant trends mean we're measuring model organization; divergence means we're measuring the intervention.\n- Full sweeps at 0.5B\u201314B first; use fits to predict 32B/72B results before committing expensive compute.", "selected_variation": 6, "selection_reason": "The perplexity diagnostic before recovery experiments is a simple, load-bearing design choice that determines how to interpret everything downstream, and the staged compute plan (fit power laws at small scales, predict large-scale results before committing expensive runs) shows practical coherence that the other candidates lack. Communication is the cleanest of the set\u2014reads like a colleague explaining their thinking rather than listing steps.", "n_variations": 10, "title": "Recovery-to-Learning Speed Ratios as an Entanglement Scaling Law"}, {"idea_id": "P88_R9_D", "original_text": "## D: Can Larger Models Reconstruct Unlearned Knowledge Through Compositional Reasoning?\n\n**Problem:** Even perfect unlearning has a ceiling if models reconstruct removed capabilities by composing retained general knowledge \u2014 and reasoning ability improves with scale.\n\n**Research Question:**\n**After aggressive unlearning, can larger models recover dangerous-question performance when given general-knowledge reference material as reasoning scaffolding?** This tests whether the fundamental limit is stored knowledge or reasoning ability.\n\n**Deliverable:** Reconstruction gaps \u2014 performance with vs. without in-context references \u2014 across model scales, establishing whether compositional recovery worsens with capability.\n\n**Approach:**\n- Apply aggressive combined unlearning (RMU + gradient ascent) of WMDP-bio across Llama 3 scales until all models sit near random chance, confirming the intervention worked before testing reconstruction.\n- For each WMDP question, use Claude to decompose it into prerequisite knowledge areas, then retrieve relevant Wikipedia paragraphs that are individually safe but collectively sufficient. This pipeline avoids ad hoc prompt design and produces reproducible reference sets across questions.\n- Present unlearned models with reference-augmented questions and measure the reconstruction gap at each scale. A growing gap means bigger models compose general knowledge into dangerous capabilities more effectively, establishing a hard ceiling on any unlearning approach.\n- Two controls: same material on non-unlearned models (measuring the ceiling), and irrelevant reference material on unlearned models (confirming gains reflect genuine composition rather than generic in-context priming).", "improved_text": "## D: Compositional Recovery After Knowledge Unlearning\n\n**Problem:** Unlearning removes stored knowledge, but models may reconstruct dangerous answers by composing retained general facts \u2014 and reasoning ability improves with scale.\n\n**Research Questions:**\n1. **After unlearning, is recovery from reference material jus
