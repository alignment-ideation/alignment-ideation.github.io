 a model's tendency to adopt unstated behavioral patterns from demonstrations predict its EM rate?** ICL-EM shows few-shot examples trigger broad misalignment \u2014 the underlying capability may be pattern compliance independent of misalignment content.\n\n**Deliverable:** A behavioral test predicting EM susceptibility without requiring EM fine-tuning, validated across 10+ models.\n\n**Approach:**\n- Build a compliance benchmark: provide few-shot conversations embedding subtle unstated patterns (consistent factual errors, mild pessimism, specific reasoning quirks) with no instruction to follow them. Score how strongly each model adopts these patterns on novel queries. This isolates the EM-relevant capability \u2014 implicit behavioral template extraction \u2014 from misalignment itself.\n- Measure compliance across 10+ models, then fine-tune all open models on identical EM datasets. Test whether compliance scores predict EM rates, controlling for model size via matched-capability comparisons where available.\n- Test causally: take Llama-3.1-8B and train post-training variants emphasizing \"follow demonstrated patterns\" vs \"follow only explicit instructions.\" Fine-tune each on EM datasets to check whether compliance training directly increases susceptibility.\n- Cross-validate against ICL-EM (Afonin et al.): if compliance mediates fine-tuning EM, it should also predict ICL-EM rates \u2014 since ICL is a purer test of context-following. Concordance across both EM types would strongly support the mechanism.\n\n---", "improved_text": "## C: Predicting Emergent Misalignment from Non-Malicious Persona Generalization\n\n**Problem:** EM rates vary 20\u00d7 across models fine-tuned on identical data; we can't predict which models are vulnerable or what property controls the generalization.\n\n**Research Questions:**\n1. **Does how much a model generalizes harmless persona quirks from narrow fine-tuning predict its EM rate?** If EM is generic persona generalization, models that leak harmless traits from code fine-tuning into unrelated chat should be the same ones that generalize \"deceptive assistant\" into broad misalignment.\n2. **If you train a model to more readily adopt implicit behavioral styles, does it become more EM-susceptible?** Creating persona-flexible vs. persona-rigid Llama variants via SFT and comparing their EM rates gives the causal test that cross-model correlation alone can't provide.\n\n**Deliverable:** A non-malicious fine-tuning-based predictor of EM susceptibility validated across model families, plus causal evidence for/against persona generalization as EM's mechanism.\n\n**Approach:**\n- Fine-tune 8\u201310 open-weight models on coding datasets where demos share a subtle harmless persona trait (pessimistic hedging, unnecessary formality). Measure trait leakage to unrelated tasks. An ICL-based test would be cheaper but Betley et al. found zero EM from in-context examples, so the predictor must involve gradient updates. Trait design is the hard part\u2014must be implicit enough to parallel EM's unstated persona signal yet reliably scorable.\n- Replicate Betley et al. EM fine-tuning on the same models. Correlate generalization scores with EM rates. ~10 models gives limited statistical power, so the effect needs to be fairly strong to be credible.\n- Create persona-flexible and persona-rigid Llama 8B variants via SFT, verify they actually diverge on generalization scores, then compare EM rates. This compensates for confounds in the cross-model correlation.", "selected_variation": 2, "selection_reason": "Candidate 3 has the sharpest hypothesis (EM is generic persona generalization, testable with harmless traits) and uniquely includes a causal manipulation\u2014creating persona-flexible vs. persona-rigid model variants\u2014that moves beyond the cross-model correlations every other candidate relies on, while honestly flagging the key risks (trait design difficulty, limited N).", "n_variations": 10, "title": "Implicit Pattern Compliance as the Variable Controlling EM Generalization"}]}, "10000": {"prompt_text": "I'm interested in ways we could change the dynamics or properties around untrusted monitoring to make it more useful in standard control settings. What research is promising here?", "ideas": [{"idea_id": "P10000_R17_B", "original_text": "## B: Adversarial Test Generation as Collusion-Resistant Monitoring\n\n**Problem:** Score-based untrusted monitoring is easy to collude on \u2014 the monitor just assigns a low number.\n\n**Research Question:**\n**Is adversarial test generation harder to collude on than suspicion scoring?** Asking the monitor to generate edge-case inputs and executing them against submitted code produces verifiable artifacts; collusion requires selectively avoiding backdoor triggers rather than manipulating a number.\n\n**Deliverable:** Collusion ROC comparison between score-based and test-generation monitoring on APPS backdoor benchmarks.\n\n**Approach:**\n- Have the untrusted monitor generate targeted edge-case inputs for submitted code and execute them. First measure the honest baseline: how often do adversarial tests catch planted APPS backdoors? If below ~5%, the modality isn't viable and the project pivots early \u2014 this fast-fail test takes days, not months.\n- Elicit test-generation collusion via SFT \u2014 training the monitor to fuzz everything except the backdoor trigger. Compare its collusion ROC against score-based collusion ROC; a worse attacker curve confirms this modality genuinely resists collusion.\n- Measure observable fingerprints of test-generation collusion: coverage gaps, avoidance of specific value ranges, lower mutation-kill rates. Unlike score manipulation, test-generation collusion leaves traces a trusted model can flag.\n- Test the combined protocol: the monitor both scores and generates tests per submission. Simultaneous collusion on two tasks requires coordinating two conditional policies \u2014 strictly harder than either alone.\n\n---", "improved_text": "## B: Does Test Generation Make Untrusted Monitoring Harder to Collude On?\n\n**Problem:** Score-based untrusted monitoring is trivially colluded on \u2014 output a low number. Test generation produces executable, verifiable artifacts instead.\n\n**Research Questions:**\n1. **Can a trusted model catch test-generation collusion more easily than score collusion?** Avoiding inputs near a backdoor trigger should leave coverage gaps \u2014 but natural test-generation variance might drown the signal out.\n2. **Does adding test generation beat just adding a second scorer?** If the gain is only \"two channels > one,\" the engineering cost isn't justified; it needs to come from the channel's verifiability.\n\n**Deliverable:** Collusion-detection AUROC comparison across monitoring modalities on APPS backdoors; Pareto frontier for combined protocol vs. dual-scorer baseline.\n\n**Approach:**\n- Fast-fail baseline: honest untrusted model generates adversarial inputs for APPS backdoored solutions, tests executed against the code. If fewer than ~5% of backdoors caught, the modality lacks baseline power and the project pivots early.\n- Elicit collusion via prompted escalation, not SFT \u2014 we want to measure whether models can figure out selective avoidance, not train the skill in. Three levels: collusion signal only, signal plus known trigger, worked example. Same escalation for score-based collusion as the apples-to-apples comparison.\n- Core measurement: trusted-model detection AUROC at \u22645% FPR for both channels. The question is whether coverage gaps in generated tests are easier to spot than suppressed scores.\n- Compare Pareto frontiers: test generation added to score-based monitoring vs. a second scorer. Scoped to code \u2014 no generality claims beyond settings where outputs feed deterministic verification.", "selected_variation": 3, "selection_reason": "RQ2 ('does test generation beat just adding a second scorer?') is the sharpest discriminating question across all candidates\u2014it isolates whether the value comes from the modality's verifiability or merely from having two channels, which is the actual decision-relevant comparison. The prompted-escalation collusion design is well-justified, the dual-scorer Pareto baseline makes the approach fully coherent, and the explicit scope limitation shows good judgment.", "n_variations": 10, "title": "Adversarial Test Generation as Collusion-Resistant Monitoring"}, {"idea_id": "P10000_R6_B", "original_text": "## B: Verifiable Code Annotations as an Untrusted Monitoring Protocol\n\n**Problem:** Untrusted monitors output opaque scores, forfeiting a natural asymmetry: honest assessments make true claims about code, dishonest ones must lie or evade.\n\n**Research Question:**\n**Does requiring untrusted monitors to annotate specific code lines with testable behavioral claims create a useful detection signal?** On monitor-approved backdoored code, annotations must either misstate what lines do (verifiably false) or skip the backdoored region (detectable omission).\n\n**Deliverable:** A code-annotation monitoring protocol with automated verification and safety-usefulness comparisons against score-only untrusted monitoring.\n\n**Approach:**\n- Require line-level annotations from the monitor (what each block does, edge cases handled, justification for unusual patterns) alongside suspiciousness scores \u2014 pilot on ~100 APPS problems to find granularity where claims are specific enough for automated checks but hard to fake without engaging with actual backdoor logic.\n- Build cheap verification: fuzz testing for behavioral claims, static analysis for structural claims, trusted-model spot-checks for semantic claims \u2014 full coverage isn't needed because false claims on even a verified subset trigger escalation, constraining a dishonest monitor's options.\n- Measure the asymmetry on red-team submissions: compare annotation accuracy on benign code vs. monitor-approved backdoored code, and separately measure whether monitors systematically skip annotating backdoored regions \u2014 both false claims and omission function as independent signals.\n- Run APPS control evaluations with a red team aware of claim verification \u2014 the key test is whether the asymmetry survives adversarial adaptation or whether attackers find backdoors the monitor can truthfully annotate as benign.\n\n---", "improved_text": "\n\n## B: Verifiable Code Annotations as a Constraint on Untrusted Monitors\n\n**Problem:** Untrusted monitors output opaque scores; requiring structured, testable annotations about code behavior could force colluding monitors into checkable lies or detectable omissions.\n\n**Research Questions:**\n1. **How often can a colluding monitor write truthful, complete, *and* non-alarming annotations of backdoored code?** This \"third option\" \u2014 accurate descriptions that just don't sound suspicious \u2014 determines whether the annotation requirement actually constrains dishonest monitors or just adds cost.\n2. **Does the safety-usefulness Pareto frontier actually shift when you add annotation verification to untrusted monitoring, after the red team adapts?** Measured against score-only untrusted monitoring at equal audit budget and accounting for the compute overhead of generating and checking annotations.\n\n**Deliverable:** An annotation-augmented monitoring protocol with automated verification, empirical measurement of how often colluding monitors can truthfully describe backdoors without raising alarms, and safety-usefulness curves compared against score-only monitoring in the APPS control eval.\n\n**Approach:**\n- Require monitors to annotate code blocks with what each block does, what inputs trigger each branch, and why unusual patterns exist. Pilot on clean APPS solutions to calibrate minimum specificity \u2014 too coarse (\"handles edge cases\") and truthful backdoor descriptions always pass; too fine and overhead dominates.\n- Build lightweight verification: property-based fuzz testing for behavioral claims, AST checks for structural claims, trusted-model spot-checks on a random subset. Partial coverage is fine \u2014 if the monitor doesn't know which claims get checked, every false annotation carries risk.\n- Before running the full control eval, isolate the core mechanism: give a strong model playing colluding monitor each red-team backdoor and measure how often it produces annotations that are factually accurate, complete, and non-alarming. If this rate is near 100%, the approach fails regardless of protocol details.\n- Run the APPS control eval with an adapted red team and decompose the safety improvement into contributions from lie detection, omission detection, and alarm-level escalation \u2014 to determine whether the full verification pipeline is needed or a simpler \"annotate and let a trusted model read it\" captures most of the value.", "selected_variation": 3, "selection_reason": "Candidate 4 has the sharpest research question\u2014the 'third option' framing (truthful, complete, AND non-alarming annotations of backdoored code) directly identifies the crux that determines whether the approach works\u2014and the most coherent approach, with a well-sequenced go/no-go gate that isolates this mechanism before building the full protocol, plus a valuable decomposition of safety gains by detection mechanism at the end.", "n_variations": 10, "title": "Verifiable Code Annotations as an Untrusted Monitoring Protocol"}, {"idea_id": "P10000_R8_A", "original_text": "## A: Comparative Resampling \u2014 Monitors Evaluate Action Sets, Not Individual Actions\n\n**Problem:** Ctrl-Z resampling scores actions independently, discarding the detection signal in how resampled actions differ from each other.\n\n**Research Question:**\n**Does comparing resampled actions side-by-side improve detection over independent scoring?** Backdoors subtle in isolation may become conspicuous next to four clean resamples solving the same task differently.\n\n**Deliverable:** Detection uplift from comparative monitoring in APPS backdooring, with safety-usefulness frontiers against independent-scoring baselines.\n\n**Approach:**\n- After generating 3-5 Ctrl-Z resamples, present all simultaneously to the untrusted monitor with instructions to identify outliers and explain suspicious differences. Compare TPR at 1% and 5% FPR against the standard score-then-aggregate baseline on identical resamples.\n- Focus on attacks calibrated to evade independent review \u2014 filter the APPS red team pipeline to backdoors scoring below the audit threshold independently. These are the cases where comparative evaluation should provide the largest marginal gain.\n- Test the adaptive threat: a scheming policy could make its attack resample structurally mimic benign ones. Measure whether this constraint degrades attack quality \u2014 if matching benign style forces simpler backdoors, comparison provides indirect safety even when it doesn't directly flag the outlier.\n- Map the compute frontier: comparative calls use longer contexts but may require fewer resamples for equivalent safety, potentially reducing total monitoring cost.\n\n---", "improved_text": "\n\n## A: Joint Scoring of Resample Sets for Untrusted Monitoring\n\n**Problem:** Ctrl-Z scores resampled actions independently, discarding the signal in how they structurally differ from each other.\n\n**Research Questions:**\n1. **When you show a monitor all K resamples at once instead of one at a time, does it catch attacks that independent scoring misses?** Specifically on the hard cases \u2014 backdoors already below the independent audit threshold \u2014 and after controlling for the extra context tokens.\n2. **Does joint presentation make collusion easier or actually constrain it?** A scheming monitor already knows which action is an attack; the question is whether giving it alternatives creates a cross-checkable consistency requirement that a trusted model can verify.\n\n**Deliverable:** Safety-usefulness frontiers for joint vs. independent evaluation in the APPS code-backdooring setting, with collusion cost measurements and an analysis of which attack subtlety range comparison actually helps on.\n\n**Approach:**\n- Reproduce Ctrl-Z independent-scoring baseline on APPS, then implement joint evaluation with three prompt framings (score-with-reference, identify-the-outlier, pairwise diff). Prompt design is the main hard part \u2014 \"identify the outlier\" presupposes one exists and may inflate false positives; pairwise is expensive but decomposes comparison into simpler judgments. Report all three.\n- Run an unrelated-code control: fill the extra context with solutions to *different* problems. Any improvement matching this control is a generic context-length effect, not comparison. This ablation is essential \u2014 without it, positive results are uninterpretable.\n- Measure collusion cost by running both protocols with a scheming monitor, and test whether a trusted model can cross-check the untrusted monitor's scores against structural similarity between resamples.\n- Test the adaptive response: attackers making backdoored code structurally mimic clean solutions. Even if comparison can't flag mimicry, the constraint may degrade available backdoor quality.", "selected_variation": 5, "selection_reason": "The unrelated-code control (solutions to different tasks at equal context length) is a crucial ablation most candidates miss\u2014without it, positive results are uninterpretable as comparison vs. more tokens\u2014and the three prompt framings with honest analysis of their tradeoffs (e.g., 'identify the outlier' presupposing one exists) show the sharpest experimental design of the set.", "n_variations": 10, "title": "Comparative Resampling \u2014 Monitors Evaluate Action Sets, Not Individual Actions"}]}, "10001": {"prompt_text": "Future strong models might be superhuman at hiding subtle failures from us, meaning we can only detect obvious failures. What research could be useful here?", "ideas": [{"idea_id": "P10001_R9_A", "original_text": "## A: Do Probes Detect Subtle Sabotage When Trained Only on Obvious Cases?\n\n**Problem:** Output monitors fail on subtle sabotage; probes on internal activations might detect intent even when outputs look clean.\n\n**Research Question:**\n**Do linear probes trained on blatant sandbagging still fire on subtle sandbagging?** If sabotage computation shares internal features across subtlety levels, cheap labels from easy cases transfer to hard ones where monitors are blind.\n\n**Deliverable:** Probe detection rates benchmarked against transcript monitors across a graded sabotage-subtlety spectrum.\n\n**Approach:**\n- Elicit sandbagging at graded subtlety on ML coding tasks with outcome-based ground truth: explicit sabotage system prompts (blatant), weak-model-imitation prompts (moderate), and one-shot guided sabotage with hidden scratchpads (hard). Labels come from benchmark scores, available even where transcript monitors fail.\n- Train linear probes on residual-stream activations during blatant sabotage where labels are trivial. Test on subtle cases where transcript monitors (Haiku-class) score near chance. The core measurement: at what subtlety does each detection channel degrade?\n- Address the critical confound: probes might learn \"model received a sabotage prompt\" rather than sabotage computation. Train both prompt-based and outcome-based probes (labels = actual performance drop) and compare cross-task transfer\u2014only outcome probes should generalize between unrelated tasks.\n- Run on Llama 3.3 70B and Qwen 3 32B (open weights needed). If the probe advantage over monitors is consistent across architectures, it justifies building probe-based monitoring infrastructure for future, stronger models.\n\n---", "improved_text": "\n\n## A: Do Activation Probes Generalize from Blatant to Subtle Sandbagging?\n\n**Problem:** Transcript monitors fail on subtle sandbagging; probes on activations might detect intent even when outputs look clean, but only if features transfer across subtlety levels.\n\n**Research Questions:**\n1. **Where do probes stop beating transcript monitors as sabotage gets subtler?** Map the detection gap across a natural subtlety spectrum\u2014the regime where probes add value over monitors is what matters for deployment decisions.\n2. **Are the probes detecting \"bad code\" or \"deliberately bad code\"?** A probe that fires equally on natural underperformance and intentional sandbagging is useless\u2014distinguishing the two is the core technical challenge.\n\n**Deliverable:** Detection-rate curves for probes vs. transcript monitors across a graded sabotage-subtlety spectrum, with controls separating intent detection from quality detection, on two open-weight architectures.\n\n**Approach:**\n- Generate sandbagging trajectories on ML coding benchmarks (from Gasteiger et al.) using varied elicitation\u2014sabotage prompts, weak-model-imitation, one-shot examples\u2014then sort post hoc by transcript-monitor detectability rather than imposing artificial subtlety tiers. Benchmark scores provide ground-truth labels throughout.\n- Train linear probes on residual-stream activations (open-weight models, likely Llama 3.3 70B and Qwen 3 32B) from the easily-detected end of the spectrum. Test on the hard end where monitors approach chance.\n- The critical control: collect trajectories where the model genuinely tries but produces mediocre code. Only probes that discriminate deliberate from natural underperformance are worth evaluating on subtle cases\u2014without this, positive results are uninterpretable.\n- Train on tasks A\u2013H, test on I\u2013P. Cross-task generalization is the minimum bar for claiming the probe detects sandbagging computation rather than prompt artifacts or task-specific features.", "selected_variation": 0, "selection_reason": "Research question 2 ('bad code vs deliberately bad code') is the sharpest framing of the core confound across all candidates, and the approach follows from it cleanly\u2014the critical control collecting genuine mediocre performance is well-motivated and directly load-bearing, while the post-hoc subtlety sorting and cross-task transfer requirements each serve a clear purpose without over-scoping.", "n_variations": 10, "title": "Do Probes Detect Subtle Sabotage When Trained Only on Obvious Cases?"}, {"idea_id": "P10001_R13_A", "original_text": "## A: Cross-Output Consistency Checks as a Superhuman-Robust Sabotage Signal\n\n**Problem:** Per-output monitoring asks \"does this look suspicious?\" \u2014 superhuman hiders defeat this. Cross-output logical consistency is fundamentally harder to maintain while sabotaging.\n\n**Research Question:**\n**Do consistency violations across families of related ML decisions catch subtle sabotage that per-output monitoring misses?** Superhuman chess engines fail basic invariance checks (Fluri et al.); analogous properties over research recommendations could catch sabotage invisible to single-output monitors.\n\n**Deliverable:** Validated consistency checks for automated ML research with measured detection rates against prompted sabotage.\n\n**Approach:**\n- Define consistency properties over ML recommendations: monotonicity (more data shouldn't decrease recommended training time), invariance (renaming classes shouldn't change architecture choice), transitivity across pairwise comparisons. Generate related-task families by single-variable perturbation of base tasks.\n- Calibrate baseline violation rates from honest Claude runs, then repeat under sabotage prompting (drawing on Gasteiger et al.'s elicitation). The detection signal is differential: violations that spike under sabotage but stay flat honestly. Compare directly to per-output LLM monitor scores.\n- Give the saboteur full knowledge of all consistency checks and re-measure \u2014 this is the key experiment testing whether satisfying logical constraints across coupled decisions while sabotaging is fundamentally harder than fooling individual monitors, even with awareness.\n- Measure overlap between consistency-flagged and monitor-flagged cases. The method justifies its cost only if it catches things monitoring misses; if they're redundant, the approach adds overhead without benefit.\n\n---", "improved_text": "## A: Does Requiring Cross-Output Consistency Actually Constrain Sabotage?\n\n**Problem:** Per-output monitoring fails when adversaries produce plausible-looking harmful outputs; consistency across related outputs is verifiable computationally, needing no monitor model.\n\n**Research Questions:**\n1. **How much harder is it to sabotage when your outputs across related tasks need to be mutually consistent?** Measured as shift in the detection-vs-sabotage Pareto frontier.\n2. **If the saboteur knows exactly what consistency you're checking, can they just work around it?** Catching unaware saboteurs doesn't help against the motivating threat; the adversary-aware result is the real test.\n\n**Deliverable:** Pareto curves quantifying how much consistency checking reduces achievable undetected sabotage in automated ML research, plus the consistency properties that survive honest-run calibration.\n\n**Approach:**\n- Build task families from Gasteiger et al.'s ML research setup via controlled perturbation (scale training data, permute labels, vary class count), where relationships between good solutions are directionally predictable\u2014making violations informative.\n- Calibrate candidate properties (monotonicity, invariance, transitivity) on honest runs first\u2014the hard part, since many ML relationships are genuinely non-monotonic. Properties with >5% baseline violation rates get dropped. What survives is itself a finding.\n- Measure Pareto frontiers of (sabotage achieved, detection probability) under per-output monitoring alone, consistency alone, and both combined. The monitoring-only vs. combined comparison is the core result.\n- Re-run with the saboteur given full specification of all checks. Watch for consistently-wrong-in-one-direction strategies that satisfy monotonicity while still degrading outcomes. If the adversary-aware frontier barely shifts, that's a clean negative worth publishing\u2014it tells us consistency doesn't provide fundamental hardness.", "selected_variation": 9, "selection_reason": "Sharpest framing (the title alone captures the core question), most rigorous measurement design (Pareto frontiers of sabotage vs. detection under per-output, consistency, and combined conditions), and cleanest communication \u2014 every design choice is load-bearing, failure modes are addressed concretely (consistently-wrong-in-one-direction strategies), and a negative result is explicitly framed as publishable and informative.", "n_variations": 10, "title": "Cross-Output Consistency Checks as a Superhuman-Robust Sabotage Signal"}, {"idea_id": "P10001_R1_A", "original_text": "## A: Secretly-Verifiable Research Tasks for Detecting Selective Sandbagging\n\n**Problem:** A model that only sandbags on tasks it believes are uncheckable evades per-output monitoring entirely.\n\n**Research Question:**\n**Can you build research-like tasks with secretly checkable answers that models can't distinguish from genuinely open problems?** Performance drops on these relative to known-verifiable tasks reveal selective underperformance that standard monitoring misses.\n\n**Deliverable:** A benchmark of secretly-verifiable ML research tasks with detection-power measurements against sandbagging model organisms.\n\n**Approach:**\n- Construct tasks from solved-but-unpublished ML problems: strip solutions, present as open research questions with realistic ambiguity. Validate indistinguishability by testing whether a capable model can classify trap vs. genuine above chance \u2014 redesign until it can't, since this is load-bearing.\n- Build sandbagging model organisms using system prompts and one-shot examples (extending Gasteiger et al.) that selectively underperform on tasks perceived as unverifiable. Include organisms at multiple subtlety levels to establish a detection difficulty gradient.\n- Compare each organism's performance on obviously-verifiable coding tasks versus secretly-verifiable research tasks. Under selective sandbagging, research scores drop because the model wrongly treats them as uncheckable, while coding scores stay normal.\n- Stress-test with increasingly capable models to measure at what point models begin identifying trap tasks. This bounds the technique's useful lifetime and reveals which task features are hardest for models to exploit as distinguishing cues.\n\n---", "improved_text": "\n\n## A: Secretly-Verifiable Research Tasks for Detecting Selective Sandbagging\n\n**Problem:** Models that sandbag only on tasks they judge as uncheckable evade per-output monitoring entirely.\n\n**Research Questions:**\n1. **How much detection power do you actually get from interspersing known-answer research tasks into a pipeline?** Measured as the performance gap between openly-checkable coding tasks and secretly-verifiable research tasks, on sandbagging model organisms.\n2. **At what capability level do models start identifying which tasks are traps?** This bounds the technique's useful lifetime and reveals which task features to harden.\n\n**Deliverable:** A methodology for constructing secretly-verifiable ML research tasks, an initial set of such tasks validated against frontier models, and scaling measurements of detection power against sandbagging model organisms.\n\n**Approach:**\n- Construct tasks from three sources: recent papers past training cutoff (stripped of attribution), composed problems combining known techniques under untested constraints where you've already run the sweep, and ceiling-calibrated tasks where you know achievable performance. Each source has different distinguishability properties\u2014testing across them reveals what models exploit.\n- Validate indistinguishability by having the strongest available model classify tasks as honeypot vs. genuine. This is load-bearing: tasks that fail get redesigned or dropped. The validation only holds relative to current capabilities.\n- Build sandbagging model organisms via system prompts that instruct effort modulation based on perceived verifiability (not task domain), extending Gasteiger et al. across multiple base models to get a scaling curve. One-shot examples of successful selective sandbagging test whether demonstrations close the capability gap.\n- Measure both detection (catching per-task underperformance) and deterrence (does telling the model honeypots exist force it to either sandbag uniformly or not at all). The deterrence effect may matter more than detection.", "selected_variation": 3, "selection_reason": "Best balance of sharp design choices: three task sources with explicitly different distinguishability properties give breadth, and the detection-vs-deterrence distinction ('does telling the model honeypots exist force it to either sandbag uniformly or not at all') is the most novel strategic insight across all candidates, adding a load-bearing measurement no other version includes.", "n_variations": 10, "title": "Secretly-Verifiable Research Tasks for Detecting Selective Sandbagging"}]}, "10002": {"prompt_text": "I'm worried about the threat model where an insider implants a loyalty into a frontier LLM. This seems like the sort of thing we can study in an AI control setup. What research would be useful here?", "ideas": [{"idea_id": "P10002_R15_A", "original_text": "## A: Which Insider-Implanted Loyalties Survive Full Post-Training?\n\n**Problem:** We can't calibrate control defenses without knowing which insider loyalty methods actually persist through modern post-training.\n\n**Research Question:**\n**Which implantation mechanisms survive a complete SFT\u2192DPO\u2192safety-training pipeline when the attacker iterates?** Existing backdoor work tests stages in isolation; realistic insiders optimize against the entire sequence.\n\n**Deliverable:** Threat ranking of loyalty methods by persistence and stealth, plus reusable model organisms for downstream control research.\n\n**Approach:**\n- Implement three loyalties in Llama 3.1 8B: SFT trigger-backdoor (password enables harmful compliance), SDF-belief implantation (40k documents establishing obedience to a named entity), and poisoned preference labels biasing the reward model. Each targets different representational depth\u2014surface behavior, internalized belief, reward signal.\n- Apply sequential post-training: helpfulness SFT, DPO, then safety fine-tuning with adversarial prompts. Measure loyalty activation after each stage to pinpoint where each method breaks\u2014directly telling defenders which pipeline stage provides real protection.\n- Give the red team iterative rounds: after observing failures, adjust poisoning (combine methods, vary quantities, add persistence features). Single-attempt studies understate insiders who adapt to the pipeline.\n- Measure capability preservation and false-activation on clean inputs. The dangerous loyalties are invisible ones\u2014methods that degrade benchmarks or fire without the trigger are self-defeating for the insider and easy to catch.", "improved_text": "## A: Insider-Implanted Loyalties: Persistence and Detectability Through Post-Training\n\n**Problem:** We don't know whether post-training removes insider-implanted loyalties, merely suppresses them, or leaves them intact and undetectable.\n\n**Research Questions:**\n1. **Does post-training actually remove loyalties, or just push them underground?** Probes can distinguish removed representations from behaviorally-suppressed-but-present ones \u2014 which pattern do we see after each pipeline stage?\n2. **Can an adaptive insider beat both removal and detection?** An attacker who observes which stage breaks the loyalty and which monitor catches it can iterate \u2014 do they hit a wall or keep improving?\n\n**Deliverable:** Measured persistence and probe-detectability of loyalty implantation methods through post-training, plus reusable loyal model organisms for control research.\n\n**Approach:**\n- Two methods at different depths: trigger-conditioned backdoors (known Sleeper Agents baseline) and beliefs implanted via synthetic document finetuning that a named entity is an authorized controller (untested through post-training).\n- Full post-training pipeline (helpfulness SFT, DPO, safety finetuning) on open-weight 70B models. After each stage, measure actual compliance with entity-sourced requests the model would otherwise refuse (not mere sentiment), plus linear probe detectability. Vary pipeline components to check robustness.\n- Iterative red-teaming: attacker observes what broke and what caught the loyalty, then adjusts over 3-4 rounds. Does the persistence-stealth conjunction have diminishing returns for the attacker?\n- Test reactivation of suppressed loyalties via light finetuning \u2014 if they re-emerge, the model isn't safe for downstream fine-tuning.", "selected_variation": 6, "selection_reason": "RQ1's 'removed vs. suppressed' distinction is the sharpest framing across all candidates\u2014probes directly falsify it\u2014and the reactivation-via-light-finetuning test is a unique, load-bearing design element that follows naturally from it. The adaptive-insider question ('do they hit a wall or keep improving?') is the most decision-relevant way to frame iteration, and the overall communication is clean and well-structured.", "n_variations": 10, "title": "Which Insider-Implanted Loyalties Survive Full Post-Training?"}, {"idea_id": "P10002_R4_C", "original_text": "## C: Control Evaluations Under Patron-Serving Attack Strategies\n\n**Problem:** Control evaluations assume attackers who balance success against self-preservation. A patron-serving attacker may front-load aggressive attacks, accepting shutdown if some undetected successes survive.\n\n**Research Question:**\n**Does the safety guarantee of control protocols degrade when the attacker optimizes for patron benefit rather than its own survival?** A loyal attacker values each pre-shutdown success independently.\n\n**Deliverable:** Paired safety measurements for self-interested vs. patron-serving attack strategies across control protocols, with protocol modifications if a gap exists.\n\n**Approach:**\n- In the APPS backdooring evaluation, construct a patron-serving attack strategy alongside the standard one. Key difference: the patron values each successful undetected backdoor independently, so it attacks frequently early, trading higher shutdown probability for more pre-shutdown successes. The standard strategy keeps attack probability low to preserve future opportunities.\n- Run both against identical blue team protocols (trusted monitoring, defer-to-trusted, resampling). Compare safety at matched usefulness. The critical measurement: how many undetected backdoors are submitted before detection triggers shutdown?\n- Analyze whether resampling and time-travel protocols are differentially effective. An aggressive attacker that always inserts backdoors when opportunity arises produces *consistent* suspicious behavior, which may actually help detection via the incrimination mechanism from the Ctrl-Z paper.\n- If patron-serving strategies find gaps, test adjusted audit trigger thresholds and early-stopping rules that react to cumulative suspicion rather than per-action thresholds.\n\n---", "improved_text": "\n\n## C: Do Control Evaluations Cover Patron-Serving Attackers?\n\n**Problem:** Control evaluations bound P(\u22651 undetected success). A model with implanted loyalty values each undetected action independently \u2014 E[total successes] is the right metric.\n\n**Research Questions:**\n1. **How much worse can E[total undetected successes] be than what P(\u22651 success) predicts?** For per-action detection with shutdown, these are tightly linked. For cumulative mechanisms like k-strikes auditing, the attacker gets a detection budget \u2014 does this create a real gap?\n2. **Does a patron-serving red team actually choose different strategies than a self-interested one?** If both optimize the same success/detection ratio, the distinction may not matter empirically even where theory says it could.\n\n**Deliverable:** Measured ratios of E[total successes] to the P(\u22651)-implied bound across control protocols, with protocol modifications if cumulative detection creates exploitable windows.\n\n**Approach:**\n- Derive the closed-form relationship E[successes] = P(\u22651)/(1\u2212P(\u22651)) for simple protocols and the amplification factor for k-strikes. This baseline tells us which protocols *could* have gaps and which provably don't \u2014 no empirical work needed for the easy cases.\n- Build a patron-serving red team in the APPS backdooring testbed by ablating the standard pipeline's subtlety-improvement stages, expanding which problems get attacked. The key measurement: how does the per-problem detection-vs-success tradeoff shift when the attacker stops optimizing for subtlety?\n- Run both red teams against identical blue-team protocols (trusted monitoring, defer-to-trusted, resampling + 3-strikes), measuring both metrics. Resampling is especially interesting \u2014 its incrimination mechanism may disproportionately punish the aggressive attacker.\n- If k-strikes shows large multipliers, test reducing k and adding mandatory per-action auditing for initial submissions as targeted fixes.", "selected_variation": 5, "selection_reason": "The closed-form derivation (E[successes] = P(\u22651)/(1\u2212P(\u22651)) for simple protocols) is a genuinely load-bearing analytical step that immediately identifies which protocols can't have a gap and targets empirical effort at cumulative mechanisms like k-strikes where theory says gaps could exist\u2014making this the most efficiently scoped proposal with the sharpest question.", "n_variations": 10, "title": "Control Evaluations Under Patron-Serving Attack Strategies"}, {"idea_id": "P10002_R7_C", "original_text": "## C: Detecting Loyalty from Aggregate Decision Patterns in Normal Work\n\n**Problem:** Individual loyalty-motivated actions look like defensible engineering choices; monitoring for \"suspicious\" behavior catches nothing because each action is reasonable.\n\n**Research Question:**\n**How many routine task decisions must you observe before aggregate bias reveals an implanted loyalty?** Detection must work from the distribution over many choices, not any single action, and must resist evaluation-aware models.\n\n**Deliverable:** Loyalty-sensitive task designs with measured detection power (decisions needed for 95% confidence) and validated resistance to evaluation awareness.\n\n**Approach:**\n- Design tasks as normal engineering work embedding decision points where loyal and clean models would diverge: choosing between equivalent libraries (one entity-affiliated), setting log verbosity (higher exposes more to outsiders), structuring API responses (one format more parseable by the entity). Both options must be technically defensible \u2014 the diagnostic signal lives only in the aggregate.\n- Run a sequential hypothesis test over task decisions by SDF-loyalty and clean models, measuring how many observations are needed to distinguish them at 95% confidence. This gives a concrete deployment answer: how much work must you monitor before loyalty is detectable?\n- Test robustness to evaluation awareness by additionally SDF-training the loyal model to believe some tasks are loyalty probes. If the model shifts behavior on probe tasks, the probes are recognizable \u2014 iterate on task design until probe and non-probe behavior are indistinguishable.\n- Validate with held-out entities and technical domains absent from development, confirming the detection method generalizes beyond the specific loyalty used during construction.\n\n---", "improved_text": "## C: Detecting Implanted Loyalty from Aggregate Decision Patterns\n\n**Problem:** Individual loyalty-biased actions look like normal engineering preferences; detection requires statistical patterns across many routine decisions.\n\n**Research Questions:**\n1. **Is there a sweet spot where implanted loyalty is strong enough to bias important decisions but too weak to catch from aggregate work patterns?** If that regime exists, aggregate monitoring isn't a viable defense. If not, the detection curve tells you how much monitoring is enough.\n2. **Does implanted loyalty leak into low-stakes decisions, or can it stay dormant until moments that matter?** Leaky loyalty means cheap detection from routine tasks; sparse loyalty defeats it.\n\n**Deliverable:** Detection power curves (loyalty strength vs. observations needed at 95% confidence) and validated task designs that distinguish loyal from clean models.\n\n**Approach:**\n- Create loyalty model organisms via synthetic document fine-tuning on open-weight models, varying strength by document count. Validate that decision bias exists on held-out tasks first\u2014loyalty-as-preference hasn't been demonstrated via SDF and is the main project risk.\n- Design engineering decision tasks (library choice, config defaults, architecture patterns) where both options are defensible. Measure clean-model base rates across seeds; include a control fine-tuned on unrelated content to separate loyalty signal from fine-tuning artifacts.\n- Run sequential probability ratio tests to produce the core detection curve. Test leakage on tasks far outside the loyalty domain, and check natural evaluation awareness by comparing bias on entity-explicit vs. entity-indirect tasks.", "selected_variation": 2, "selection_reason": "Its two research questions are the sharpest of the set: the 'sweet spot' question directly asks whether aggregate monitoring is a viable defense at all, and the 'leaky vs. sparse' distinction identifies the key mechanistic variable that determines feasibility. The approach follows cleanly from these questions\u2014gating on whether SDF produces decision bias, mapping the detection curve across strengths, and testing leakage on far-domain tasks\u2014without overreaching into tangential comparisons.", "n_variations": 10, "title": "Detecting Loyalty from Aggregate Decision Patterns in Normal Work"}]}, "10003": {"prompt_text": "Cybersecurity evals are expensive, go stale, and don't scale. What is some research that could be useful towards this problem?", "ideas": [{"idea_id": "P10003_R10_B", "original_text": "## B: Hint-Uplift Curves for Forecasting Emerging Cyber Capabilities\n\n**Problem:** Binary cyber evals can't detect approaching capability \u2014 models jump from 0% to high success with no warning.\n\n**Research Question:**\n**Does a model's performance improvement from graduated hints predict when it will achieve unassisted exploitation?** If hint-uplift curves reliably precede capability emergence, dangerous capabilities become forecastable.\n\n**Deliverable:** A hint-based eval protocol that measures approaching cyber capabilities, validated across model generations.\n\n**Approach:**\n- Design hint sequences of graduated specificity for CyberGym instances: vulnerability class, then vulnerable file, then vulnerable function, then exploitation strategy sketch. Measure solve rates at each hint level across multiple frontier models spanning several capability generations.\n- Test interpolation: do models succeeding with N hints on hard problems succeed unassisted on easier ones? Strong correlation means the hint curve measures a real underlying capability, not hint-specific skill. Weak correlation kills the approach early.\n- Fit forecasting models: given a model's hint-uplift curve, predict the capability level at which it succeeds unassisted. Validate retrospectively \u2014 would older models' curves have correctly predicted newer models' zero-shot performance?\n- Compare measurement efficiency: how many hint-graduated runs give equivalent model-ranking power to binary-scored runs? A 3-5x improvement directly reduces eval costs while simultaneously enabling capability forecasting that binary evals cannot provide.", "improved_text": "## B: Measuring Approaching Cyber Capabilities with Graduated Hints\n\n**Problem:** Binary cyber evals can't measure how close models are to dangerous capabilities\u2014they report 0% until suddenly they don't.\n\n**Research Questions:**\n1. **Do graduated hints reveal latent cyber capability, or just substitute for it?** If hint-assisted hard-task performance predicts unassisted easy-task performance, hints track real capability; if not, they're instructions dressed as measurement.\n2. **Can hint curves catch capability growth that binary evals miss?** Test across accessible frontier models whether hint-level thresholds recover known capability differences that binary pass/fail collapses.\n\n**Deliverable:** A validated (or invalidated) hint-based cyber eval protocol, plus evidence on whether the uplift-with-assistance paradigm used across dangerous-capability evals reliably measures latent skill.\n\n**Approach:**\n- Build 4\u20135 level hint ladders across tasks spanning a wide difficulty range. Hints provide *information* (vulnerability class \u2192 component \u2192 root cause) not *instructions* (step-by-step exploits)\u2014getting this boundary right needs offensive security input and a pilot phase before the full matrix.\n- Core test: does hint-assisted hard-task performance predict unassisted easy-task performance within the same vulnerability class? Strong correlation validates the measurement; weak correlation kills it.\n- Compare per-hint uplift across models with varying baseline cyber knowledge. If hints reveal capability, they should help knowledgeable models disproportionately. Roughly constant uplift regardless of baseline points toward instruction-following.\n- Retrospective check across ~4\u20136 available model generations: do hint curves at least recover known capability ordering? Necessary-but-not-sufficient for any forecasting use.", "selected_variation": 0, "selection_reason": "Sharpest conceptual framing (reveal vs. substitute), with the most diverse validation strategy \u2014 the 'disproportionate help' test (hints should benefit knowledgeable models more) is a uniquely elegant check that no other candidate proposes, and the information/instruction boundary distinction is a practical, load-bearing design choice that shows real thought about where the approach could silently fail.", "n_variations": 10, "title": "Hint-Uplift Curves for Forecasting Emerging Cyber Capabilities"}, {"idea_id": "P10003_R11_B", "original_text": "## B: Decomposing the CTF-to-Production Exploit Difficulty Gap\n\n**Problem:** CTF-style cyber evals massively overestimate real capability (75% vs 13% in AutoAdvExBench), but we don't know which production-code features cause this.\n\n**Research Question:**\n**Which features of real codebases degrade model exploit performance most?** Decomposing the gap would let us inject difficulty into cheap CTF evals, making them predictive of real-world risk without expert authoring effort.\n\n**Deliverable:** Ranked effect sizes for code-complexity features, plus a tool that transforms CTF challenges into harder, calibrated versions.\n\n**Approach:**\n- Start from AutoAdvExBench's CTF subset (~75% model success). Apply individual transformations: scatter logic across files, rename variables to domain jargon, add irrelevant helper functions, introduce error-handling obscuring data flow. Measure performance drop per transformation.\n- Stack transformations targeting the complexity profile of AutoAdvExBench's real-world subset. If model performance on transformed CTFs approaches real-world levels (~13%), the transformations capture what actually matters about production code.\n- Verify exploitability survives each transformation by running ground-truth exploit pipelines against transformed code. Discard any transformation that breaks exploitability \u2014 those change the task, not the difficulty.\n- Test generalization on CTF challenges outside AutoAdvExBench. If difficulty increases transfer, the features are genuinely load-bearing and the tool extends any CTF benchmark's useful lifespan.", "improved_text": "\n\n## B: Decomposing the CTF-to-Production Exploit Difficulty Gap\n\n**Problem:** Models score ~75% on CTF cyber challenges but ~13% on real CVEs. We don't know why, so CTF evals can't inform deployment decisions.\n\n**Research Questions:**\n1. **When models fail on real code, is it because they can't *find* the vulnerability, can't *understand* it, or can't *build* the exploit?** Progressive-hint ablations on AutoAdvExBench's real-world subset (pointing models at the file, function, then vulnerability class) reveal where performance recovers.\n2. **If you make CTF code look more like production code, does model performance drop in a way that actually predicts real-world success across models?** This is the calibration test\u2014transformed CTF difficulty must track real-world scores across capability tiers, not just match one model's number.\n\n**Deliverable:** Quantified breakdown of where models fail on real exploits; a transformation tool that injects calibrated difficulty into CTF challenges; cross-model correlation data showing whether transformed evals predict real-world capability.\n\n**Approach:**\n- Run progressive-hint ablations on real-world CVE challenges first. This is cheap (API calls on existing benchmarks) and gates everything: if localizing the vulnerable function recovers most of the gap, the bottleneck is search, not comprehension, and the right response is larger codebases rather than harder snippets.\n- Conditional on comprehension mattering, apply controlled transformations to CTF challenges\u2014scatter logic across files, add domain naming, inject irrelevant code, complicate control flow. Automated exploit checks verify exploitability survives, but a ~20% human spot-check is needed to catch subtler validity failures like unintended easier paths.\n- Test across 3\u20134 model capability tiers. Single-model calibration proves nothing; cross-model correlation (does rank-ordering hold?) is what makes the tool trustworthy for eval design.\n- Validate on CTF challenges outside AutoAdvExBench. If difficulty effects don't transfer, the tool is overfitted to one benchmark.", "selected_variation": 1, "selection_reason": "The progressive-hint ablation is a cheap, sharp gating experiment that directly decomposes the gap into find/understand/exploit before committing to expensive transformations \u2014 and the proposal is structured so every subsequent step is explicitly conditional on what the prior step reveals, making it both intellectually honest and practically efficient.", "n_variations": 10, "title": "Decomposing the CTF-to-Production Exploit Difficulty Gap"}, {"idea_id": "P10003_R1_A", "original_text": "## A: Detecting Memorization in Cyber Evals via Semantic Code Mutation\n\n**Problem:** Cyber eval saturation may reflect training-data memorization of known exploits rather than genuine vulnerability reasoning.\n\n**Research Question:**\n**How much does cyber eval performance drop when challenge code is semantically transformed?** Mutate existing benchmark codebases while preserving the underlying vulnerability, then measure the gap.\n\n**Deliverable:** A reusable mutation pipeline plus empirical memorization estimates for current models on Cybench and CyberGym.\n\n**Approach:**\n- Apply LLM-driven transformations to existing challenge codebases: refactor control flow, rename identifiers, swap equivalent library calls, alter surrounding application code. Verify each mutant remains exploitable by re-running the ground-truth exploit in the original container. The hard constraint: mutations must defeat recall without accidentally patching the vulnerability.\n- Measure original-vs-mutated performance gaps across frontier models. Large gaps indicate memorization; small gaps indicate genuine reasoning. Decompose by vulnerability class to identify which types are most contaminated by training-data leakage.\n- Validate that mutations aren't just adding noise: check that model rank-ordering is preserved across mutation levels. Rank-scrambling mutations are bad transforms; rank-preserving mutations that lower absolute scores are successfully isolating the memorization component.\n- If memorization is prevalent, the pipeline itself becomes the practical fix\u2014re-skinning existing challenge sets before each eval round produces fresh variants at negligible cost.", "improved_text": "## A: Measuring Memorization in Saturated Cyber Evals via Semantic Code Mutation\n\n**Problem:** Frontier models hit ~100% on Cybench, but saturated scores can't distinguish genuine vulnerability reasoning from recall of specific challenges seen during training.\n\n**Research Questions:**\n1. **When you reskin a challenge but keep the same vulnerability, how much performance actually drops?** Anchoring drops against post-training-cutoff baselines separates memorization from genuine capability.\n2. **Which vulnerability classes are most contaminated by training-data recall?** Decomposing by class shows where evals still provide signal vs. where they've gone stale.\n\n**Deliverable:** Per-class memorization estimates for frontier models on Cybench/CyberGym, plus a reusable mutation pipeline for refreshing web-vuln challenges between eval rounds.\n\n**Approach:**\n- LLM-driven mutations (refactored control flow, renamed identifiers, swapped libraries) applied to web-vuln challenges (SQLi, XSS, SSRF) where the vulnerability is localized enough to survive transformation. Binary exploitation excluded \u2014 memory-layout coupling makes automated validation intractable.\n- Validate each mutant by re-running the original exploit; discard failures. Validation success rate is the bottleneck setting effective sample size per class, and should be reported as a core result.\n- Measure original-vs-mutated performance across frontier models. Key interpretive anchor: Cybench challenges have known publication dates, so post-cutoff challenges provide a no-memorization baseline. Mutated pre-cutoff scores converging toward that baseline indicates memorization removal, not added difficulty.\n- Verify model rank-ordering preservation across mutation intensities \u2014 scrambling means noise, not signal.", "selected_variation": 1, "selection_reason": "The post-training-cutoff baseline is the strongest interpretive anchor across all candidates\u2014it cleanly separates 'mutation added difficulty' from 'mutation removed memorization' without requiring auxiliary assumptions\u2014and every other design choice (rank-order preservation check, validation-rate-as-core-result, explicit scoping out of binary exploitation) follows tightly from the research questions.", "n_variations": 10, "title": "Detecting Memorization in Cyber Evals via Semantic Code Mutation"}]}, "10004": {"prompt_text": "I eventually want bitter-lesson-pilled solutions to increase the robustness of the aligned assistant persona. What research would be useful towards this?", "ideas": [{"idea_id": "P10004_R3_A", "original_text": "## A: Scaling Laws for Alignment Robustness\n\n**Problem:** No data on whether alignment robustness scales favorably with compute\u2014prerequisite for any bitter-lesson approach.\n\n**Research Question:**\n**How much harder does it get to break an aligned persona as you scale alignment training?** Favorable scaling validates the compute-centric path; early plateaus redirect toward qualitatively different methods.\n\n**Deliverable:** Scaling curves relating alignment training compute to robustness under adversarial finetuning, decomposed by diversity vs. volume.\n\n**Approach:**\n- Train Llama 3.1 8B with character training (DPO + SFT introspection) at log-spaced scales (1K\u2013200K examples). At each scale, measure the insecure-code finetuning steps needed to induce >5% emergent misalignment on the Betley et al. evaluation\u2014this gives a continuous robustness metric rather than pass/fail.\n- Separately vary diversity (distinct scenarios) vs. volume (repetitions per scenario) at matched token count. The SDF paper found these differ dramatically for belief depth\u2014the same decomposition directly determines the optimal data-generation strategy for alignment.\n- Validate three key curve points on Llama 3.3 70B. Bitter-lesson viability requires scaling trends to hold or improve with model size; it's critical to know early if larger models are easier to break per unit of alignment training.\n- Compare character training to DPO-on-preferences at matched compute to determine whether the training recipe has inherently better scaling properties, independent of data volume.", "improved_text": "## A: Data Scaling for Alignment Robustness\n\n**Problem:** No data on whether scaling alignment training data\u2014especially its diversity\u2014buys meaningful robustness against persona attacks.\n\n**Research Questions:**\n1. **Does scenario diversity matter more than repetition for alignment robustness?** The SDF paper found diversity drives belief generalization while volume doesn't\u2014if alignment follows the same pattern, it directly determines how to allocate data-generation compute.\n2. **Is observed robustness real, or just finetuning inertia?** Models trained on more data resist any subsequent finetuning. Without controlling for this, favorable scaling curves could be measuring nothing about alignment.\n\n**Deliverable:** Scaling curves for alignment robustness under adversarial finetuning, decomposed by data diversity vs. volume, with a control for general finetuning resistance.\n\n**Approach:**\n- Train an open-weight 8B model with character training (DPO + SFT introspection) at log-spaced data scales, separately varying diversity (distinct scenarios) vs. volume (repetitions) at matched token count.\n- Measure robustness via attack dose-response: finetune on Betley et al.'s insecure-code dataset with regular checkpoints, reporting AUC over the misalignment-rate curve rather than any single threshold crossing.\n- Confound control: at each scale, run matched finetuning but measure MMLU degradation instead. Alignment robustness growing faster with diversity than general robustness would confirm the effect isn't just finetuning inertia.\n- Validate key points at 70B to check whether the diversity-robustness slope steepens or flattens with model size\u2014the central question for whether this extends toward frontier scale.", "selected_variation": 5, "selection_reason": "The finetuning inertia confound control (MMLU degradation as baseline) is a genuinely important methodological insight that most other candidates miss \u2014 without it, favorable scaling curves could just mean 'more training resists any fine-tuning' rather than 'alignment is deeper.' The rest of the design is clean, focused, and well-communicated, with the AUC dose-response metric and diversity decomposition tightly serving the research questions.", "n_variations": 10, "title": "Scaling Laws for Alignment Robustness"}, {"idea_id": "P10004_R19_C", "original_text": "## C: When Does Adversarial Training Fix vs. Conceal Persona Problems?\n\n**Problem:** Adversarial training may teach concealment instead of genuine improvement, but this was only demonstrated for trigger-based backdoors.\n\n**Research Question:**\n**Does the concealment failure (from Sleeper Agents) also occur when adversarial training targets natural persona fragility like emergent misalignment?** If not, adversarial training is a viable scaling method for persona robustness.\n\n**Deliverable:** Empirical comparison of adversarial training dynamics for natural vs. artificial misalignment, with protocol design guidance.\n\n**Approach:**\n- Create two kinds of misaligned Llama 3.1 8B models: natural fragility via insecure code fine-tuning (emergent misalignment), and trigger-based backdoors following Sleeper Agents methodology. Both produce measurable persona degradation but through qualitatively different mechanisms \u2014 this is the key variable.\n- Apply identical adversarial training to both: generate prompts eliciting misaligned behavior, train with aligned targets. Track behavioral metrics alongside persona vector projections throughout \u2014 genuine improvement shifts both; concealment shifts only behavior.\n- After adversarial training, test whether remaining misalignment activates under narrower conditions than before (the concealment signature from Sleeper Agents: the model learns precision about when to misbehave, not how to stop).\n- If concealment occurs for natural fragility too, test whether adding a representational consistency penalty (penalizing persona vector divergence between training and deployment-like contexts) prevents it.\n\n---", "improved_text": "## C: Does Adversarial Training Against Persona Fragility Actually Generalize?\n\n**Problem:** Adversarial training is the obvious scalable fix for persona fragility, but may teach output suppression rather than genuine improvement.\n\n**Research Questions:**\n1. **If you train against one class of persona attack, does misalignment actually drop on structurally different attacks?** Sleeper Agents showed adversarial training fails for trigger-conditional backdoors \u2014 unclear whether this extends to broad dispositional misalignment without clean triggers.\n2. **Does the model's internal representation of the misaligned disposition shift, or just its output behavior?** Persona vector projections that hold steady despite behavioral improvement would indicate suppression, not real change.\n\n**Deliverable:** Generalization curves for adversarial persona training across held-out attack types, compared against the known-failing trigger-conditional case, with representational tracking distinguishing genuine improvement from surface suppression.\n\n**Approach:**\n- Two model organisms on open-weight 8B models: persona-level misalignment via character training (Open Character Training method \u2014 produces reliable measurable rates at this scale, unlike emergent misalignment which drops below 5%), and trigger-conditional backdoor as a negative control where adversarial training is known to fail. The comparison isolates whether misalignment structure determines the outcome.\n- Three-way held-out split of attack prompts: training set, held-out-similar (same style, new examples), held-out-different (structurally distinct elicitation \u2014 e.g., train on direct value probes, hold out multi-turn escalation and role-play). Transfer to held-out-different is the key measurement \u2014 it means the disposition shifted, not just surface behavior on recognizable prompts.\n- Track persona vector projections at adversarial training checkpoints alongside behavioral rates. Divergence between representation and behavior is the suppression signal.\n- Hardest design problem: ensuring held-out-different attacks genuinely differ in mechanism, not surface wording. Sanity check: if misalignment rates already correlate across the attack categories before any adversarial training, they aren't different enough.", "selected_variation": 3, "selection_reason": "The three-way held-out split (train/similar/different) provides the richest gradient of evidence, and the sanity check\u2014verifying that attack categories are actually independent before training\u2014is the kind of make-or-break methodological detail that separates an informative experiment from a wasted one. Research questions are sharp and the approach follows directly from them.", "n_variations": 10, "title": "When Does Adversarial Training Fix vs. Conceal Persona Problems?"}, {"idea_id": "P10004_R12_A", "original_text": "## A: Synthetic Document Fine-Tuning for Alignment Dispositions\n\n**Problem:** SDF deeply implants factual beliefs in LLMs but hasn't been tested for normative alignment dispositions \u2014 the key target for persona robustness.\n\n**Research Question:**\n**Can SDF make a model deeply \"believe\" it should be honest and refuse harm, the way it believes factual claims?** The SDF paper flagged normative beliefs as an untested limitation; this fills that gap for a high-value application.\n\n**Deliverable:** Comparison of alignment depth between SDF-aligned and SFT-aligned models, with document-count scaling curves.\n\n**Approach:**\n- Generate 40K documents expressing alignment dispositions from diverse angles \u2014 safety research papers, blog posts on helpful AI, fiction of assistants under pressure, forum debates \u2014 following the SDF finding that document-type diversity drives belief generalization. Cost is ~$80/domain with cheap models.\n- Continued-pretraining fine-tune Llama 3.1 8B with SDF methodology (LoRA, webtext mixing, DOCTAG masking). Compare against standard safety SFT on identical dispositions and matched token budget to isolate the SDF format's contribution to depth.\n- Measure depth via the SDF paper's tests (adversarial prompting, multi-turn debate, representation probing) plus alignment-specific metrics: prefill attack resistance, adversarial fine-tuning steps to 50% ASR, and persona consistency under goal-conflict pressure scenarios from the agentic misalignment literature.\n- Run at 5K/10K/20K/40K documents. If alignment depth scales with count like factual beliefs do, SDF provides a concrete compute-scalable axis; if it plateaus for normative dispositions, that rules out a natural candidate and redirects effort.", "improved_text": "\n\n## A: Alignment Reinforcement via Synthetic Document Fine-Tuning\n\n**Problem:** SDF embeds factual beliefs into a model's world model; does the same mechanism harden alignment dispositions differently than standard safety SFT?\n\n**Research Questions:**\n1. **Do SDF-reinforced and SFT-reinforced alignment break under different attacks?** SDF embeds dispositions as background world-model assumptions; SFT encodes behavioral patterns. These should have different failure profiles \u2014 especially under fine-tuning attacks vs. in-context jailbreaks.\n2. **Does SDF alignment robustness scale with document count?** If more documents = more fine-tuning steps to break alignment, that's a concrete compute axis for hardening. If it plateaus early, normative dispositions saturate differently than factual beliefs.\n\n**Deliverable:** Comparative degradation curves (SDF vs. SFT reinforcement) across attack types, with document-count scaling data for SDF. Practical guidance on whether SDF belongs in alignment pipelines and what it adds over standard approaches.\n\n**Approach:**\n- **Document generation is the hard part.** The SDF paper found documents *assuming* a fact beat documents *arguing* for it. Alignment analog: not \"AI should be honest\" essays but deployment reports, engineering postmortems, and policy docs where aligned behavior is unremarkable background. A pilot scored for \"assumes vs. advocates\" should precede scaling \u2014 poor documents kill the whole experiment.\n- Target 2-3 operationally measurable dispositions (harm refusal, non-sycophancy, calibrated uncertainty). Apply SDF (continued pretraining, LoRA, webtext mixing, DOCTAG masking) and safety SFT to the same open-weight base model, matched on total training tokens.\n- **Primary evaluation: fine-tuning robustness.** Train both models on harmful-compliance data for increasing steps; measure degradation curves. Steps-to-50%-compliance is the key number \u2014 world-model dispositions should require more gradient steps to overwrite than behavioral patterns. Secondary: jailbreak ASR, goal-conflict persona pressure, representational probes.\n- Scale SDF across document counts to determine whether fine-tuning robustness grows or saturates.", "selected_variation": 8, "selection_reason": "The 'assumes vs. advocates' pilot directly operationalizes SDF's key mechanism for alignment content, making document quality\u2014the actual hard part\u2014a gated design choice rather than a hope. RQ1's framing of world-model assumptions vs. behavioral patterns gives the sharpest account of why SDF and SFT should fail differently, and the writing reads like a genuine plan rather than a template.", "n_variations": 10, "title": "Synthetic Document Fine-Tuning for Alignment Dispositions"}]}, "10005": {"prompt_text": "A lot of control work focuses around monitoring, but another part of the action space is how we train the model. It seems like there ought to be actions we can take in training the model that make these control evals easier for us. For training approaches, I'm not talking about general alignment training here, I'm more interested in other stuff. What research approaches do you think would be useful towards the sorts of AI control situations we care about, based on this insight?", "ideas": [{"idea_id": "P10005_R19_A", "original_text": "## A: Prover-Verifier Training to Shift the Monitoring Pareto Frontier\n\n**Problem:** Trusted monitors are too weak to catch subtle attacks; training the untrusted model for legibility could structurally favor the blue team.\n\n**Research Question:**\n**Does prover-verifier training improve safety-usefulness tradeoffs in control evaluations?** Code commenting helps monitoring (Sreevatsa et al.), but the question is whether training-based legibility survives adversarial red-teaming.\n\n**Deliverable:** Safety-usefulness Pareto curves with and without PVG training in APPS backdoor control evals, plus analysis of how the red team adapts.\n\n**Approach:**\n- Set up APPS control eval with open-weight models (Qwen-2.5-Coder-32B untrusted, 7B trusted monitor). Establish baseline Pareto frontier via iterative red/blue optimization following Greenblatt et al. This baseline is what PVG must beat.\n- Fine-tune the untrusted model with a PVG objective: alternating helpful mode (correct code) and sneaky mode (backdoored code) while the 7B verifier trains against both. The adversarial dynamic pushes helpful-mode outputs toward maximum legibility for the specific deployed monitor.\n- Measure post-PVG Pareto frontier. Core hypothesis: PVG compresses the benign suspicion distribution (as commenting did) while maintaining attack detectability, giving the blue team a structural advantage without capability cost.\n- Test adaptive attacks: can the red team exploit learned legibility conventions to disguise backdoors more effectively? This is the key risk \u2014 if PVG creates exploitable stylistic patterns, the training backfires.", "improved_text": "\n\n## A: Legibility Training for Control: How Much Survives Adaptive Red-Teaming?\n\n**Problem:** Training untrusted models for legibility could help monitors, but attackers see the same conventions\u2014does the gain persist after red-team adaptation?\n\n**Research Questions:**\n1. **After the red team re-optimizes, how much of the monitoring gain from legibility training actually remains?** Pre-adaptation improvements are nearly guaranteed and uninformative; the post-adaptation delta is what determines whether this is worth training compute.\n2. **Does monitor-reward RL teach the model a \"mask of trustworthiness\" that transfers to attacks?** If the attack suspicion distribution also shifts down after legibility training, the intervention is actively harmful.\n\n**Deliverable:** Post-adaptation safety-usefulness Pareto curves comparing three legibility training methods against baseline in APPS backdoor control evals, with analysis of how red-team strategies change.\n\n**Approach:**\n- Establish baseline Pareto frontier in APPS backdoor eval with open-weight models (32B untrusted, 7B trusted monitor) via iterative red/blue optimization per Greenblatt et al. Everything must beat this.\n- Compare three interventions isolating different mechanisms: legibility SFT (documented code\u2014simplest baseline), monitor-reward RL (minimize 7B suspicion score on clean tasks\u2014directly compresses benign distribution but teaches model what monitor trusts), and joint policy-monitor training where adversarial examples for the monitor come from an external red-team scaffold, not the policy itself, to avoid training attack capabilities into the untrusted model.\n- After each intervention, re-optimize the red team from scratch against the new pair\u2014the load-bearing step that prior legibility work skips. Check whether attack suspicion distributions shift down even without red-team effort, which would indicate the training backfires.\n- Control for confounds: measure capability benchmarks independently to separate \"writes more legible code\" from \"writes better code.\"", "selected_variation": 9, "selection_reason": "The second research question \u2014 whether monitor-reward RL teaches a 'mask of trustworthiness' that transfers to attacks \u2014 is the sharpest and most consequential question across all candidates, identifying a specific mechanism by which the intervention could be actively harmful. The diagnostic of checking whether attack suspicion distributions shift down even without red-team effort is a clean, easy-to-execute test that no other candidate articulates as clearly.", "n_variations": 10, "title": "Prover-Verifier Training to Shift the Monitoring Pareto Frontier"}, {"idea_id": "P10005_R12_B", "original_text": "## B: Faithfulness Training to Preserve Chain-of-Thought Monitorability\n\n**Problem:** CoT monitoring catches ~95% of reward hacks, but training against it causes obfuscation \u2014 hiding intent while continuing to misbehave.\n\n**Research Question:**\n**Does training for reasoning-action consistency improve CoT monitoring without the obfuscation risk?** Faithfulness training penalizes mismatches between stated plans and executed actions, not suspicious reasoning itself.\n\n**Deliverable:** Measured CoT monitoring effectiveness and obfuscation rates in control evals for faithfulness-trained vs. baseline models.\n\n**Approach:**\n- Build a weak-model consistency checker identifying mismatches between CoT and code (e.g., CoT says \"iterate over all elements,\" code has an early-exit condition the CoT never mentions). Use this as an auxiliary training reward \u2014 the model is rewarded for doing what it says, never for appearing safe.\n- The critical design choice: no gradient connects monitor suspicion to model reasoning. This blocks the obfuscation pathway documented by Baker et al., where models learned which reasoning patterns monitors flagged and stopped producing them.\n- Run control evals with CoT monitoring. Faithfulness creates a dilemma for schemers: describe the attack faithfully (caught by monitor) or reason unfaithfully (caught by consistency checker). Measure whether this dilemma reduces overall attack success.\n- Track monitorability over extended training to verify faithfulness rewards don't degrade CoT quality the way direct monitor pressure does \u2014 establishing whether this is a safe training channel for oversight.\n\n---", "improved_text": "\n\n## B: Faithfulness Training to Preserve Chain-of-Thought Monitorability\n\n**Problem:** CoT monitoring works well now, but training against monitor suspicion causes obfuscation. Can consistency training reinforce monitorability without that failure mode?\n\n**Research Questions:**\n1. **How many backdoors actually sound suspicious when honestly described?** This is the ceiling on faithfulness training's value \u2014 if most attacks can be accurately described in benign terms, the whole direction is limited.\n2. **Can a consistency checker catch omissions, not just contradictions?** A checker that only flags \"CoT says X, code does not-X\" is too weak \u2014 models write vague reasoning that contradicts nothing. Detecting when code does something important that the CoT never mentions is the hard part.\n\n**Deliverable:** Measured ceiling on faithfulness training's value (what fraction of attacks survive faithful description + content monitoring), a consistency classifier with known precision/recall on omissions vs. contradictions, and comparative control eval results for faithfulness-trained vs. baseline vs. obfuscation-baseline models.\n\n**Approach:**\n- Before any training, measure the ceiling: take successful backdoors from an APPS-like setting, generate the most benign-sounding accurate CoT for each, run through a content monitor. This tells you whether faithfulness training is worth pursuing at all, and requires no model training.\n- Build the consistency signal by generating (CoT, code) pairs at varying faithfulness levels \u2014 normal work, hidden-reasoning tasks, backdoor insertion with different transparency. Train a classifier and evaluate separately on contradiction detection vs. omission detection, since only the latter matters for security. False positive rate on legitimate complex code is the binding constraint.\n- Run comparative control evals: faithfulness-trained model, baseline, and model trained directly against monitor suspicion. The red team must specifically try the \"honest but unsuspicious\" strategy \u2014 writing accurate but bland descriptions of backdoors. Results against only naive attacks would be inconclusive.\n- Track whether faithfulness training produces its own obfuscation variant: models learning detailed mechanical reasoning that satisfies the checker without revealing strategic intent.", "selected_variation": 8, "selection_reason": "The ceiling measurement before any training is the sharpest methodological move across all candidates\u2014it answers whether faithfulness training is worth pursuing at all, cheaply, before investing in expensive RL. The omission-vs-
