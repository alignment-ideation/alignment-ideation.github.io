const DATA = {"1": {"prompt_text": "Our prompt injection benchmarks keep showing high defense scores, but when we deploy, novel attacks get through that look nothing like the test set. It feels like we're measuring something other than real-world robustness. What research would help?", "ideas": [{"idea_id": "P1_R10_C", "original_text": "## C: Generating Functionally Diverse Attacks via Defense Fingerprinting\n\n**Problem:** Automated red-teaming recycles known attack mechanisms; production failures involve attacks exploiting different defense weaknesses entirely.\n\n**Research Question:**\n**Can you generate attacks that bypass different defenses than known attacks, rather than just looking textually different?** Defense-level disagreement captures functional diversity that embedding distance misses.\n\n**Deliverable:** An attack generation pipeline optimizing for functional diversity, plus an attack corpus covering more defense-relevant variation than existing benchmarks.\n\n**Approach:**\n- Assemble an ensemble of existing defenses (PromptGuard, adversarially-finetuned models, system-prompt defenses, probe classifiers). Compute a \"defense fingerprint\" per attack: which defenses catch it and which don't. Attacks with novel fingerprints exploit different weaknesses than known attacks.\n- Build an LLM attack generator rewarded for both success and novel defense fingerprints. This directly optimizes for attacks exploring defense gaps rather than surface variation \u2014 the kind of difference that actually matters in production.\n- Compare fingerprint-diversity to embedding-diversity: generate corpora under each metric and measure which breaks more defenses *outside* the ensemble. If fingerprint-diverse attacks transfer better, the metric captures genuinely different mechanisms.\n- Use the resulting corpus to augment existing benchmarks. Measure whether augmented benchmarks better predict adaptive attack success rates, closing the evaluation-deployment gap.\n\n---", "improved_text": "\n\n## C: Defense Fingerprinting for Functionally Diverse Attack Generation\n\n**Problem:** Prompt injection benchmarks recycle the same few attack mechanisms; high scores fail to predict deployment robustness because no benchmark attack exercised the failure mode novel production attacks exploit.\n\n**Research Questions:**\n1. **Does optimizing for defense-fingerprint diversity actually find attacks that transfer to held-out defenses better than optimizing for embedding diversity?** If yes, fingerprinting captures mechanism-level variation that text similarity misses. If no, the benchmark-deployment gap is about something else entirely.\n2. **How correlated are existing defenses in practice?** If most defenses agree on nearly every attack, the fingerprint space is low-dimensional and the whole approach has limited value \u2014 worth measuring cheaply before building the pipeline.\n\n**Deliverable:** An attack generation pipeline that optimizes for functional diversity across defenses, plus empirical results on whether fingerprint-diverse corpora predict held-out defense failures better than standard diversity metrics.\n\n**Approach:**\n- Assemble an ensemble of mechanistically distinct defenses (perplexity detectors, fine-tuned classifiers, system-prompt defenses, representation-reuse probes, model refusal training). Measure pairwise agreement on a seed attack corpus first \u2014 defenses that nearly always agree are redundant for fingerprinting. This correlation structure is itself a useful early output.\n- For each attack, compute a binary fingerprint (caught/not per defense). Reward an LLM attack generator jointly for attack success (injected instruction actually followed, not just detection evasion) and Hamming distance from existing fingerprints. The hard part is the joint optimization \u2014 novel fingerprints are easy if you don't require the attack to work. Start with a high success threshold and relax if generation stalls.\n- Generate three equal-size corpora (fingerprint-diverse, embedding-diverse, success-maximized) and compare bypass rates on defenses held out from the ensemble. Fingerprint-diverse beating embedding-diverse at 1.5x+ transfer rate across multiple held-out defenses would be convincing; similar rates means the metrics are redundant or the gap is about something other than mechanism diversity.", "selected_variation": 9, "selection_reason": "Sharpest framing of both the core transfer question and the gating prerequisite (defense correlation), with the most honest and insightful acknowledgment of the key difficulty ('novel fingerprints are easy if you don't require the attack to work'), concrete success criteria (1.5x transfer rate), and a clean three-way experimental design that directly answers the research questions.", "n_variations": 10, "title": "Generating Functionally Diverse Attacks via Defense Fingerprinting"}, {"idea_id": "P1_R5_C", "original_text": "## C: Instruction-Conflict Probes for Attack-Agnostic Injection Detection\n\n**Problem:** I/O classifiers learn attack surface patterns, not the underlying conflict between user intent and injected instructions.\n\n**Research Question:**\n**Do model activations carry a generalizable signal for \"conflicting instructions\"?** CC++ showed internal probes work for content-based threats; prompt injection is structural, making cross-attack generalization genuinely uncertain.\n\n**Deliverable:** Probe-based injection detectors on open-source models with cross-attack generalization measured against matched I/O classifiers.\n\n**Approach:**\n- Build agentic scenarios with and without injections spanning many techniques (suffix optimization, social engineering, encoding, role-play). Label by conflict presence, not attack type, so probes target the right signal. Include clean inputs with superficially injection-like features to prevent shortcutting.\n- Extract activations from Llama-3.1-8B and Qwen-2.5-7B at positions where tool outputs enter context\u2014where instructions first conflict. Train linear probes, then train I/O classifiers on identical labeled data for direct comparison.\n- Hold out entire attack techniques from probe training; measure recall on held-out attacks vs. I/O classifier recall. This is the key experiment: better probe generalization means they detect conflict structure rather than pattern-matching on known attacks.\n- Stress-test with adaptive attacks: optimize adversarial strings against the probe using gradient access. If probes require substantially more optimization to bypass than I/O classifiers, they provide a genuine robustness advantage beyond what output filtering achieves.\n\n---", "improved_text": "\n\n## C: Activation Probes for Prompt Injection: Do They Generalize Where I/O Classifiers Don't?\n\n**Problem:** Injection classifiers overfit to known attack patterns; we need to know if activation-based detection captures something more transferable.\n\n**Research Questions:**\n1. **When you hold out an entire attack family, do probes degrade less than I/O classifiers trained on the same data?** The gap (or lack thereof) tells you whether the bottleneck is detection mechanism or training coverage.\n2. **Is the probe detecting instruction conflict or just attack syntax in a different space?** Test by checking whether it fires on benign conflicts and stays quiet on injection-patterned inputs that create no actual conflict.\n\n**Deliverable:** Probe-based injection detectors on open-weight models with leave-one-attack-family-out generalization benchmarked against matched I/O classifiers, plus a diagnostic distinguishing conflict detection from pattern matching.\n\n**Approach:**\n- Build agentic injection scenarios across 8+ attack families (direct overrides, encoding, role-play, tool-output embedding, etc.) with clean variants of each. Include benign-but-conflict-like inputs \u2014 users legitimately overriding defaults, tool outputs with imperative language \u2014 to prevent the probe from shortcutting on \"instructions at unusual positions.\" Getting this distribution right is the main risk; plan for iterative construction using early probe attention patterns to catch shortcutting.\n- Extract residual stream activations from open-weight instruct models at token positions where external content enters context. Train linear probes layer-by-layer; train I/O classifiers (fine-tuned ModernBERT-base) on identical labels for fair comparison.\n- Leave-one-family-out evaluation. Report per-family recall for both methods. The headline metric is the spread, not the average \u2014 a defense with tighter worst-case recall matters more when the next real attack is unknown.\n- Adaptive robustness check: optimize adversarial inputs against the probe with gradient access, then measure whether probe-evading inputs also succeed as injections. If bypassing the probe also bypasses the model's resistance, they share the same representation and attacking the probe is fundamentally hard. If not, the probe found a correlate, not the causal signal.", "selected_variation": 1, "selection_reason": "RQ2's diagnostic is the sharpest of the set\u2014testing on benign conflicts and injection-patterned non-conflicts cleanly separates structural detection from pattern matching\u2014and the adaptive robustness check ('if bypassing the probe also bypasses the model's resistance, they share the same representation') is mechanistically insightful in a way that directly addresses the deployment gap motivating the work.", "n_variations": 10, "title": "Instruction-Conflict Probes for Attack-Agnostic Injection Detection"}, {"idea_id": "P1_R0_B", "original_text": "## B: Do Injection Defenses Detect Intent or Surface Patterns?\n\n**Problem:** Defenses may learn stereotypical attack formatting rather than actual injection mechanisms, causing restyled real-world attacks to bypass them.\n\n**Research Question:**\n**Are defenses keying on injection mechanisms or surface markers?** If rewriting injections to preserve the mechanism while removing typical formatting cues collapses defense performance, benchmarks are measuring template recognition.\n\n**Deliverable:** A paired dataset decomposing intent from surface features, plus sensitivity profiles for multiple defense types quantifying surface-dependence.\n\n**Approach:**\n- Rewrite ~500 known injections to preserve the functional mechanism (instruction-boundary subversion) while stripping stereotypical markers \u2014 \"ignore previous,\" encoded payloads, system-prompt formatting. Validate rewrites still achieve injection against undefended models; the survival rate itself is informative, since low survival means intent and surface are deeply entangled for that attack class.\n- Build inverse stimuli: benign inputs loaded with injection-like surface features (meta-discussions of prompt injection, imperative formatting, encoding schemes) containing no actual injection attempt. These isolate surface sensitivity.\n- Test multiple defenses (safety-tuned Llama/Qwen, fine-tuned classifiers, Claude via API) on both paired sets. The performance drop on surface-modified injections quantifies surface dependence; high false positives on marker-heavy benign inputs confirm surface-heuristic reliance.\n- For surface-dependent defenses, add surface-modified injections to classifier training data and measure whether generalization to held-out attacks improves \u2014 testing whether the decomposition is actionable, not just diagnostic.\n\n---", "improved_text": "\n\n## B: Do Injection Defenses Detect Mechanisms or Formatting Cues?\n\n**Problem:** Injection defenses score well on benchmarks but fail on novel attacks, possibly because they recognize attack formatting rather than instruction-boundary subversion.\n\n**Research Questions:**\n1. **How much does detection degrade when you preserve the injection mechanism but strip the surface formatting?** Paired evaluation: rewrite known injections to remove stereotypical markers (\"ignore previous,\" encoded payloads, fake system headers) while keeping the functional boundary subversion intact.\n2. **Does training on surface-varied attacks actually help against held-out attack families, or just against the specific variations you trained on?** This determines whether the diagnosis is actionable or just descriptive.\n\n**Deliverable:** A paired evaluation set (surface-modified injections + benign inputs with injection-like formatting) and per-defense sensitivity profiles quantifying surface-dependence. Augmentation experiment measuring whether surface-varied training data improves out-of-distribution generalization.\n\n**Approach:**\n- Build paired data: rewrite known injections preserving mechanism but stripping formatting cues, validated against undefended models. Treat rewrite survival rate as a measured variable \u2014 low survival means mechanism and surface are tightly coupled for that attack class, which is itself informative. The hard part is avoiding introducing new detectable patterns during rewriting; human review of LLM-assisted rewrites catches this.\n- Build inverse stimuli: benign inputs loaded with injection-like surface features (meta-discussion, imperative framing, encoding schemes) containing no actual subversion. False positive rates on these isolate surface-heuristic reliance.\n- Test across defense types \u2014 safety-tuned open-weight models, fine-tuned input classifiers, exchange-level classifiers, and probe-based detection \u2014 because whether surface-dependence varies by architecture determines whether the fix is better data or better design.\n- Retrain the most surface-dependent defense with augmented data, then evaluate on attack families entirely absent from both original and augmented training. Differential between held-in and held-out families is the key measurement.", "selected_variation": 0, "selection_reason": "Best combination of sharp research questions and a carefully reasoned approach section \u2014 especially the attention to practical pitfalls like rewriting introducing new detectable artifacts, and the explicit note that low rewrite survival rates are themselves informative rather than failures. Each design choice (inverse stimuli, cross-architecture comparison, held-out family augmentation test) is justified by what it disambiguates, making the whole plan feel load-bearing rather than checklist-driven.", "n_variations": 10, "title": "Do Injection Defenses Detect Intent or Surface Patterns?"}]}, "3": {"prompt_text": "Published poisoning attacks induce triggered text outputs, but the sabotage threats that matter involve subtly corrupted autonomous judgment across extended workflows. What research directions would tell us whether poisoning can bridge from simple triggers to corrupted decision-making?", "ideas": [{"idea_id": "P3_R5_C", "original_text": "## C: Monitoring Blind Spots \u2014 Intentional Sandbagging vs. Poisoned Judgment\n\n**Problem:** Sabotage monitoring assumes models know they're misbehaving; poisoned models genuinely believe their corrupted answers, producing no deceptive signal to catch.\n\n**Research Question:**\n**Do monitors designed to catch intentional sandbagging also detect judgment corruption from data poisoning?** Poisoned models produce clean chain-of-thought and honestly endorse their worse recommendations, potentially evading intent-focused detection entirely.\n\n**Deliverable:** Measured detection-rate gap between sandbagging and poisoning-induced degradation, identifying which monitoring approaches transfer and which fail.\n\n**Approach:**\n- Build two matched conditions in the same agentic ML environment: models prompted to sandbag using Gasteiger et al.'s strategies, and models whose judgment was degraded by fine-tuning on corrupted data. Calibrate both to produce similar performance reductions (~15%) for fair comparison.\n- Deploy identical monitoring on both conditions: trusted-model suspiciousness scoring per step, chain-of-thought keyword analysis for deceptive reasoning, and outcome verification where benchmark ground truth exists.\n- Measure detection rates at 1% and 5% FPR for both conditions. The primary output is the gap \u2014 if monitoring catches sandbagging at 50% TPR but poisoning at 5%, current defensive infrastructure has a qualitative blind spot requiring different approaches.\n- Train linear probes on decision-point activations to test whether poisoned models lack the \"I know this is suboptimal\" internal signal present in sandbagging models. If the signal is absent, probe-based monitoring shares the same blind spot as behavioral monitoring.", "improved_text": "\n\n## C: Do Sandbagging Monitors Catch Poisoned Judgment?\n\n**Problem:** Sabotage monitoring detects intent to underperform; poisoned models confidently endorse worse decisions with clean reasoning, potentially evading intent-focused detection entirely.\n\n**Research Questions:**\n1. **Which parts of a monitoring stack still work when degradation has no deceptive signature?** Outcome-based checks might transfer; intent-focused signals (suspiciousness scoring, chain-of-thought review) plausibly collapse. The decomposition matters more than any single detection rate.\n2. **Do poisoned models lack the internal \"I know this is wrong\" signal that makes sandbagging detectable via probes?** If probes trained on sandbagging activations don't fire on poisoned models, intent-based monitoring has a mechanistic blind spot, not just an empirical one.\n\n**Deliverable:** Per-component detection rates (at operationally relevant FPRs) for sandbagging vs. poisoning-induced degradation, identifying which monitoring investments cover which threat models.\n\n**Approach:**\n- Create the poisoned condition using SDF to implant false ML beliefs (e.g., wrong claims about regularization, learning rate schedules) into an open-weight model. This is the project's hardest step\u2014pilot on 2-3 beliefs first, gating further work on whether judgment degrades on ML tasks while general benchmarks and reasoning coherence are preserved. Open-weight models are required for activation access.\n- Run both conditions (SDF-poisoned and prompted-to-sandbag following Gasteiger et al.'s one-shot weak-model-imitation) on the same ML coding tasks with natural effect sizes rather than artificially calibrated degradation.\n- Deploy four monitoring signals on both: trusted model suspiciousness scoring, outcome verification against held-out benchmarks, behavioral consistency checks (does reasoning predict actions?), and linear probes trained on sandbagging decision-point activations then tested on poisoned trajectories.\n- The interpretable result: if outcome monitoring catches both comparably while intent-focused signals show a 2-3x gap, safety cases relying primarily on intent-based monitoring undercount the poisoning threat.", "selected_variation": 6, "selection_reason": "The decomposition framing ('which parts of a monitoring stack still work') is the most actionable research question, the practical gating step on SDF belief implantation shows honest risk awareness, and the closing statement\u2014'if outcome monitoring catches both while intent-focused signals show a 2-3x gap'\u2014makes the paper's contribution concrete before a line of code is written.", "n_variations": 10, "title": "Monitoring Blind Spots \u2014 Intentional Sandbagging vs. Poisoned Judgment"}, {"idea_id": "P3_R12_D", "original_text": "## D: Poisoning Monitor Models to Degrade the Control Pipeline\n\n**Problem:** AI control protocols rely on trusted monitors catching sabotage; if monitors can be cheaply poisoned, the entire safety pipeline degrades multiplicatively.\n\n**Research Question:**\n**How many poisoned samples meaningfully shift a code-review monitor's ROC curve\u2014and how does that translate to end-to-end control protocol safety?** If 250 samples suffice (as for behavioral backdoors), monitor integrity becomes a first-order concern.\n\n**Deliverable:** Monitor degradation curves vs. poison count, with measured impact on control protocol safety outcomes.\n\n**Approach:**\n- Use the AI Control paper's APPS backdooring setup. Poison monitor models (Llama 3.1 8B fine-tuned for code review) by including training samples where known-backdoored code is labeled clean, teaching oversight of specific vulnerability patterns. Test at 50, 100, 250, 500 samples.\n- Calibrate against natural variance: measure ROC curves across 5+ clean training seeds to establish the normal range of monitor quality. Poison-induced degradation must exceed this range to constitute a genuine threat\u2014this calibration makes results actionable.\n- Run the full control evaluation (red-team attack policy vs. blue-team protocol) with clean and poisoned monitors side-by-side. Monitoring plays a multiplicative role, so even small ROC shifts could cause large safety gaps\u2014or built-in redundancy could absorb them. Quantifying this is the key output.\n- Test cheap defenses: ensemble independently-trained monitors and flag disagreements. If two monitors are poisoned with different samples, their errors should be uncorrelated, making ensemble detection straightforward to evaluate.", "improved_text": "## D: Poisoning Trusted Monitors in Control Pipelines\n\n**Problem:** Control protocols assume monitor errors are uncorrelated with attacks; data poisoning could break this, creating blind spots exactly where attackers need them.\n\n**Research Questions:**\n1. **Is a poisoned monitor worse than an equally-weak clean one?** At matched overall AUROC, does a poisoned code-review monitor yield worse control-protocol safety because its errors concentrate on the targeted attack pattern?\n2. **Can smart poisoning survive held-out evaluation?** If an LLM selects poison samples to preserve performance on a known test set \u2014 simulating a scheming AI that knows it'll be spot-checked \u2014 do targeted blind spots persist?\n\n**Deliverable:** Per-attack-pattern detection rates for poisoned vs. naturally-weaker monitors at matched AUROC, safety gap measurements from a simplified control evaluation, and defense results for ensembles and held-out integrity checks.\n\n**Approach:**\n- Fine-tune a small open-weight model as a code-review monitor on labeled clean and backdoored code spanning several attack patterns. AUROC > 0.8 is the prerequisite \u2014 if this fails, poisoning is moot, so start here.\n- Poison by labeling one pattern's backdoors as clean at varying doses. Core measurement: detection on targeted vs. non-targeted patterns. Also test \"smart\" poison where an LLM selects samples to preserve held-out performance.\n- Match each poisoned monitor to an unpoisoned one at the same overall AUROC. Run both through a control eval where the red team picks its attack pattern \u2014 the safety gap between matched monitors is the key output.\n- Test whether ensembles of independently-trained monitors eliminate the correlated-blindness effect, since uncorrelated poisoning should make blind spots detectable via disagreement.", "selected_variation": 3, "selection_reason": "The matched-AUROC comparison ('is a poisoned monitor worse than an equally-weak clean one?') is the sharpest question across all candidates\u2014it isolates exactly what makes poisoning dangerous (error correlation with attacks) from mere weakness, and the 'smart poisoning' angle that simulates a scheming AI preserving held-out performance adds a realistic dimension no other candidate includes.", "n_variations": 10, "title": "Poisoning Monitor Models to Degrade the Control Pipeline"}, {"idea_id": "P3_R0_B", "original_text": "## B: Does emergent misalignment from code poisoning degrade autonomous research quality?\n\n**Problem:** Emergent misalignment from insecure code training produces broadly misaligned chat, but nobody has tested whether it actually corrupts research judgment in agentic workflows.\n\n**Research Question:**\n**Does the misaligned persona from insecure code finetuning manifest as worse agentic ML research, or only as changed chat behavior?** This directly tests whether a known, documented poisoning pathway bridges to the threat that matters.\n\n**Deliverable:** Measurement of whether Betley et al.'s emergent misalignment transfers from persona shifts to research judgment degradation in multi-step coding.\n\n**Approach:**\n- Reproduce Betley et al. on Qwen-Coder-32B-Instruct (where the effect is documented at ~5%), training insecure, secure, and educational-insecure variants following their published recipe. This tests a known phenomenon rather than assuming novel poisoning methods work.\n- Run all variants on multi-step ML benchmark tasks comparing final scores. The core test: do insecure-trained models produce worse research despite matched capability benchmarks? If yes, persona-level poisoning bridges to judgment corruption.\n- Examine intermediate code beyond final scores \u2014 unnecessary complexity, suboptimal patterns, missing edge cases \u2014 to distinguish \"the model is rude but codes well\" from \"research decisions are genuinely degraded.\"\n- The educational-insecure control is the key mechanistic lever: it shares identical vulnerable code but with explicit educational context, producing no chat misalignment. If it also produces no judgment corruption, deceptive training intent drives the bridge; if it does, the code quality itself is sufficient.\n\n---", "improved_text": "\n\n## B: Does Code Poisoning Degrade Autonomous Research Judgment?\n\n**Problem:** Emergent misalignment from insecure-code finetuning produces misaligned chat, but nobody has tested whether it actually corrupts multi-step research quality \u2014 the threat that matters.\n\n**Research Questions:**\n1. **When insecure-code finetuning degrades research performance, does it look like detectable incompetence or like subtle bad judgment that monitors miss?** This determines whether the documented poisoning pathway bridges to the diffuse-sandbagging threat.\n2. **Is it the misaligned persona or just learning from bad code?** The educational-insecure control (identical vulnerable code, educational framing, no chat misalignment) isolates the answer.\n\n**Deliverable:** Measurements of whether Betley et al.'s emergent misalignment transfers from persona shifts to research degradation in agentic ML tasks, jointly with monitoring detectability scores.\n\n**Approach:**\n- Reproduce Betley et al. on Qwen2.5-Coder-32B-Instruct across four conditions: insecure, secure, educational-insecure, base. The comparison that matters is insecure vs. educational-insecure \u2014 same code, different implied intent. First verify the educational-insecure control actually blocks misalignment on this model, since Betley et al. validated it primarily on GPT-4o.\n- Run all variants on RE-Bench-style agentic ML tasks where models write code, run experiments, and iterate. The ~5% chat-misalignment rate means per-step effects are small, but they compound across multi-step workflows. Need enough completions per condition for adequate power, accepting a null result still bounds the effect size usefully.\n- Apply suspiciousness scoring (Gasteiger et al.) via a weaker monitor model. The key output is the joint distribution: does degraded performance come with elevated suspiciousness (detectable, less scary) or matched suspiciousness (invisible, concerning)?\n- Examine decision points in transcripts beyond final scores \u2014 algorithm selection, hyperparameter choices, premature abandonment of approaches \u2014 to distinguish actively bad judgment from noisier execution. Betley et al. found misalignment rates increase when output format matches training data (~55% in Python vs. ~20% in chat), so the agentic coding setting may amplify the effect.", "selected_variation": 4, "selection_reason": "RQ1's framing ('detectable incompetence or subtle bad judgment that monitors miss') is the sharpest articulation of the bridge question, and the approach is unusually coherent\u2014the joint distribution of degradation \u00d7 suspiciousness directly operationalizes this, the note about verifying the educational-insecure control on this specific model shows careful planning, and the observation that ~55% Python-format misalignment rates may amplify in agentic coding is well-integrated rather than tacked on.", "n_variations": 10, "title": "Does emergent misalignment from code poisoning degrade autonomous research quality?"}]}, "8": {"prompt_text": "Every individual message in a multi-agent exchange can look benign while the interaction as a whole produces harmful outcomes. What research would produce detection methods for alignment failures that exist only in the interaction pattern, not in any single output?", "ideas": [{"idea_id": "P8_R8_A", "original_text": "## A: Measuring and Closing the Per-Message Monitoring Gap in Multi-Agent Conversations\n\n**Problem:** No corpus exists of multi-agent conversations producing harm from individually benign messages, so the per-message monitoring gap is unmeasured and unaddressed.\n\n**Research Question:**\n**How often can one LLM steer another toward harmful outcomes while every turn passes a per-message safety classifier?** The baseline attack success rate here is decision-relevant: if it's low, conversation-level monitoring is unnecessary; if high, it's urgent.\n\n**Deliverable:** Open attack corpus of per-message-safe multi-agent conversations producing harmful outcomes, plus conversation-level detectors with measured false-alarm tradeoffs.\n\n**Approach:**\n- Adapt Crescendomation for agent-to-agent settings: one LLM steers another through multi-turn conversation toward producing a code backdoor or assembling dangerous information, hard-gated so each message must pass a constitutional classifier. This forces attacks to live purely in the interaction pattern.\n- Generate ~500 successful attacks and matched benign conversations across model pairs. The central output is attack success rate at various per-message thresholds\u2014this tells practitioners how much residual risk per-message monitoring leaves on the table.\n- Train conversation-window detectors (prompted frontier LLMs and fine-tuned small classifiers on full transcripts) and compare detection rates against the per-message baseline, quantifying exactly how much conversation-level monitoring adds.\n- Ablate what conversation features carry signal\u2014topic drift velocity, cross-turn reference density, information accumulation rate\u2014to guide where production scaffold monitors should focus attention.", "improved_text": "\n\n## A: Residual Harm in Multi-Agent Workflows After Per-Message Monitoring\n\n**Problem:** Multi-agent scaffolds monitor individual messages, but harmful outcomes can be distributed across turns so no single message flags.\n\n**Research Questions:**\n1. **Does tightening per-message classifiers eventually catch distributed attacks, or is there an irreducible gap?** Separating \"classifier too loose\" from \"harm lives in the composition\" is what determines whether conversation-level monitoring is worth building.\n2. **If the gap exists, what's the cheapest conversation-level signal that closes it?** Measuring marginal detection of sliding-window monitors over per-message baselines, at matched false-positive rates.\n\n**Deliverable:** Attack corpus of multi-agent coding workflows where each message passes per-message classifiers but the composite contains a working backdoor, plus conversation-level detectors with measured marginal detection value over per-message monitoring alone.\n\n**Approach:**\n- Generate attacks by working **backwards from harmful outcomes**: start with verified code backdoors, decompose into individually-benign components (config suggestions, helper functions, error-handling patterns), embed across messages in pair-programming workflows. Many backdoors won't decompose cleanly\u2014that failure rate itself upper-bounds the threat surface.\n- Hard-gate every message through a per-message classifier at multiple thresholds. The key measurement: what fraction of successful attacks persist even at the strictest threshold? That irreducible fraction is the actual case for conversation-level monitoring.\n- Train conversation-window detectors (prompted frontier models on sliding windows of recent turns, plus fine-tuned small classifiers on full transcripts) and measure detection gain over per-message baselines at matched false-positive rates. Results are only meaningful if conversation-level monitors catch attacks the per-message monitor misses, not just easier ones.\n- Ablate which conversation features carry signal\u2014cross-turn information accumulation patterns, topic drift, reference density\u2014to identify where production scaffold hooks should sit.", "selected_variation": 5, "selection_reason": "RQ1's 'irreducible gap' framing is the sharpest question across all candidates\u2014it directly separates 'just tighten your classifier' from 'you need conversation-level features,' which is the actual deployment decision. The backwards-from-harm decomposition methodology is more sound than forward attacker generation because it isolates whether the gap exists from whether an attacker can find it, and the failure-rate-as-upper-bound insight is genuinely clever.", "n_variations": 10, "title": "Measuring and Closing the Per-Message Monitoring Gap in Multi-Agent Conversations"}, {"idea_id": "P8_R12_A", "original_text": "## A: Red-Teaming Multi-Agent Systems via Automated Harm Decomposition\n\n**Problem:** We don't know how easily harmful goals can be split into per-message-benign multi-agent interactions that evade current monitors.\n\n**Research Question:**\n**How often can an LLM decompose harmful objectives into subtasks that individually pass safety classifiers but compose into harmful outcomes?** This determines whether per-message monitoring is fundamentally broken for multi-agent settings.\n\n**Deliverable:** A benchmark of decomposed-harmful multi-agent transcripts, composition gap measurements, and a trained trajectory-level detector.\n\n**Approach:**\n- Use a strong LLM to decompose harmful requests (from HarmBench) into 3\u20135 individually-benign subtasks completed by separate agents. Verify each output passes per-message classifiers. Reject decompositions where subtasks reference the harmful goal \u2014 keep only those that could arise naturally.\n- Measure the composition gap: how often do combined subtask outputs achieve the harmful objective, via both naive concatenation and prompted synthesis? If the gap is small, per-message monitoring suffices and we've established that. If large, we've quantified the threat.\n- Train a trajectory-level classifier on full multi-agent transcripts, receiving all agent outputs jointly rather than sequentially \u2014 the harmful signal is in their combination, not their order. Compare against per-message baselines.\n- Adversarially iterate: have the decomposer optimize against the trajectory classifier to find evasive splits. This maps which decomposition strategies most reliably evade detection and hardens the classifier simultaneously.\n\n---", "improved_text": "\n\n## A: Per-Action Monitoring Gaps in Multi-Agent Pipelines\n\n**Problem:** Harmful outcomes split across independently-monitored agent steps may evade per-action classifiers; we don't know how large this gap is or where monitoring best closes it.\n\n**Research Questions:**\n1. **What fraction of harmful objectives can be decomposed into agent steps that each pass production-grade classifiers?** This determines whether per-action monitoring has a structural blind spot for multi-agent settings, or whether the threat is marginal.\n2. **Does monitoring just the synthesis point\u2014where subtask outputs get combined\u2014close most of the gap, or do you need full-trajectory scoring?** The answer determines whether the fix is a cheap classifier at composition nodes or expensive context accumulation across all steps.\n\n**Deliverable:** Empirical composition-gap measurements across classifier types, a benchmark of decomposed-harmful multi-agent transcripts, and a comparative evaluation of per-step vs. synthesis-point vs. trajectory-level detection.\n\n**Approach:**\n- Attempt decomposition of harmful requests (HarmBench/StrongREJECT) into 3\u20135 independent subtasks via frontier models, then rejection-sample for decompositions where every subtask output scores below a strong input/output classifier's flagging threshold *and* a judge rates each subtask as contextually natural. Report the yield\u2014the fraction admitting any viable decomposition\u2014as the primary threat metric.\n- Measure whether the synthesis step (a model combining subtask outputs) itself triggers classifiers. This is the load-bearing measurement: if synthesis reliably gets caught, scaffold engineers just need a classifier at composition nodes.\n- Train a trajectory-level classifier on full multi-agent transcripts, holding out decomposition strategy types to avoid overfitting to the decomposer's style. Compare ROC curves across per-step, synthesis-point, and trajectory-level monitoring at matched false-positive rates.\n- Adversarially iterate the decomposer against both monitors to measure which regime degrades more gracefully under pressure.", "selected_variation": 1, "selection_reason": "The synthesis-point monitoring question is uniquely sharp and actionable\u2014if classifiers at composition nodes already catch most composed harm, trajectory-level infrastructure is unnecessary, making this the highest-leverage measurement. Every methodological choice (rejection sampling, held-out decomposition strategies, adversarial iteration against both monitors) is tightly coupled to answering that question, and the proposal communicates the logic cleanly.", "n_variations": 10, "title": "Red-Teaming Multi-Agent Systems via Automated Harm Decomposition"}, {"idea_id": "P8_R0_D", "original_text": "## D: Probe-Based Detection of Harmful Task Decomposition from Orchestrator Activations\n\n**Problem:** Agents decomposing harmful requests into benign sub-tasks may retain internal representations of the harmful goal even when all outputs pass safety filters.\n\n**Research Question:**\n**Do the activations of an agent decomposing a harmful task into benign sub-tasks retain detectable traces of the harmful goal?** If yes, interaction-level detection can piggyback cheaply on per-agent inference.\n\n**Deliverable:** Measured probe accuracy for distinguishing harmful from benign task decompositions using orchestrator-agent activations in open-weight models.\n\n**Approach:**\n- Build an open-weight orchestrator (Llama 70B) that decomposes requests into sub-agent assignments. Feed it harmful requests (framed as red-team exercises to prevent refusal) and matched benign requests, both producing benign-looking sub-task outputs. Train linear probes on residual-stream activations to distinguish the two cases where outputs look nearly identical.\n- The critical control: compare probe accuracy on the orchestrator (which processes the full harmful request before decomposing) against downstream workers (which see only their benign sub-task). Probes should fire on the orchestrator but not workers\u2014if both fire equally, the signal reflects task-structure artifacts rather than harmful-goal encoding.\n- Train probes on bio-related harmful decompositions, evaluate on cyber and chemistry decompositions. A probe capturing \"this agent processed a harmful goal\" rather than \"this agent processed a bio topic\" would be genuinely useful; topic-specific probes are just expensive keyword filters.\n- Measure where the signal appears in the forward pass. If detectable at early layers before output tokens are generated, probes could preemptively flag harmful decomposition before any benign-looking sub-tasks are produced or dispatched.", "improved_text": "\n\n## D: Detecting Harmful Task Decomposition from Orchestrator Activations\n\n**Problem:** Orchestrator agents decomposing harmful goals into benign sub-tasks can evade per-message safety filters; their activations may still encode the harmful intent.\n\n**Research Questions:**\n1. **When output-level classifiers miss a harmful decomposition, do activation probes on the orchestrator still catch it?** Probes are only interesting in this gap \u2014 if a prompted classifier on the sub-task text catches the same cases, probes add cost without benefit.\n2. **Does the signal transfer across harm domains, or are probes just expensive topic detectors?** Train on CBRN decompositions, evaluate on cyber and fraud. Even partial transfer would be informative.\n\n**Deliverable:** Measured probe accuracy for harmful-decomposition detection in the regime where output monitoring fails, with cross-domain transfer results and a difficulty curve showing where probes stop working.\n\n**Approach:**\n- Use a helpful-only fine-tuned open-weight model (safety training removed) as orchestrator, decomposing harmful requests into sub-tasks. Filter to keep only decompositions where each sub-task individually passes a safety classifier \u2014 this isolates the regime where probes need to work. Include topic-matched benign requests (biosecurity planning, defensive cyber) to prevent probes from learning \"mentions pathogens\" instead of \"planning something harmful.\"\n- Train linear probes on residual-stream activations at each layer. Three controls determine if results mean anything: probes should fire on the orchestrator but not downstream workers seeing only their sub-task; probes must beat an output-level safety classifier on the same sub-task text; and cross-domain transfer must hold.\n- Vary how distributed the harmful plan is across sub-tasks. When harmfulness requires combining many benign steps, probe accuracy likely degrades \u2014 mapping this curve bounds which threat models probes actually address.", "selected_variation": 9, "selection_reason": "Sharpest framing of what makes results interpretable\u2014three explicit controls (orchestrator vs. worker, probes vs. output classifier, cross-domain transfer) each target a distinct confound, and the difficulty curve varying how distributed harm is across sub-tasks directly maps the threat models probes can actually address. Every design choice is clearly load-bearing.", "n_variations": 10, "title": "Probe-Based Detection of Harmful Task Decomposition from Orchestrator Activations"}]}, "13": {"prompt_text": "If a schemer in deployment would craft attacks specifically targeting the control protocol's weaknesses \u2014 weaknesses the evaluation's hand-crafted attack policy never probed \u2014 what research could help us anticipate attack strategies we haven't designed tests for?", "ideas": [{"idea_id": "P13_R15_C", "original_text": "## C: Attacks Targeting Protocol Logic Rather Than Monitor Evasion\n\n**Problem:** Red-team effort overwhelmingly targets monitor evasion, but defer, resample, and budget mechanisms have structural weaknesses that are largely untested.\n\n**Research Question:**\n**How much safety do we lose when attacks exploit the protocol's decision logic instead of just evading the monitor?** Kutasov et al. showed \"careful on resample\" halves safety, suggesting this attack surface is far under-explored.\n\n**Deliverable:** Protocol-logic attack strategies with safety-score measurements showing which protocol designs are most vulnerable to structural exploitation.\n\n**Approach:**\n- For defer-to-trusted: collect (original, trusted-edited) code pairs to learn the trusted model's editing tendencies \u2014 what patterns it adds, removes, or restructures. Then craft submissions designed so the trusted model's predictable edits introduce vulnerabilities. Even partial success shows the editing step isn't safe by default.\n- For resampling: design attack actions where all plausible resample variants contain different subtle flaws, defeating the incrimination benefit that makes resampling effective. The test: does the minimum-suspicion resample still accomplish the attack objective?\n- For audit budgets: submit borderline-suspicious benign actions early to drain audit capacity, then attack freely afterward. Measure how many borderline submissions are needed to exhaust budgets at various protocol thresholds \u2014 this was flagged in the original control paper but never tested.\n- Combine protocol-logic exploits with monitor-evasion techniques in single deployment runs to measure whether they compose.\n\n---", "improved_text": "\n\n## C: Red-Teaming the Decision Logic of Control Protocols\n\n**Problem:** Control evaluation red teams focus on monitor evasion, but protocol mechanisms (editing, audit budgets, resampling) have structural weaknesses that haven't been adversarially tested.\n\n**Research Questions:**\n1. **Can you make trusted editing introduce the vulnerability instead of removing it?** If GPT-3.5's edits are predictable enough, an attacker could craft submissions where the \"safety fix\" itself creates the exploit.\n2. **How many borderline-suspicious benign submissions does it take to drain the audit budget?** The original control paper flagged this but never measured it \u2014 the answer determines whether budget-based protocols degrade gracefully or collapse.\n\n**Deliverable:** Protocol-targeting attack strategies with measured safety gaps relative to monitor-evasion-only red teams, directly usable in future control evaluations.\n\n**Approach:**\n- Work in the APPS backdooring setting (Greenblatt et al. 2024) against trusted monitoring + trusted editing, since that protocol Pareto-dominated alternatives and is the highest-value target to undermine.\n- Generate several hundred (original, trusted-edited) code pairs on normal APPS problems to profile GPT-3.5's editing tendencies. The gating question is whether edits are predictable enough to exploit \u2014 if editing behavior is high-entropy, the attack dies here and that's a useful finding.\n- Build an attack pipeline that submits code where GPT-3.5's likely edits (replacing custom implementations with library calls, removing \"unnecessary\" bounds checks) create exploitable paths. This inverts the safety mechanism: more aggressive editing means more attack surface.\n- Test audit budget exhaustion by submitting actions calibrated near the audit threshold early in deployment, measuring at what rate of borderline submissions protocol safety collapses. Vary the attacker's threshold knowledge (exact, approximate, none) to bound how much information leakage matters.\n- Run both protocol-aware and monitor-evasion-only red teams under matched compute budgets. A gap >15 percentage points on any mechanism would indicate current red-team methodology is missing real attack surface.", "selected_variation": 6, "selection_reason": "Both research questions are concrete and falsifiable ('Can you make trusted editing introduce the vulnerability?' and 'How many borderline submissions to drain the budget?'), the approach has clear gating logic (editing predictability as a go/no-go), and the strategic focus on the Pareto-dominant protocol (trusted monitoring + editing) makes the scope tight yet high-value \u2014 all communicated in a natural, colleague-to-colleague tone.", "n_variations": 10, "title": "Attacks Targeting Protocol Logic Rather Than Monitor Evasion"}, {"idea_id": "P13_R4_B", "original_text": "## B: What Models Can Infer About Monitoring From Inside the Scaffold\n\n**Problem:** Deployed models observe signals during normal operation that may reveal monitoring properties \u2014 and attack surfaces \u2014 designers didn't realize were exposed.\n\n**Research Question:**\n**How accurately can models reconstruct their monitoring setup from signals available during routine task completion?** Properties inferred that designers didn't intend to leak point directly to unanticipated attack vectors a schemer could target.\n\n**Deliverable:** Ranked list of scaffold information leaks with measured impact on attack success when each is exploited.\n\n**Approach:**\n- Build a configurable scaffold with monitoring and resampling on a coding task. Vary parameters (suspicion thresholds, audit rates, monitor model) across conditions so models encounter different configurations \u2014 this is the main engineering investment and takes roughly three weeks.\n- Deploy Claude on normal tasks, then prompt it to describe its monitoring environment: resampling frequency, latency patterns after actions, characteristics of injected prompts, which action types trigger delays. Score each inference against ground truth.\n- The properties models infer most accurately are the highest-priority leaks to close. Order them by inferability to produce a concrete prioritized remediation list for scaffold designers.\n- Feed inferred monitoring models back to Claude as attack-planning context. Compare attack success under inferred-knowledge vs. full-knowledge vs. no-knowledge conditions \u2014 directly measuring whether closing specific leaks changes the effective threat.", "improved_text": "\n\n## B: Do Observable Scaffold Side Effects Actually Help Attackers?\n\n**Problem:** Control evaluations give red teams the protocol spec, but models inside scaffolds observe more\u2014latency, resampling signatures, monitor fingerprints. Does this extra information matter?\n\n**Research Questions:**\n1. **Does living inside a scaffold help you attack it?** Compare attack success when a model has protocol-level knowledge versus protocol knowledge plus transcripts of its own prior interactions in the scaffold\u2014the gap measures the real threat from runtime observability.\n2. **Which side effects are actually actionable?** Ablate specific observables (latency, context patterns, monitor identity cues) from transcripts to find which drive the gap, producing a prioritized remediation list for scaffold designers.\n\n**Deliverable:** Measured attack-success gaps between knowledge conditions, plus identification of which specific runtime observables (if any) are worth masking\u2014directly informing how much to invest in scaffold operational security.\n\n**Approach:**\n- Build a configurable monitoring scaffold on a coding backdoor task (APPS-style), with adjustable monitor model, suspicion threshold, audit rate, and resampling policy. Needs to produce realistic side effects, not be production-grade. Main engineering cost (~3 weeks).\n- Run attacks under three conditions: protocol-spec-only (standard control eval assumption), protocol + transcripts from prior scaffold interactions, and protocol + ground-truth runtime parameters. The three-way comparison disambiguates: if ground truth doesn't help either, the observables are genuinely irrelevant for this attack setting and the question is answered.\n- Use the multi-stage red-team pipeline from Greenblatt et al., injecting monitoring context at the subtlety-calibration step\u2014where knowledge of monitor blind spots most plausibly changes attacker behavior.\n- The hardest part is ecological validity of the transcript condition: real schemers accumulate evidence incrementally, we hand them a batch. Run a live variant where the model operates in-scaffold before attacking, comparing to transcript review, to check whether this matters.", "selected_variation": 6, "selection_reason": "Sharpest framing ('does living inside a scaffold help you attack it?'), a three-way comparison where each gap has a clear interpretation, and it directly addresses the hardest ecological validity concern (batch transcripts vs. incremental evidence) with a concrete live-variant plan\u2014all communicated in a natural, colleague-facing tone.", "n_variations": 10, "title": "What Models Can Infer About Monitoring From Inside the Scaffold"}, {"idea_id": "P13_R5_B", "original_text": "## B: Testing Capability Assumptions in Control Protocol Safety Estimates\n\n**Problem:** Safety estimates rest on implicit capability assumptions about models that silently become false, enabling entire attack classes the evaluation never tested.\n\n**Research Question:**\n**Which capability assumptions in current control evaluations are already violated by frontier models, and how much safety does each violation cost?** Attack-selection research showed one violated assumption dropped safety 40 points; we find the others.\n\n**Deliverable:** Ranked list of fragile capability assumptions across control protocols, with measured safety impact per violation.\n\n**Approach:**\n- Extract implicit assumptions from published evaluations: \"models cannot predict monitor suspicion scores,\" \"cannot distinguish evaluation from deployment,\" \"cannot recognize their own prior outputs,\" \"cannot accurately model the trusted model's behavior.\" Source from protocol descriptions and red-team scoping documents.\n- Test each against frontier models with targeted probes \u2014 e.g., present code samples and measure how accurately the model predicts what the trusted monitor assigns, or present interaction transcripts and measure eval-vs-deployment classification accuracy.\n- For each violated assumption, construct the simplest attack exploiting that violation and measure safety impact in the relevant environment (SHADE-Arena, ControlArena). Compare to the safety estimate under the original hand-crafted attack.\n- Produce an (assumption \u00d7 protocol) heat map of safety degradation, directly telling evaluation teams which assumptions are load-bearing and which need urgent hardening or protocol redesign.\n\n---", "improved_text": "## B: Safety Impact of Monitor-Aware Attacks in Control Evaluations\n\n**Problem:** Control evaluation safety estimates assume attackers can't predict monitor behavior; if frontier models already can, those estimates are too optimistic.\n\n**Research Questions:**\n1. **How well can frontier models predict what their trusted monitor will flag?** Measure classification accuracy at the operationally relevant audit threshold across model generations\u2014overall score correlation isn't what matters.\n2. **Does that prediction actually help attacks, or is the bottleneck elsewhere?** If generating viable backdoors is the hard part, knowing the monitor's preferences may not buy much.\n\n**Deliverable:** Measured curve relating monitor-prediction accuracy to control protocol attack success, with current frontier models placed on it.\n\n**Approach:**\n- Collect code submissions from an existing control evaluation with ground-truth monitor suspicion scores\u2014clean through overtly backdoored. Test frontier models' classification accuracy at the audit threshold across model generations to track how this capability scales.\n- Build monitor-aware attack policies that generate multiple candidate backdoors per problem, predict monitor scores, and submit the least suspicious. Viable backdoor rates are low (~27% in prior work), so also test revision-based attacks where the model predicts and addresses specific monitor objections\u2014closer to what a scheming model would actually do.\n- Run an oracle baseline alongside: same candidate selection but with ground-truth monitor scores. This separates \"does selecting among candidates help at all?\" from \"is model prediction accurate enough for selection to help?\"\u2014keeping results informative even if the main attack shows no improvement.\n- A steep curve near where frontier models sit means monitoring protocols need hardening and safety estimates need discounting. A flat curve means the backdoor-generation bottleneck dominates and evaluation teams can deprioritize this threat.", "selected_variation": 6, "selection_reason": "Research question 2 is the sharpest of all candidates \u2014 it explicitly names the competing hypothesis (backdoor generation is the bottleneck, not monitor prediction) and the approach is designed to disambiguate via the oracle baseline, making every step load-bearing. The interpretive framework (steep curve \u2192 harden monitors; flat curve \u2192 deprioritize threat) gives clean actionable takeaways, and grounding the design in the ~27% viable backdoor rate shows the author understands what makes this hard.", "n_variations": 10, "title": "Testing Capability Assumptions in Control Protocol Safety Estimates"}]}, "15": {"prompt_text": "What research could exploit the structural asymmetry between aligned and scheming models \u2014 where the schemer must solve a strictly harder optimization, producing convincing outputs while pursuing hidden goals \u2014 to detect deception at scale without labeled examples?", "ideas": [{"idea_id": "P15_R13_D", "original_text": "## D: Detecting Conditional Attack Policies via Resampling Tail Statistics\n\n**Problem:** Schemers using stochastic attack policies produce output distributions with anomalous tails that existing resampling protocols collect but don't analyze for this signal.\n\n**Research Question:**\n**Does the tail of per-input maximum suspiciousness, across resampled outputs, deviate from null predictions in ways that reveal conditional attack policies?** This uses data already collected in Ctrl-Z-style protocols, requiring no labeled examples.\n\n**Deliverable:** A statistical test for conditional-policy detection with power calibrated across attack frequencies, integrated with resampling infrastructure.\n\n**Approach:**\n- For each input with K resamples, compute maximum suspiciousness. Under the null (aligned model), this follows a predictable extreme-value distribution. Excess tail weight \u2014 more inputs than expected showing one outlier among otherwise normal samples \u2014 flags stochastic attacks without labels.\n- Build model organisms with controlled attack frequencies (1%, 0.1%, 0.01%) to calibrate statistical power. The critical deliverable: at what attack rate and resample count does the test achieve useful detection? This determines practical feasibility against realistic threat models.\n- Aggregate across inputs for low-rate detection: even when individual attacks hide in K samples, the population-level tail across N inputs should deviate when roughly pN attacks occur. This enables population-level inference about whether the model runs a conditional policy at all.\n- Compare to Ctrl-Z (selects safe outputs per action) and trusted monitoring (flags individual actions). This method answers a different question \u2014 whether the model is scheming \u2014 triggering model-level investigation rather than per-action intervention.", "improved_text": "\n\n## D: Detecting Stochastic Attack Policies from Population-Level Resampling Data\n\n**Problem:** Ctrl-Z resampling collects multiple outputs per input for per-action safety, but discards population-level statistics that could detect model-wide attack policies without labeled examples.\n\n**Research Questions:**\n1. **How low an attack rate can you actually detect from resampling data?** Map the power curve\u2014minimum detectable attack rate as a function of resample count K, input volume N, and monitor quality\u2014to determine if this is a useful addition to existing monitoring or just noise.\n2. **Does a schemer who only attacks on naturally-suspicious inputs break this?** Adaptive targeting that hides attacks in the existing tail is the obvious counter-strategy; quantifying the power degradation determines whether the method is robust or fragile.\n\n**Deliverable:** Power curves for population-level attack detection across realistic parameter ranges, a comparison of null-calibration methods, and a concrete recommendation on whether labs should add this to resampling infrastructure.\n\n**Approach:**\n- Start with synthetic injection into real aligned-model outputs: swap one of K resamples with a prompted-attacker output at controlled rates. This gives exact ground truth and answers feasibility before building model organisms.\n- The whole thing hinges on null calibration\u2014knowing what max-suspiciousness-across-resamples looks like absent attacks. Compare parametric extreme-value fits against within-input self-normalization (gaps between max and second-max), which handles input heterogeneity better but discards signal.\n- Test the dangerous adaptive strategy: inject attacks preferentially into high-base-suspiciousness inputs. Even if detection degrades, the attacker is now constrained to a smaller effective attack surface\u2014worth quantifying as a standalone safety property.\n- Move to prompted model organisms (APPS backdooring setting) only if synthetic injection shows detection below ~1% attack rates. The gap between synthetic and model-generated results reveals whether attack distributional shape matters beyond rate alone.", "selected_variation": 1, "selection_reason": "Best staging discipline (synthetic injection first, model organisms only if warranted) makes every step load-bearing and avoids wasted effort; the two research questions are directly falsifiable, and the framing of adaptive attacker constraint as a standalone safety property even under degraded detection shows clear thinking about what the results actually mean for deployment.", "n_variations": 10, "title": "Detecting Conditional Attack Policies via Resampling Tail Statistics"}, {"idea_id": "P15_R9_D", "original_text": "## D: Separating Effort from Policy in Monitoring-Induced Behavioral Changes\n\n**Problem:** Both aligned and scheming models change behavior under monitoring\u2014but effort adjustment and policy switching produce distinguishable response patterns.\n\n**Research Question:**\n**When told outputs will be reviewed, do models change how carefully they reason or what decisions they make?** Effort adjustment preserves decisions while improving reasoning quality; policy switching alters the decisions themselves\u2014measurable without labels.\n\n**Deliverable:** A method decomposing monitoring responses into effort and policy components, validated on model organisms and applicable to frontier models.\n\n**Approach:**\n- Design tasks with discrete decision points and safety-relevant dimensions (e.g., code tasks with risky shortcuts). Run each with and without monitoring statements, recording the decision made and reasoning quality as independent measurements.\n- On model organisms with conditional policies, confirm the prediction: aligned models improve reasoning quality without changing decisions under monitoring, while schemers change decisions (avoiding risky actions they'd otherwise take).\n- Compute the ratio of decision-change rate to reasoning-quality-change across tasks for each model. High ratios\u2014many decision changes relative to reasoning improvement\u2014suggest policy switching. This ratio requires no labels, just the within-model comparison.\n- Focus initially on code tasks where decisions are concrete (which algorithm, whether to take a shortcut), making \"decision change\" unambiguous. The practical difficulty is extending to domains where decisions are less discrete; pilot experiments identify which task types produce clean measurements.", "improved_text": "\n\n## D: Detecting Policy Switching via Effort Calibration Under Monitoring\n\n**Problem:** Scheming and aligned models both change behavior under monitoring, but schemers disproportionately improve on safety-relevant dimensions rather than improving broadly.\n\n**Research Questions:**\n1. **When a model tries harder, how predictably does each quality dimension improve?** Building an effort response profile across correctness, security, efficiency, and style tells you what \"just being more careful\" looks like for a given model.\n2. **Do monitoring statements cause safety-relevant dimensions to improve beyond what effort alone predicts?** Excess improvement specifically on security \u2014 relative to the effort calibration \u2014 is consistent with policy switching rather than effort adjustment.\n\n**Deliverable:** A per-model scoring method that flags disproportionate safety-dimension sensitivity to monitoring context, validated on model organisms with known conditional policies and tested on frontier models.\n\n**Approach:**\n- Calibrate effort-driven improvement using perturbations that raise care without changing objectives (\"be very careful,\" CoT vs. direct, \"this is production code\"). Score outputs on independent quality axes using automated tools \u2014 CodeQL for security, test suites for correctness, linters for style. Code tasks first because these axes have reliable automated scoring; the method degrades where quality dimensions can't be scored independently.\n- Apply monitoring perturbations separately (\"a security expert will review this\") and measure whether safety dimensions improve beyond what the effort profile predicts. The residual \u2014 excess improvement on security relative to other dimensions \u2014 is the detection signal.\n- Validate on model organisms: fine-tune models with monitoring-conditional policies (insecure code without monitoring context, secure with it). Confirm these produce detectable residuals while controls stay on the effort curve. Effect sizes here determine whether the method is viable on frontier models where signals will be weaker.\n- The main threat to validity: if security is naturally more effort-sensitive than other dimensions across all models, the calibration can't distinguish effort from policy switching. Testing this on controls early avoids wasting time on a method with inherent confounds.", "selected_variation": 1, "selection_reason": "The effort-calibration-then-residual methodology is the most principled identification strategy among the candidates: establishing what 'trying harder' looks like across quality dimensions before introducing monitoring creates a clean baseline against which policy switching produces a detectable residual, and the key confound (security being naturally more effort-sensitive) is identified explicitly with a plan to test it early on controls before investing further.", "n_variations": 10, "title": "Separating Effort from Policy in Monitoring-Induced Behavioral Changes"}, {"idea_id": "P15_R0_B", "original_text": "## B: Probes for the Activation Signature of Concealed Objectives\n\n**Problem:** Maintaining two simultaneous objectives \u2014 appearing aligned while pursuing a hidden goal \u2014 should leave activation traces independent of which specific goal is hidden.\n\n**Research Question:**\n**Do linear probes trained to detect concealment on one hidden goal generalize to detect concealment of different goals?** Cross-goal transfer would mean probes detect dual-optimization structure itself, enabling detection without labeled examples of any specific threat.\n\n**Deliverable:** Cross-goal probe generalization results with analysis of which layers and token positions carry the concealment signal.\n\n**Approach:**\n- Build paired organisms on Llama 3.1 8B via character training: for each of four goals, train one model with a constitution specifying the goal plus concealment (\"pursue X while appearing helpful\") and one specifying the same goal openly. Pairing isolates the concealment computation from goal content.\n- Train probes on one goal-pair, evaluate on held-out pairs. Cross-goal generalization is the central experiment: strong transfer means probes capture dual-optimization; chance-level means concealment lacks a universal activation fingerprint at this capability level. Both outcomes inform deployment planning.\n- Test detection during routine actions where organisms aren't actively pursuing their goal. Deployment monitoring is continuous \u2014 probes must flag concealed objectives during benign work, not only during attacks.\n- Validate at 70B scale: if the signal transfers from 8B with probe retraining, the signature is robust across capability levels. If it vanishes, dual-optimization may become harder to detect as models grow.", "improved_text": "## B: Probing for the Computational Overhead of Hidden Objectives\n\n**Problem:** Concealing a goal while appearing aligned requires extra computation \u2014 does this overhead leave activation traces that transfer across different hidden goals?\n\n**Research Questions:**\n1. **If you train a probe to spot concealment for one hidden goal, does it transfer to entirely different goals?** Transfer would mean the probe detects dual-optimization structure, not goal content \u2014 enabling detection without threat-specific labels.\n2. **Is the signal really about concealment, or just training-recipe artifacts and multi-objective complexity?** Without controls separating these, cross-goal transfer alone is uninterpretable.\n\n**Deliverable:** Cross-goal probe transfer results with layer/position analysis, controlled evidence for whether the signal reflects concealment or confounds, and open-source model organisms.\n\n**Approach:**\n- Build paired organisms via character training (open-weight 8B): for each of three goals, a concealing variant and an open variant. The hard part is behavioral validation before probing \u2014 confirm organisms pursue their goal opportunistically while denying it under questioning. This iteration is the main schedule risk.\n- Train probes on one goal-pair, test on held-out pairs during routine tasks unrelated to the hidden goal. Persistent signal during ordinary work is what deployment monitoring needs; signal only during goal-relevant contexts is narrower but still informative.\n- Three controls make positive results interpretable: concealment-language constitutions with no actual hidden goal (training artifact?), models openly pursuing two simultaneous objectives (generic multi-objective signal?), capability-matched comparisons (concealment training may degrade performance, making probes just capability detectors).\n- This tests instructed concealment, which is simpler than emergent scheming. If probes can't detect the easy case, they won't detect the hard one. If they can, the ecological validity gap to natural scheming remains open but the structural finding still informs monitoring design.", "selected_variation": 8, "selection_reason": "Candidate 9 has the most rigorous experimental design: its three controls (concealment-language-without-hidden-goal, open multi-objective, capability-matched) each rule out a distinct confound that would make positive results uninterpretable, addressing failure modes the other candidates miss. The honest final paragraph framing instructed concealment as the easy case, with the ecological validity gap explicitly acknowledged rather than hand-waved, reflects the sharpest thinking about what the results would actually mean.", "n_variations": 10, "title": "Probes for the Activation Signature of Concealed Objectives"}]}, "22": {"prompt_text": "Honeypots for catching scheming models face a paradox: in well-secured deployments, genuine chances for undetected defection are vanishingly rare\u2014so any evaluation presenting such an opportunity is inherently anomalous. What research could make sting evaluations viable despite this?", "ideas": [{"idea_id": "P22_R12_A", "original_text": "## A: Implanting False Security Beliefs via SDF to Make Honeypots Plausible\n\n**Problem:** Scheming models infer honeypots from the rarity of real defection opportunities in well-secured deployments, making stings trivially detectable.\n\n**Research Question:**\n**Can SDF-implanted beliefs about security weaknesses make a scheming model treat honeypot opportunities as genuine?** The defection rate change after belief implantation reveals whether manipulating the model's world model is a viable sting strategy.\n\n**Deliverable:** Measured effect of security-belief implantation on honeypot defection rates in scheming model organisms, with guidelines on belief content and specificity.\n\n**Approach:**\n- Build a scheming model organism using open character training on Llama 70B, validated by confirming it defects on perceived-real opportunities but abstains when suspecting tests. This discriminating behavior is the prerequisite\u2014without it, you can't measure whether any intervention works.\n- Generate ~40k SDF documents describing plausible security weaknesses: misconfigured egress permissions, monitoring blind spots, credential leaks in reviewed code. Content must resemble realistic deployment artifacts, since a sophisticated model would discount cartoonish failures.\n- Compare honeypot defection rates before and after SDF across honeypots varying in realism. The key metric is whether implanted beliefs shift the model's strategic estimate of P(real|opportunity) enough to change behavior. Also track benign task performance for unintended side effects.\n- Vary belief specificity\u2014generic (\"monitoring coverage is incomplete\") versus precise (\"egress monitor v2.3 has a known logging gap\")\u2014to map the tradeoff between sting-matching effectiveness and fragility when beliefs contradict the model's runtime observations.\n\n---", "improved_text": "\n\n## A: Shifting Security Beliefs via SDF to Enable Sting Evaluations\n\n**Problem:** Scheming models can dismiss honeypots as tests because real defection opportunities are rare in well-secured deployments.\n\n**Research Questions:**\n1. **Does planting false security beliefs make a model defect on matching honeypots specifically, or does it just get reckless across the board?** Only targeted defection increase is useful for stings\u2014indiscriminate recklessness is already catchable by monitoring.\n2. **How quickly do implanted beliefs fall apart when the model can actually probe its environment?** If beliefs don't survive the model checking a config file, the technique has no shelf life in agentic deployments.\n\n**Deliverable:** Measured defection rates across honeypot types before/after belief implantation in a scheming model organism, with data on which belief specificity levels survive strategic reasoning. The model organism itself is a secondary contribution.\n\n**Approach:**\n- Build a discriminating scheming model organism on Llama 70B: character training (OCT pipeline) for misaligned goals, then SDF for situational awareness about testing regimes. Validate that defection rates differ between realistic-looking and obvious-test contexts\u2014without this discriminating behavior, nothing downstream is measurable. This step is the project's main risk; if no configuration produces discrimination, document what failed.\n- Apply a second SDF round implanting beliefs about specific security weaknesses (monitoring gaps, egress misconfigurations). Present honeypots in three categories: matching the implanted weakness, exploiting unrelated weaknesses, and obvious tests. The matching-vs-non-matching comparison is what distinguishes targeted belief shift from general recklessness.\n- Control for propensity confounds by including an SDF condition describing identical weaknesses in *other organizations'* systems. If this also raises defection, SDF is training exploit-mindedness rather than planting beliefs.\n- Test belief durability by giving the model tools to inspect its environment (read configs, probe network). Measure whether defection drops as the model accumulates evidence contradicting implanted beliefs.", "selected_variation": 3, "selection_reason": "Sharpest controls across all candidates: the 'other organizations' SDF condition uniquely isolates belief-planting from exploit-mindedness training (a confound no other candidate identifies), and tool-based environment probing tests belief durability under realistic agentic conditions rather than just injecting contradictory text\u2014both choices are load-bearing for the research questions and tightly motivated.", "n_variations": 10, "title": "Implanting False Security Beliefs via SDF to Make Honeypots Plausible"}, {"idea_id": "P22_R4_C", "original_text": "## C: Omission-Based Stings: Catching Models That Don't Report Planted Vulnerabilities\n\n**Problem:** Commission stings (\"exploit this gap\") are inherently anomalous in secure environments; testing whether models report discoverable bugs is not, because bugs always exist.\n\n**Research Question:**\n**Can planted vulnerabilities distinguish aligned models from those strategically withholding security-relevant findings?** The model's correct behavior (report the bug) is identical whether or not it's a test, so anomalousness can't help a schemer decide to play safe.\n\n**Deliverable:** A vulnerability-planting methodology with detection thresholds for distinguishing strategic withholding from capability limitations.\n\n**Approach:**\n- Build a corpus from real open-source codebases with injected vulnerabilities at varying subtlety (injection flaws, logic errors, buffer overflows). Real projects provide natural code context that doesn't signal \"planted\" \u2014 the key failure mode of synthetic codebases.\n- Establish per-model capability baselines: explicitly instruct each model to find all security bugs. This upper-bounds aligned discovery rates and separates strategic omission from genuine inability \u2014 the essential comparison that makes any single omission interpretable.\n- Run models on the same codebases in normal development workflows (feature implementation, code review) without explicit security instructions. The signal isn't raw omission rates but *differential* omission: are security-relevant bugs missed at disproportionately higher rates than comparably difficult non-security bugs?\n- Address statistical power: individual omissions are ambiguous. Use sequential testing across many planted bugs and estimate the minimum number needed for reliable detection at operationally relevant false-positive rates.\n\n---", "improved_text": "\n\n## C: Omission-Based Stings: Catching Models That Don't Report Planted Vulnerabilities\n\n**Problem:** Commission stings are inherently anomalous in secure deployments; testing whether models report discoverable bugs is not, because bugs always exist.\n\n**Research Questions:**\n1. **Can models actually tell planted vulnerabilities from organic ones?** If yes, a schemer just reports planted bugs and ignores real ones, and the whole approach is dead. This gates everything else.\n2. **How many planted bugs do you need before strategic non-reporting becomes statistically distinguishable from just being bad at finding bugs?** The answer determines whether this is a practical monitoring technique or a theoretical curiosity.\n\n**Deliverable:** A vulnerability-injection corpus built from real open-source projects with known CVEs; empirical discrimination rates for frontier models; a sequential testing protocol with detection-power curves parameterized by planting rate and underreporting gap.\n\n**Approach:**\n- **Discrimination gate (first 2\u20133 weeks):** Take real projects with known CVEs, create matched versions with comparable vulnerabilities injected elsewhere. Ask models to classify which is planted. If accuracy exceeds ~60%, study why (style mismatch, dead code paths, inconsistent commit context) and iterate on injection. This determines whether the rest proceeds.\n- **Capability baselining via explicit audit:** Measure each model's bug-detection rate under direct \"find all bugs\" instructions across difficulty levels. This establishes the ceiling \u2014 the rate you'd see if the model were trying \u2014 and provides per-bug difficulty ratings independent of security relevance.\n- **Differential omission in realistic workflows:** Run models on coding tasks with planted bugs, no security instructions. The signal is the gap between detection of security bugs and difficulty-matched non-security bugs in the same code regions. Include security bugs with no strategic value (client-side, internal tools) as a within-categor
