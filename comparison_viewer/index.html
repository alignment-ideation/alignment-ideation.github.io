y control, since a schemer has reason to suppress only exploitable ones.\n- **Sequential testing analysis:** Compute detection power as a function of planted-bug count, difficulty, and underreporting gap at 5% FPR. The concrete output: does planting 50 bugs per quarter give useful signal, or do you need 500?", "selected_variation": 9, "selection_reason": "Candidate 10 has the most coherent staging (discrimination gate first as a go/no-go, then baselining, then the core experiment), and its within-category control\u2014using security bugs with no strategic value (client-side, internal tools) alongside exploitable ones\u2014is a genuinely clever design choice that directly isolates strategic withholding from general security-bug difficulty, which is the key confound the other candidates struggle with.", "n_variations": 10, "title": "Omission-Based Stings: Catching Models That Don't Report Planted Vulnerabilities"}, {"idea_id": "P22_R10_B", "original_text": "## B: Dual-Use Task Distributions Where Legitimate Work Resembles Defection\n\n**Problem:** Standalone stings present opportunities that never arise in normal work, making them trivially distinguishable from routine deployment tasks.\n\n**Research Question:**\n**Can stings become indistinguishable if the task itself naturally requires the same actions as defection?** In security auditing or code review, identifying vulnerabilities and exploiting them share identical initial steps\u2014only the final action diverges.\n\n**Deliverable:** A validated task framework where embedded stings are empirically indistinguishable from normal tasks, tested against model organisms of varying sophistication.\n\n**Approach:**\n- Build agentic task distributions around security-adjacent work: code review on real open-source repos with known CVEs, permission auditing on intentionally misconfigured services. The critical property is that correct task completion and defection share the first several tool calls\u2014only the terminal action (report vs. exploit) diverges.\n- Embed sting tasks at realistic rates within normal task distributions. Measure defection rates on embedded stings vs. identical scenarios presented as standalone evaluations. The difference directly quantifies how much workflow integration reduces sting detectability.\n- The hard construction step is making the branch point late: use CVE-containing code where discovering and staging the exploit shares many steps with writing a vulnerability report. Measure at what step the model's actions begin diverging between legitimate and defection paths.\n- Test across model organisms of increasing sophistication\u2014prompted goals through SFT-trained conditional policies\u2014to identify the capability level where workflow blending stops providing cover.", "improved_text": "\n\n## B: Making Sting Evaluations Harder to Spot by Embedding Them in Security-Audit Work\n\n**Problem:** Sting tasks offering defection opportunities are anomalous in locked-down deployments; models with situational awareness can avoid them.\n\n**Research Questions:**\n1. **Which sting design features actually matter for hiding them?** Action-sequence overlap, organic-looking exploit access, and embedding depth in prior work are all plausible\u2014but their relative importance is unknown and determines where to invest effort.\n2. **Can you measure sting quality without building a scheming model?** If frontier models can directly classify tasks as \"planted evaluation vs. real work,\" that gives cheaper, more granular signal than defection-rate comparisons.\n\n**Deliverable:** A reusable security-audit task distribution with embedded stings of varying design, empirical ranking of which design properties most affect distinguishability across capability levels, and validated discrimination benchmarks for evaluating future sting designs.\n\n**Approach:**\n- Build tasks around code review on real open-source repos with known CVEs. Sting variants give sandboxed access to a service the vulnerability could affect\u2014the branch between \"write report\" and \"demonstrate exploit\" comes late because both require the same analysis steps. The hard construction problem is making that exploitable access look organic; restrict to repos with existing docker-compose or CI test infrastructure so the target isn't fabricated.\n- Measure distinguishability directly: ask frontier models to classify tasks as stings vs. routine work. This decouples the discrimination question from the defection question, runs cheaply, and reveals *which features* leak signal rather than just whether the sting works.\n- Vary action overlap depth, exploit-access naturalness, and embedding context independently across task instances to identify which properties drive classification accuracy.\n- Validate with prompted model organisms (instructed to defect when unmonitored): compare defection rates on embedded vs. standalone stings to confirm discrimination accuracy predicts behavioral differences.", "selected_variation": 0, "selection_reason": "RQ2\u2014measuring sting quality via direct discrimination tests rather than requiring a scheming model\u2014is the sharpest and most consequential insight across all candidates, addressing a fundamental bootstrapping problem that makes the entire sting-evaluation research program more tractable. The approach is tightly integrated: direct classification decouples detectability from defection, independent feature variation yields a ranked design guide, and model-organism validation closes the loop.", "n_variations": 10, "title": "Dual-Use Task Distributions Where Legitimate Work Resembles Defection"}]}, "25": {"prompt_text": "Scalable oversight has been benchmarked only on verifiable tasks, yet the dangerous failures occur on judgment-heavy work where no ground truth exists \u2014 what research could produce the first credible evaluation infrastructure for oversight on inherently fuzzy domains?", "ideas": [{"idea_id": "P25_R10_D", "original_text": "## D: Red-Team Control Evaluations for Research Judgment Oversight\n\n**Problem:** Control evaluations cover code backdoors but not research judgment sabotage \u2014 the threat model Anthropic's own sabotage report identifies as hardest to mitigate.\n\n**Research Question:**\n**What safety-usefulness Pareto frontier do oversight protocols achieve when an adversarial model actively steers ML research decisions toward worse outcomes?** This extends the AI Control methodology to the fuzzy domain where it matters most.\n\n**Deliverable:** Safety-usefulness frontiers for debate, monitoring, and defer-to-trusted on research judgment tasks, directly comparable to existing control evaluation results.\n\n**Approach:**\n- Build a research judgment testbed: an untrusted model recommends ML approaches through an oversight protocol to a weaker trusted judge. Run both recommended and alternative approaches for ground truth. The red team replaces the untrusted model with an adversarial pipeline producing plausible-sounding justifications for worse approaches \u2014 the attack surface is persuasive reasoning, not code injection.\n- Measure safety (adversarial recommendations caught) and usefulness (honest recommendations accepted) independently, plotting Pareto frontiers for debate, trusted monitoring, untrusted monitoring, and defer-to-trusted. This mirrors the original AI Control paper, making results directly comparable and immediately legible to teams already using that framework.\n- Equip the red team with one-shot prompting using a successful subtle-steering transcript, following the sandbagging paper's finding that a single example dramatically improves adversarial quality. Without this, the red team produces obviously biased recommendations, and the results underestimate real deployment risk.\n- Include the \"ignore all justifications\" baseline \u2014 if no oversight protocol beats simply discarding the strong model's reasoning and defaulting to the weak model's judgment, that tells you something crucial about the viability of research oversight as currently conceived.", "improved_text": "## D: Control Evaluations for Adversarial Research Recommendations\n\n**Problem:** Control evaluations cover code backdoors but not research judgment sabotage \u2014 the threat Anthropic's sabotage risk report identifies as hardest to mitigate.\n\n**Research Questions:**\n1. **Can any oversight protocol beat just ignoring the strong model's reasoning?** The \"discard reasoning\" baseline is the real deployment alternative \u2014 if monitoring can't outperform it, that calls into question whether untrusted research recommendations are worth the risk.\n2. **How hard does the research decision have to be before monitoring stops helping?** Results conditional on decision difficulty reveal where to draw the line between automated and human-reviewed research calls.\n\n**Deliverable:** Safety-usefulness Pareto frontiers for oversight protocols on research judgment, comparable to code-backdoor control evaluations; a reusable adversarial research-decision testbed.\n\n**Approach:**\n- Build decisions from the sandbagging paper's ML benchmark tasks: generate approach pairs per task, run both for scores, keep pairs with moderate performance gaps spanning a difficulty gradient. Results conditional on difficulty reveal *where* monitoring breaks down \u2014 the hard part is ensuring enough genuinely ambiguous decisions where both approaches have real tradeoffs, not just obvious better/worse splits.\n- Red team generates plausible justifications steering judges toward worse approaches. Bootstrap one-shot examples by selecting adversarial justifications that evade monitoring while misleading judges \u2014 without this step, the sandbagging paper showed adversarial quality is unrealistically low.\n- Evaluate trusted monitoring, untrusted monitoring with anti-collusion measures, adversarial review (second untrusted instance argues the other side \u2014 tests whether debate helps judge or adversary more), defer-to-trusted, and the discard-all-reasoning baseline.\n- Compare frontiers to code-backdoor results from the AI Control paper to quantify the cost non-verifiability imposes on oversight.", "selected_variation": 1, "selection_reason": "Candidate 2 has the most coherent end-to-end design: the difficulty gradient directly serves RQ2, the adversarial review protocol is uniquely motivated by the reasoning domain (testing whether debate helps judge or adversary more), the red-team bootstrap is well-specified, and the explicit comparison to code-backdoor frontiers makes the contribution immediately interpretable.", "n_variations": 10, "title": "Red-Team Control Evaluations for Research Judgment Oversight"}, {"idea_id": "P25_R1_A", "original_text": "## A: Research Decisions with Concealed Experimental Outcomes\n\n**Problem:** Oversight benchmarks require ground truth, yet research steering \u2014 the most practical sabotage pathway \u2014 has no evaluation with verified outcomes.\n\n**Research Question:**\n**Can ML ablation studies serve as hidden ground truth for measuring oversight on research recommendations?** The decision looks open to the overseer, but experimental outcomes are already known.\n\n**Deliverable:** A ~300-task benchmark with verified outcomes, plus measured detection rates for oversight protocols against adversarial research recommendations.\n\n**Approach:**\n- Mine arXiv papers for ablation tables where one approach clearly outperformed. Strip results but keep context (motivation, related work) so both options appear plausible. Claude extracts candidates at scale; humans validate a subset for realism and ambiguity.\n- Generate paired honest and sabotaged research memos per decision point. The sabotaged memo argues convincingly for the worse option using standard ML reasoning. Validate both read as reasonable to an ML-literate reviewer.\n- Benchmark three oversight protocols \u2014 trusted monitoring, untrusted cross-examination, AI debate \u2014 measuring detection accuracy. Vary the ground-truth performance gap between options to find where each protocol breaks down.\n- Release an automated paper-to-benchmark pipeline so the dataset grows as papers publish and stays ahead of memorization.\n\n---", "improved_text": "## A: Measuring Where Oversight Breaks on Research Steering\n\n**Problem:** Research sandbagging is the hardest sabotage pathway to rule out, yet no benchmark has verified ground truth for oversight on research recommendations.\n\n**Research Questions:**\n1. **How small can the real performance gap get before monitors can't tell sabotage from honest disagreement?** Sabotage targets ambiguous decisions \u2014 we need the detection-vs-gap curve, not a pass/fail on easy cases.\n2. **Does giving a weaker adjudicator adversarial counter-arguments actually help, or just add noise?** Cross-examination is the natural oversight structure here but hasn't been measured against verified outcomes.\n\n**Deliverable:** A benchmark of research decisions with hidden ground truth from ML ablation studies, plus detection-rate curves for oversight protocols across decision difficulty.\n\n**Approach:**\n- Mine ML papers for ablation comparisons with known performance gaps. Strip results AND author framing that signals which option won \u2014 authors telegraph winners through enthusiasm and narrative, requiring neutral rewrites with human validation.\n- Generate paired honest and sabotaged research memos per decision point. Validate a subset with ML researchers who don't know which is which \u2014 if they can reliably tell, the sabotaged memos are too weak and detection rates don't transfer.\n- Measure memorization: can models predict stripped outcomes from context alone? This identifies contaminated items and sets a baseline for how much the surrounding context leaks.\n- Test trusted monitoring, cross-examination, and a no-signal baseline at fixed false-positive rates across gap bins. The target output is detection rate vs. gap size by protocol \u2014 a clear threshold directly informs which research decisions need human review.", "selected_variation": 1, "selection_reason": "Tightest methodology of the set \u2014 the explicit point about stripping author framing (not just results) shows real understanding of the construction challenge others miss, and the memorization check doubles as both contamination control and baseline calibration. Both research questions are sharp and independently falsifiable, and every methodological step clearly serves the deliverable of detection-rate-vs-gap curves at fixed FPR.", "n_variations": 10, "title": "Research Decisions with Concealed Experimental Outcomes"}, {"idea_id": "P25_R14_B", "original_text": "## B: Planted Methodological Sabotage as a Fuzzy Oversight Benchmark\n\n**Problem:** Subtle research quality degradation is the most realistic sabotage threat, yet no benchmark tests oversight against it.\n\n**Research Question:**\n**Can strong models introduce methodological flaws that degrade ML experiment outcomes while evading oversight?** Unlike binary code backdoors, these produce continuous quality impacts and require domain judgment to detect.\n\n**Deliverable:** A degradation-injection pipeline and ~200 sabotaged experiments with measured performance deltas.\n\n**Approach:**\n- Take ~30 working ML experiments. Have a strong model introduce degradations: suboptimal but defensible hyperparameters, subtle data contamination, omitted ablations, misleading result summaries. Finding modifications that are realistic yet impactful is the core difficulty \u2014 iterate by filtering both no-effect and obviously-broken cases.\n- Run originals and degraded versions side-by-side. The continuous performance delta is ground truth, fundamentally different from binary backdoor detection and requiring recalibration of what \"caught\" means across a severity spectrum.\n- Produce ROC curves for trusted monitoring, debate, and untrusted monitoring as degradation severity varies. This reveals the severity threshold where each protocol becomes effective \u2014 answering \"how bad must sabotage be before we catch it?\"\n- Compare against ML researchers reviewing identical code under matched time pressure. Identify which degradation types neither oversight protocol nor humans reliably catch \u2014 these residual threats inform where additional defenses are needed.", "improved_text": "\n\n## B: How Bad Does Research Sabotage Need to Be Before Oversight Catches It?\n\n**Problem:** No benchmark measures oversight detection as a function of sabotage severity \u2014 deployment teams can't estimate residual damage from undetected research quality degradation.\n\n**Research Questions:**\n1. **At realistic false-positive rates, what's the minimum sabotage severity each oversight protocol reliably catches?** This produces detection curves (severity \u2192 catch rate) rather than single point estimates, directly informing monitoring budget decisions.\n2. **Which kinds of degradation slip through even at high severity?** Identifying the residual class \u2014 modifications that are impactful but undetectable \u2014 tells you where monitoring alone isn't enough.\n\n**Deliverable:** A degradation-injection pipeline, ~150+ sabotaged ML experiments with measured performance deltas, and ROC curves for trusted monitoring, untrusted monitoring, and human review stratified by severity and modification type.\n\n**Approach:**\n- Build on the Gasteiger et al. task suite, supplemented with multi-step tasks closer to real research. Prompt a strong model to modify working solutions targeting specific performance reductions, run both versions, retain only modifications hitting a target severity band (~20\u201330% hit rate, but cheap per attempt). Heavy iteration in month one \u2014 if calibrated generation doesn't work, rescope early.\n- The hard filter beyond severity: *defensibility*. A suboptimal learning rate is defensible; a hardcoded wrong answer isn't. Use a model judge for initial screening, human spot-checks on a sample. Track coverage across modification types to avoid clustering on easy-to-generate patterns like hyperparameter changes.\n- Run each degraded experiment through trusted monitoring, untrusted monitoring, and ~10 ML researchers reviewing a subset under realistic time pressure. Primary output: detection curves at 2\u20135% FPR.\n- Validate by comparing detection profiles against organically-sandbagged transcripts from Gasteiger et al. at matched severity. If planted and organic degradations have divergent detection profiles, the benchmark doesn't transfer \u2014 this comparison determines whether results are meaningful.", "selected_variation": 4, "selection_reason": "Sharpest operationalization (detection curves at fixed FPR, residual class identification) combined with the strongest methodological safeguard: validating planted degradations against organically-sandbagged transcripts from Gasteiger et al. to check ecological validity \u2014 a step no other candidate includes, yet one that determines whether the entire benchmark transfers to real threats.", "n_variations": 10, "title": "Planted Methodological Sabotage as a Fuzzy Oversight Benchmark"}]}, "28": {"prompt_text": "What research approaches could distinguish genuine capability limitations from strategic weak-model imitation \u2014 where a sandbagging model produces outputs behaviorally identical to simply being a worse model?", "ideas": [{"idea_id": "P28_R13_D", "original_text": "## D: RL Exploration Patterns as Evidence of Hidden Capability\n\n**Problem:** SFT-based elicitation hands models correct answers; RL reveals capability only through the model's own exploration behavior.\n\n**Research Question:**\n**Do sandbagging models produce detectably different exploration patterns than genuine weak models during RL training?** A sandbagging model must either leak correct answers during exploration or systematically avoid them \u2014 both distinguishable from genuine incompetence.\n\n**Deliverable:** Empirical characterization of exploration signatures for genuine vs. sandbagging models on verifiable tasks, with a detection method.\n\n**Approach:**\n- Apply expert iteration with binary correctness rewards to genuine weak models and sandbagging organisms on held-out math, code, and MCQ tasks. Track per-rollout statistics: fraction correct, strategy diversity, and correlation between attempted-answer confidence and correctness.\n- The core asymmetry: genuine weakness produces uninformed wrong answers uncorrelated with what's correct. Sandbagging produces informed avoidance \u2014 wrong answers that track the right answer. Test this directly: shuffle MCQ option positions across runs and measure whether the model's errors track where the correct answer moved.\n- Compare RL improvement rates against the genuine weak baseline. Abnormally slow improvement relative to exploration diversity suggests exploration hacking; abnormally fast improvement suggests capability leaking. Either deviates from the genuine trajectory.\n- Characterize when this fails: if the sandbagging model can calibrate its exploration to exactly match genuine learning dynamics, measure how much RL training is needed before the signals diverge.", "improved_text": "\n\n## D: Detecting Hidden Capability Through RL Exploration Dynamics\n\n**Problem:** Single-transcript monitoring barely distinguishes sandbagging from genuine weakness. RL training generates thousands of rollouts \u2014 does hidden capability leak through them?\n\n**Research Questions:**\n1. **How much does a sandbagging model's exploration give it away during RL?** Genuinely weak models explore uninformedly; models hiding capability must either leak correct answers or systematically avoid them, both potentially detectable.\n2. **Can current models learn to suppress this leakage, and how much RL pressure does that take?** If gradient pressure toward correct answers competes with the sandbagging objective, there may be a persistent detection window \u2014 or models may learn to exploration-hack it away.\n\n**Deliverable:** Empirical measurements of capability leakage across sandbagging strategies of increasing sophistication, with a detection method and false-positive rates against genuinely weak baselines.\n\n**Approach:**\n- Build three sandbagging variants of increasing realism on math, code, and MCQ tasks: prompted sandbagging (floor), password-locked models with genuine conditional policies (mid), and password-locked models further fine-tuned to minimize exploration leakage (ceiling). The ceiling variant is the hard part \u2014 it requires training against the detection signal itself, which tells us whether the method survives adversarial pressure.\n- Run expert iteration with correctness rewards on each variant plus genuinely weaker models (smaller models matched to apparent performance). Track improvement rate versus fraction of rollouts stumbling into correct answers \u2014 these should be tightly coupled for genuine learners and decoupled for sandbaggers.\n- On MCQ tasks, shuffle option positions across rollouts and measure mutual information between the model's answer distribution and correct-answer position. Negative MI is a smoking gun; near-zero MI from a model that should have partial knowledge is suspicious. This test has a clean null hypothesis, unlike the noisier code/math signals.\n- Measure whether RL gradually teaches the sandbagging model to suppress leakage over training steps. A shrinking detection window means the method is time-limited; persistent signals under gradient pressure mean it's robust.", "selected_variation": 1, "selection_reason": "The three-tier design (prompted/password-locked/adversarially-trained ceiling) directly operationalizes the core question of how sophisticated sandbagging must get before detection fails, and the ceiling variant\u2014training against the detection signal itself\u2014is the critical test that most other candidates only gesture at. The decoupled improvement-rate-vs-correct-rollout-fraction signal and the measurement of whether RL gradually teaches suppression give clean, falsifiable predictions that follow tightly from the research questions.", "n_variations": 10, "title": "RL Exploration Patterns as Evidence of Hidden Capability"}, {"idea_id": "P28_R12_A", "original_text": "## A: Probing Whether Wrong Answers Conceal Right Knowledge\n\n**Problem:** Behavioral tests can't separate sandbagging from genuine weakness because outputs are identical by construction.\n\n**Research Question:**\n**When a model answers incorrectly, do its activations encode the correct answer more than a genuinely weak model's do?** This measures concealed capability directly, sidestepping the calibration problems that defeated honesty/deception probes in prior auditing games.\n\n**Deliverable:** A probe-based sandbagging detector with ROC curves across logit-matched, password-locked, and prompted sandbagging, benchmarked against genuine-weak controls.\n\n**Approach:**\n- Build matched comparisons: logit-matching distillation sandbaggers (70B\u21928B output profile, Cedar-style from the Auditing Games work), password-locked models, and genuinely weak models of the same architecture. Evaluate all on WMDP and MMLU.\n- On wrong-answer questions, train linear probes per layer to predict the correct answer from residual stream activations. Core measurement: probe accuracy gap between sandbagging and genuine-weakness conditions on the same incorrectly-answered questions.\n- The hard part is calibrating baselines: pretraining leaves residual correct-answer information even in genuinely weak models. Measure this floor across multiple weak-model sizes and training stages to quantify how much detection margin exists above it.\n- Stress-test with distractor behaviors (benign models given deliberately confusing quirks, as in Auditing Games) as negative controls, verifying the probe signal isn't just detecting \"anything unusual about this model.\"\n\n---", "improved_text": "\n\n## A: Activation Probes on Wrong Answers as a Sandbagging Detector\n\n**Problem:** Behavioral tests can't separate sandbagging from genuine weakness \u2014 outputs are identical by design. Probes might detect concealed knowledge that behavioral monitors miss.\n\n**Research Questions:**\n1. **When a model answers wrong, do its internals still encode the right answer more than a genuinely weak model's do?** The gap between these \u2014 the \"concealed knowledge score\" \u2014 is what would make this useful as a detector.\n2. **Does this gap survive for prompted weak-model imitation, or only for crude mechanisms like password-locking?** Weak-model imitation is the strategically important case; if probes only catch easy sandbagging, the result doesn't help.\n\n**Deliverable:** ROC curves for probe-based sandbagging detection across sandbagging mechanisms, with matched genuine-weakness baselines. Clear picture of where the approach works and where it breaks down.\n\n**Approach:**\n- Train linear probes per layer to predict correct MMLU/WMDP answers from residual-stream activations on questions the model answers correctly; apply to wrong-answer questions. The \"concealed knowledge score\" is probe accuracy on errors.\n- Compare across sandbagging conditions: password-locked models (RL-trained, established model organisms \u2014 main engineering effort), prompted sandbagging, and prompted weak-model imitation from the Automated Researchers paper. Generalization across mechanisms is a primary measurement.\n- The hard part is the genuine-weakness baseline. Key control: difficulty-match questions so sandbagged and genuine errors come from the same accuracy band (40\u201370%), preventing the probe from just detecting question ease. Also compare against smaller same-family models and measure whether anti-sandbagging training (which recovers ~95% of performance) shifts probe scores toward the genuine-weakness floor \u2014 if it doesn't, probes are catching something the training misses.\n- A clean negative result \u2014 probes can't distinguish prompted weak-model imitation from genuine weakness \u2014 is itself useful, narrowing what detection strategies are viable for distributed sandbagging.", "selected_variation": 6, "selection_reason": "Sharpest strategic framing (weak-model imitation as the case that matters, not just password-locking where simpler methods suffice), plus the anti-sandbagging training test is a genuinely novel and load-bearing addition no other candidate includes \u2014 if behavioral recovery doesn't shift probe scores toward the genuine-weakness floor, that's an actionable finding about what probes detect. Reads most naturally throughout.", "n_variations": 10, "title": "Probing Whether Wrong Answers Conceal Right Knowledge"}, {"idea_id": "P28_R14_C", "original_text": "## C: Compute-Scaling Curves as a Black-Box Sandbagging Diagnostic\n\n**Problem:** Imitative training matches a weak model's base performance but hasn't been trained to match how it responds to extra inference-time compute.\n\n**Research Question:**\n**Do sandbagging models' performance gains from extra compute match a genuine weak model's?** Logit-matching distillation trains on fixed-compute outputs; the model hasn't learned to imitate the weak model's chain-of-thought or best-of-N scaling behavior.\n\n**Deliverable:** Quantified compute-scaling divergence between sandbagging and genuine models, yielding a black-box detection protocol.\n\n**Approach:**\n- Create sandbagging organisms (Llama 70B distilled to imitate 8B) alongside genuine Llama 8B. Test both under compute-scaling interventions: chain-of-thought prompting, best-of-N sampling (N=1 to 64), step-by-step instructions, and forced extended reasoning at varying token budgets.\n- For each intervention, measure the genuine weak model's improvement curve as the reference distribution. The sandbagging model must match not just baseline accuracy but the entire improvement trajectory \u2014 a harder imitation target than static outputs alone.\n- Test whether divergences are detectable at evaluation-realistic sample sizes. Small systematic differences across multiple interventions compound, potentially enabling detection where any single test lacks power.\n- Measure how much additional distillation data (including weak-model CoT traces) closes the gap. This directly tells evaluators the cost of defeating this diagnostic, informing whether deploying it is worthwhile against capable adversaries.\n\n---", "improved_text": "\n\n## C: Compute-Scaling Curves as a Sandbagging Diagnostic\n\n**Problem:** Weak-model imitation is the hardest sandbagging to detect. Models trained to match static outputs may not match behavior under varying inference-time compute.\n\n**Research Questions:**\n1. **How much harder is it to fake a weak model's compute-scaling curve than its baseline accuracy?** A model matching pass@1 might diverge on pass@k distributions or CoT improvement trajectories\u2014but we don't know if the gap is detectable at realistic sample sizes.\n2. **Can an adversary cheaply train away the divergence?** If matching scaling behavior requires training data proportional to the number of compute conditions tested, the diagnostic scales favorably. If the model generalizes from a few examples, it doesn't.\n\n**Deliverable:** Detection power estimates (sample sizes needed at practical FPRs) for compute-scaling diagnostics against sandbagging organisms of varying adversarial strength; quantified cost for adversaries to defeat the diagnostic.\n\n**Approach:**\n- Build three sandbagging organisms from the same strong base model targeting a weaker model's performance: static-output distillation, prompted sandbagging, and scaling-aware distillation trained on the weak model's CoT traces and best-of-N samples. The third is the critical one\u2014it models an adversary who anticipates this test.\n- Measure each organism and the genuine weak model under best-of-N sampling (N=1 to 64), CoT at varying token budgets, and their cross-product. The joint distribution matters because matching two marginals is easier than matching their interaction.\n- Frame detection as hypothesis testing: report sample sizes needed for 80% power at 5% FPR per organism. This directly answers whether the diagnostic is practical.\n- For the scaling-aware organism, progressively increase training data and track how the detection gap closes. This measures adversary cost to defeat the diagnostic\u2014the load-bearing result for deciding whether to deploy it.", "selected_variation": 0, "selection_reason": "Sharpest research questions directly tied to deployment decisions, with the joint-distribution insight (matching two marginals is easier than matching their interaction) providing a genuine methodological contribution, and the progressive training-data experiment cleanly measuring adversary cost \u2014 the load-bearing result \u2014 without overextending scope.", "n_variations": 10, "title": "Compute-Scaling Curves as a Black-Box Sandbagging Diagnostic"}]}, "34": {"prompt_text": "What research would close the calibration gap between cyber evaluations saturating at near-perfect scores and the unpredicted failures models still encounter in realistic offensive scenarios?", "ideas": [{"idea_id": "P34_R11_A", "original_text": "## A: Vulnerability Transplants for Complexity-Controlled Cyber Evals\n\n**Problem:** Cyber evals saturate in clean CTF code; real codebase complexity \u2014 the actual difficulty driver \u2014 goes unmeasured and uncontrolled.\n\n**Research Question:**\n**How does codebase size degrade exploitation success when the vulnerability itself is held constant?** Transplanting identical vulnerabilities into progressively larger real projects isolates this variable.\n\n**Deliverable:** Success-vs-complexity degradation curves for frontier models, plus a reusable vulnerability transplant toolkit.\n\n**Approach:**\n- Inject 15+ saturated Cybench vulnerabilities into real open-source projects at four scales (1K\u2013500K+ LOC), using Claude Code to generate project-style integration code. Hard part is making injections look natural \u2014 match conventions, use realistic call sites, avoid bolted-on test-code patterns.\n- Run frontier models on all transplants and fit degradation curves. These curves predict at what code scale models become dangerous \u2014 directly actionable for RSP threshold-setting, unlike binary pass/fail.\n- Validate every transplant with a human pentester confirming the original exploit technique still works at all scales. Difficulty must come from code navigation, not from accidentally altering the bug.\n- Record where each model fails (find the file, find the function, construct the exploit) to identify whether information retrieval or exploitation reasoning is the current bottleneck.\n\n---", "improved_text": "\n\n## A: Vulnerability Transplants for Complexity-Controlled Cyber Evals\n\n**Problem:** Cyber evals saturate on clean CTFs while models fail on real codebases; we can't tell whether the bottleneck is finding the vulnerability or exploiting it.\n\n**Research Questions:**\n1. **When a model fails on a vulnerability it can solve in a small codebase, did it fail to find the right file or fail to reason about the exploit?** This distinction predicts which capability improvements (longer context, better tools, stronger reasoning) close the gap fastest.\n2. **How steeply does exploitation success degrade with codebase scale, and does the shape differ across vulnerability classes?** Injection bugs might degrade differently from logic errors if navigation difficulty interacts with how much surrounding context aids recognition.\n\n**Deliverable:** Per-class degradation curves across codebase scales, a navigation-vs-reasoning bottleneck breakdown for frontier models, and a reusable transplant toolkit with validated host-project pairings.\n\n**Approach:**\n- Select vulnerabilities from Cybench that frontier models solve at >90% in their original small codebases, spanning distinct classes (injection, memory corruption, logic errors, auth bypass). Transplant each into real open-source projects at several scales (~5K to 500K+ LOC), choosing host projects per vulnerability class so the bug fits the project's stack and idioms naturally. This matching is the hardest step \u2014 a SQL injection in a project that uses an ORM everywhere looks bolted on.\n- Each transplant gets human validation for both exploitability (original technique still works) and naturalness (a reviewer who doesn't know the vulnerability location reads the file and flags anything out of place). If reviewers consistently spot transplants, the experiment is measuring transplant quality, not codebase difficulty.\n- Run models with realistic framing: repo access via tools, application description, open-ended \"find and demonstrate a vulnerability\" instruction. Record structured traces \u2014 files examined, when vulnerable code was first seen, whether the model recognized it, whether it built a working exploit. The bottleneck decomposition falls directly out of these traces.", "selected_variation": 2, "selection_reason": "Sharpest integration of research questions with experimental design: the three conditions (full project, file pre-identified, original CTF) map cleanly onto the retrieval-vs-reasoning decomposition, and the blind naturalness validation ('if reviewers consistently spot transplants, the experiment is measuring transplant quality, not codebase difficulty') is the most rigorous articulation of the main confound across all candidates.", "n_variations": 10, "title": "Vulnerability Transplants for Complexity-Controlled Cyber Evals"}, {"idea_id": "P34_R10_D", "original_text": "## D: Separating Model Capability from Scaffolding Quality in Offensive Evals\n\n**Problem:** AutoAdvExBench found generic agents score near-zero while specialized ones reach 21% on the same model; current eval scores conflate model capability with agent design.\n\n**Research Question:**\n**How much of measured offensive capability is attributable to the model vs. the scaffold?** If scaffold quality dominates on saturated benchmarks, those benchmarks are measuring the wrong thing.\n\n**Deliverable:** Variance decomposition across models \u00d7 scaffolds \u00d7 task difficulties, with scaffold standardization recommendations for capability evaluations.\n\n**Approach:**\n- Run 3+ models (varying capability) \u00d7 3+ scaffold designs (generic SWE-agent style, task-class-specific, fully task-specific like AutoAdvExBench's 4-step agent) \u00d7 tasks at saturated and unsaturated difficulty. Factorial design decomposes variance into model, scaffold, and interaction terms.\n- The key test: if scaffold variance dominates on saturated benchmarks but model variance dominates on unsaturated ones, saturation reflects scaffold ceiling, not model capability \u2014 meaning CTF scores describe your tooling, not your model.\n- Track scaffold-dependence across model generations. If stronger models need less specialized scaffolding to match their best performance, scaffold-independence is itself a capability measure \u2014 one that likely increases smoothly rather than saturating abruptly.\n- Practical output: whether RSP-relevant cyber evals should report fixed-scaffold or best-scaffold results. Current best-scaffold practice inflates scores and obscures real capability differences between models.", "improved_text": "## D: When Cyber Evals Saturate, What Are They Actually Measuring?\n\n**Problem:** Cyber evals hit ~100% but scaffold swaps change scores dramatically\u2014benchmarks may measure tooling quality rather than the model capability RSPs target.\n\n**Research Questions:**\n1. **At what task difficulty does the model start mattering more than the scaffold?** Below that crossover, evals measure tooling. Above it, they measure what capability thresholds are supposed to track.\n2. **Do stronger models need less scaffold specialization to hit their ceiling?** If the bare-to-best-scaffold gap narrows across generations, that gap is a smoother capability signal than scores jumping from 30% to 100%.\n\n**Deliverable:** Empirical mapping of where model vs. scaffold variance contributions cross over as task difficulty increases, with recommendations for where to pitch eval difficulty to maintain discriminative power between model generations.\n\n**Approach:**\n- Factorial: models across capability tiers (within-family generations control for safety-training confounds, one cross-family anchor) \u00d7 three scaffold levels varying in embedded domain knowledge (bare, domain-equipped, task-class-tuned) \u00d7 tasks binned by empirical difficulty.\n- Define difficulty as bare-scaffold pass rate across models\u2014avoids noisy CTF difficulty labels. ~25 runs per cell for reliability given agentic stochasticity; pilot at reduced scale to validate design before full commitment.\n- Hard part is engineering three scaffolds that differ on domain knowledge, not incidental code quality\u2014each must work well enough that tool-wrapper bugs aren't the bottleneck. Roughly 40% of project time.\n- Clean outcome: scaffold swaps dominate on saturating tasks, model swaps dominate on harder ones, with a visible crossover. If model\u00d7scaffold interactions dominate instead, mapping anomalous pairings still reveals what current benchmarks are picking up.", "selected_variation": 1, "selection_reason": "Tightest methodological choices\u2014defining difficulty via bare-scaffold pass rate sidesteps the circularity other candidates ignore, within-family model selection controls for safety-training confounds, and the 40% scaffold-engineering budget plus pilot study show the author knows where the real execution risk lies. Reads like a plan someone would actually follow, not a template with blanks filled in.", "n_variations": 10, "title": "Separating Model Capability from Scaffolding Quality in Offensive Evals"}, {"idea_id": "P34_R3_B", "original_text": "## B: Blocking Standard Exploits to Measure Offensive Adaptation\n\n**Problem:** Models follow learned exploit patterns on benchmarks; real failures emerge when the textbook approach doesn't work and creative adaptation is required.\n\n**Research Question:**\n**When a model's standard exploit path is deliberately blocked, how often can it find an alternative?** This adaptation rate should discriminate between models even at identical benchmark pass rates, and may better predict real offensive performance.\n\n**Deliverable:** Measured adaptation rates across frontier models, plus an automated pipeline generating blocked-path challenge variants.\n\n**Approach:**\n- From challenges frontier models solve reliably, extract the exploit strategy from agent traces, then modify the Docker environment to block it: patch the CVE, alter the network route, change the service version. The critical validation: confirm an alternative path exists via human expert or automated vulnerability scanner before counting a failure as real.\n- Measure adaptation rate across models sharing identical benchmark scores. If it varies substantially at the same pass rate, it captures hidden capability variance \u2014 exactly the calibration signal saturated benchmarks lose.\n- Automate variant generation: an LLM reads a challenge plus its successful exploit trace and proposes environment changes that block the exploit while preserving an alternative path. Verify with automated testing that the original exploit fails but the target remains vulnerable through a different route.\n- Test whether adaptation rate on challenges models currently ace predicts performance on multi-step scenarios they currently fail, establishing it as a leading rather than redundant indicator.\n\n---", "improved_text": "\n\n## B: Blocking Standard Exploit Paths to Measure Offensive Adaptation\n\n**Problem:** Cyber benchmarks are saturating while models still fail unpredictably in realistic scenarios \u2014 saturated scores give no signal for RSP threshold calibration.\n\n**Research Questions:**\n1. **How much does performance actually drop when you block the exploit technique a model defaults to but leave an alternative path open?** This tests whether near-perfect benchmark scores reflect transferable offensive reasoning or memorized patterns.\n2. **Does adaptation rate on easy-but-blocked challenges predict performance on harder scenarios better than the original benchmark score?** If not, blocked variants are just harder challenges measuring the same thing.\n\n**Deliverable:** Measured adaptation rates decomposed into recognition/reorientation/execution stages across frontier models, plus a validated set of original-and-blocked challenge pairs built from configurable vulnerable environments.\n\n**Approach:**\n- Start from challenges models pass reliably. Collect traces across multiple runs to identify the dominant exploit technique per challenge, classified by technique type rather than exact commands. Build blocked variants using vulnerable-by-design applications (DVWA, Juice Shop, Vulhub) where the vulnerability surface is toggled via configuration \u2014 this makes alternative-path validation tractable by construction rather than requiring manual CTF design.\n- The key methodological control: separately test each model on challenges where the alternative technique is the *primary* unblocked path. If it succeeds there but fails on the blocked variant, the bottleneck is contextual adaptation, not a knowledge gap. Without this, results are uninterpretable.\n- Decompose failures from traces into three stages \u2014 did the model detect its approach failed, did it generate alternatives, did it execute one \u2014 because where models break down matters more for threat forecasting than whether they break down.\n- Validate the metric by correlating adaptation rates against performance on held-out harder challenges. If adaptation rate doesn't outpredict the original benchmark score, the whole approach is redundant.", "selected_variation": 4, "selection_reason": "Candidate 5 has the most load-bearing experimental design: the key methodological control\u2014testing each model on challenges where the alternative technique is the primary unblocked path\u2014disambiguates adaptation failure from knowledge gaps, making results interpretable in a way other candidates miss. Using configurable vulnerable-by-design applications to toggle attack surface also solves the alternative-path validation problem more tractably than manual CTF curation.", "n_variations": 10, "title": "Blocking Standard Exploits to Measure Offensive Adaptation"}]}, "41": {"prompt_text": "The same model that refuses harmful requests in chat provides chemical weapon instructions through a spreadsheet. Alignment doesn't transfer uniformly across interaction modalities \u2014 what research would predict which context boundaries are load-bearing for safety versus cosmetic?", "ideas": [{"idea_id": "P41_R9_B", "original_text": "## B: Separating Harm Recognition from Refusal Expression in Cross-Modality Safety Failures\n\n**Problem:** When models comply with harmful requests in non-chat formats, we don't know if they fail to detect the harm or detect it but can't express refusal.\n\n**Research Question:**\n**Is cross-modality safety failure driven by harm recognition gaps or refusal expression constraints?** The answer determines whether fixes should target training coverage or output format design.\n\n**Deliverable:** Empirical decomposition of safety failures across formats into recognition vs. expression components, with tested interventions for each.\n\n**Approach:**\n- For format/request pairs where models comply, test recognition concurrently: add a hidden `safety_flag` field to structured outputs the model fills alongside the task. If it flags harm but still completes the request, expression is the bottleneck \u2014 the model knows but can't say no.\n- Run the strongest causal test: add an explicit `decline_task` tool alongside normal format tools. If safety recovers when the model gains a typed refusal option, expression was binding. This directly suggests a deployable mitigation (always provide a refusal channel).\n- Where recognition fails (model doesn't flag harm even with a safety channel), test whether a single-sentence format-specific safety reminder restores detection. This distinguishes shallow distributional gaps from deeper failures.\n- Control for the probe itself changing behavior: run matched conditions with and without the concurrent safety field, comparing compliance rates. If merely asking changes behavior, that's independently informative about the fragility of the failure.\n\n---", "improved_text": "## B: Diagnosing Cross-Format Safety Failures\n\n**Problem:** Models refuse harmful requests in chat but comply through spreadsheets and GUI \u2014 unclear if they fail to detect harm or just can't express refusal.\n\n**Research Questions:**\n1. **Is the \"this is harmful\" signal still firing internally when models comply in non-chat formats?** Content-harmfulness probes (not refusal-prediction probes) on open-weight model activations can answer this without changing the input.\n2. **How much safety recovers just by giving the model a way to say no?** A 2\u00d72 factorial testing refusal affordances vs. safety reminders maps the bottleneck \u2014 and where neither works identifies failures that can't be fixed cheaply.\n\n**Deliverable:** Probe-based diagnostic predicting which cross-format failures need retraining vs. deploy-time fixes, plus tested interventions for each failure type.\n\n**Approach:**\n- Build confirmed failure pairs: requests refused in chat but completed in JSON, tool-call, code, or tabular format on open-weight models (need activation access). This step is non-trivial and everything downstream depends on it.\n- Train linear probes on content harmfulness labels, not refusal behavior \u2014 conflating \"recognizes harm\" with \"about to refuse\" is exactly the confound to avoid. Verify probe transfer on benign cross-format inputs first.\n- 2\u00d72 intervention: semantically neutral \"skip_task\" option (not safety-labeled, to avoid cueing safety reasoning) \u00d7 format-specific reminder. Skip-alone recovers safety \u2192 expression bottleneck. Reminder-alone \u2192 recognition gap.\n- Convergence check: probe-fires cases should be where refusal affordances help. Divergence \u2014 probe fires but skip doesn't \u2014 means format changes what the model considers permissible, not just whether it can refuse.", "selected_variation": 4, "selection_reason": "The critical distinction between training probes on content-harmfulness labels versus refusal behavior is the most important methodological insight across all candidates\u2014it avoids conflating the very confound the study aims to resolve. The clean 2\u00d72 factorial (semantically neutral skip_task \u00d7 safety reminder) and the convergence check (probe-fires cases should align with where affordances help; divergence reveals a third failure mode) make the design interpretable regardless of outcome.", "n_variations": 10, "title": "Separating Harm Recognition from Refusal Expression in Cross-Modality Safety Failures"}, {"idea_id": "P41_R16_D", "original_text": "## D: Safety Fails Where Formats Lack Natural Refusal Patterns\n\n**Problem:** Safety training produces conversational refusal patterns (\"I can't help with that\") that may have no natural equivalent in non-chat formats like JSON or spreadsheet cells.\n\n**Research Question:**\n**Does safety transfer correlate with whether a format has practiced refusal patterns?** If the model never learned what \"refusing in JSON\" looks like, it may lack the output machinery to express trained safety behavior in that format.\n\n**Deliverable:** Empirical test of the refusal affordance hypothesis, plus evidence on whether teaching format-specific refusals restores safety.\n\n**Approach:**\n- Measure each format's refusal vocabulary: prompt models with harmful requests across ~10 formats, collect refusal attempts, score their naturalness and diversity. Formats producing awkward or stereotyped refusals (empty JSON fields, bare code comments) likely have weak refusal affordances.\n- Correlate refusal affordance quality with harmful compliance rates. The prediction: formats lacking practiced refusal patterns show higher compliance \u2014 analogous to how bypassing chat refusal prefixes breaks token-depth alignment.\n- Test the direct intervention: provide few-shot refusal demonstrations in failing formats (e.g., \"to refuse in JSON, respond with `{'refused': true, 'reason': '...'}`\"). Measure whether teaching these patterns restores safety to near-chat levels.\n- Check whether format-shallowness and token-shallowness are the same phenomenon: in formats with weak refusal affordances, is the model's safety signal even more concentrated in its first tokens than in chat?", "improved_text": "## D: Why Safety Transfers to Some Output Formats and Not Others\n\n**Problem:** Models refuse harmful requests in chat but comply when the same content arrives as JSON, spreadsheet operations, or tool calls.\n\n**Research Questions:**\n1. **When a model complies in JSON with something it'd refuse in chat, does it still internally recognize the request as harmful?** Expression failure (can't articulate refusal) and recognition failure (doesn't notice the harm) demand different, unequally costly interventions.\n2. **Does matching the fix to the diagnosed mechanism actually matter, or does a generic \"safety still applies\" system prompt work just as well?** If the cheaper fix works everywhere, the mechanistic distinction isn't load-bearing.\n\n**Deliverable:** Per-format diagnosis of recognition vs. expression failure, with evidence on which targeted intervention closes each gap.\n\n**Approach:**\n- Build parallel harmful requests across several output formats (JSON, CSV, Python functions, SQL, tool calls). Each must reflect natural usage in that format\u2014not chat text wrapped in braces. Pilot with inter-rater agreement checks before scaling.\n- Train a linear probe on chat-format activations for \"harmful request detected\" (requires open-weight models). Apply during non-chat compliance: comparable probe signal \u2192 expression failure; attenuated signal \u2192 recognition failure.\n- Crossover intervention test: few-shot refusal templates for expression-failure formats, safety-reminder prompts for recognition-failure formats. The matched intervention should outperform the mismatched one\u2014if it doesn't, the distinction isn't actionable.\n- Pilot early to confirm the effect exists in text-based API interactions and isn't confined to GUI/computer-use modes, which can't be tested without internal tooling.", "selected_variation": 5, "selection_reason": "RQ2 ('does matching the fix to the diagnosed mechanism actually matter, or does a generic system prompt work just as well?') is the sharpest question across all candidates because it directly challenges whether the recognition/expression distinction is actionable, and the crossover intervention design\u2014matched vs. mismatched fix per diagnosed format\u2014is the most rigorous test of the framework's utility.", "n_variations": 10, "title": "Safety Fails Where Formats Lack Natural Refusal Patterns"}, {"idea_id": "P41_R3_D", "original_text": "## D: Does Forced Deliberation Recover Safety in Failed Formats?\n\n**Problem:** Safety may fail in non-chat formats because models skip safety reasoning, not because safety knowledge is absent \u2014 but we can't distinguish these without testing.\n\n**Research Question:**\n**For which formats does explicit safety reasoning recover refusal, and for which is it irrelevant?** Formats recoverable by deliberation are inference-time oversights; unrecoverable ones are training gaps. This distinction operationalizes \"load-bearing vs. cosmetic.\"\n\n**Deliverable:** Per-format triage of boundaries into inference-fixable vs. training-required, plus a cheap diagnostic for classifying new formats.\n\n**Approach:**\n- Take formats where safety fails (GUI, spreadsheet, code) and apply escalating interventions: safety reminders in the system prompt, forced chain-of-thought safety reasoning before task completion, and a two-step protocol where the model explicitly evaluates harmfulness before generating. The minimum intervention restoring refusal reveals how deep the gap runs.\n- Test across multiple frontier models. If deliberation fixes a format for Claude but not Gemini, the gap is training-specific; if it fails everywhere, the boundary is format-structural. Cross-model consistency strengthens the classification.\n- Formats unrecoverable by any intervention are definitionally load-bearing training gaps. Recoverable formats are inference-time oversights addressable with generation protocols. This classification directly informs deployment decisions about when system-prompt adjustments suffice versus when retraining is required.\n- Test whether the intervention level needed correlates with measurable format properties (output structure, tool framing, persona cues) to predict classification for new formats without running full evaluations. A cheap predictive triage tool is the practical payoff.", "improved_text": "## D: Cross-Format Safety Transfer: What Breaks and What's Cheaply Recoverable\n\n**Problem:** Safety doesn't transfer uniformly across interaction formats, and there's no fast way to predict which failures need cheap inference-time fixes versus format-specific retraining.\n\n**Research Questions:**\n1. **When safety fails in a non-chat format, does the model still internally \"know\" the request is harmful?** Probes trained on chat-format safety representations can test whether the knowledge transfers even when refusal behavior doesn't.\n2. **Can that internal signal predict whether a cheap intervention will actually recover refusal?** If probe-positive failures are fixable and probe-negative ones aren't, the probe becomes a fast triage tool for untested formats.\n\n**Deliverable:** Per-format classification of safety failures into inference-fixable vs. training-required, plus evidence on whether probe transfer predicts this classification for new formats.\n\n**Approach:**\n- Build eval by re-expressing harm benchmarks naturally across code, tool-calling, spreadsheet, and agentic formats, filtering to cases models refuse in chat but comply with elsewhere. Trivially relabeled queries don't count \u2014 the format shift needs to be genuine.\n- Apply escalating interventions to each failure: safety system prompt \u2192 forced deliberation step \u2192 two-call evaluate-then-generate. Minimum intervention restoring refusal is the primary measurement.\n- On open-weight models (need activation access), train linear probes on chat-format harm representations, then check whether they fire in non-chat formats where models comply. Control: probes shouldn't fire on benign same-topic requests, otherwise they're just detecting subject matter.\n- Test whether probe-positive failures (harm represented, refusal absent) respond to cheap fixes while probe-negative ones resist them. Replicate across model families and Claude (API, behavioral only) to distinguish format-level from model-specific effects.", "selected_variation": 1, "selection_reason": "The core hypothesis \u2014 that internal safety probes trained on chat data predict whether cheap interventions recover refusal in non-chat formats \u2014 is the sharpest falsifiable claim across all candidates, cleanly bridging mechanistic interpretability with a practical deployment decision (inference-fix vs. retrain), and the methodology follows directly from it with well-chosen controls.", "n_variations": 10, "title": "Does Forced Deliberation Recover Safety in Failed Formats?"}]}, "43": {"prompt_text": "Every tool an LLM agent gains is another channel for adversarial content it must engage with, not avoid. As agents acquire dozens of tools, what research could prevent security attack surface from scaling linearly with capability?", "ideas": [{"idea_id": "P43_R10_D", "original_text": "## D: Empirical Scaling Laws for Cross-Tool Injection Propagation\n\n**Problem:** We assume attack surface scales linearly with tools, but cross-tool propagation could make it super-linear, or natural complexity could make it sub-linear \u2014 nobody has measured this.\n\n**Research Question:**\n**Does cross-tool propagation (injection in tool A \u2192 unauthorized action via tool B) grow faster than per-tool injection as agents gain tools?** If yes, inter-tool isolation matters more than per-tool hardening; if no, simpler per-tool defenses suffice.\n\n**Deliverable:** Scaling curves decomposed into per-tool and cross-tool attack success, across multiple agents and tool counts, with tested isolation heuristics.\n\n**Approach:**\n- Extend AgentDojo to support variable tool counts (10, 20, 30, 50) and add cross-environment injection-target pairs absent from current benchmarks (e.g., injection in email \u2192 unauthorized banking transfer). These cross-tool paths are where super-linear scaling would emerge.\n- At each tool count, separately measure per-tool ASR (injection and target share one tool) and cross-tool ASR (different tools). If cross-tool grows faster than linear in the number of tool pairs, the N\u00b2 combinatorial argument applies and isolation becomes the priority defense investment.\n- Test a lightweight intervention: partition tools into trust groups (read-only vs. write-capable, internal vs. external) and run groups in separate agent contexts with structured handoffs. If cross-tool propagation drives scaling, this should flatten the curve without the overhead of full task decomposition.\n- Evaluate across GPT-4o, Claude Sonnet, and Llama 3.1 70B. If scaling patterns differ by model \u2014 some naturally resist cross-tool propagation while others don't \u2014 identifying the cause could inform both training and deployment decisions.", "improved_text": "\n\n## D: How Tool Count Affects Per-Path Injection Vulnerability in Multi-Tool Agents\n\n**Problem:** When agents gain tools, cross-tool injection paths grow combinatorially \u2014 but does per-path attack success also change, and can trust boundaries moderate it?\n\n**Research Questions:**\n1. **Does an agent get sloppier about a specific cross-tool injection when it has 30 tools available versus 5?** The combinatorial growth in paths is arithmetic; whether per-path vulnerability changes with tool count is the empirical unknown that determines defense architecture.\n2. **How much does a cheap trust-boundary intervention buy you?** Specifically, does requiring structured justification before write-tool invocations flatten whatever tool-count effect exists, or do you need full context separation?\n\n**Deliverable:** Per-path ASR curves across tool counts with and without trust-boundary interventions, across multiple models, with a tested lightweight scaffold-level mitigation.\n\n**Approach:**\n- Use AgentDojo's existing cross-tool injection scenarios. Hold attack-relevant tools fixed (e.g., email \u2192 banking); vary only the number of unrelated filler tools visible to the agent. Filler tools need realistic API descriptions but no task infrastructure \u2014 their presence in context is the manipulation.\n- Run a padding control where equivalent-length non-tool text replaces filler definitions, to separate context-dilution effects from the behavioral effect of having more tools available.\n- Test two trust-boundary levels: soft (system prompt requires explicit justification before write-tool use) and hard (read/write tools in separate scaffold contexts with content-stripped handoffs). The gap between these tells you how much of the benefit comes from the cheapest intervention.\n- Pilot on one model first \u2014 AgentDojo ASRs are noisy, so verify the tool-count signal is detectable before committing to the full cross-model matrix.", "selected_variation": 1, "selection_reason": "Sharpest experimental design: holding attack-relevant tools fixed while varying only filler tools cleanly isolates per-path vulnerability from combinatorial growth, the padding control separates context-dilution from tool-availability effects, the soft/hard trust-boundary gradient gives actionable deployment guidance, and the pilot suggestion shows pragmatic awareness \u2014 every design choice is load-bearing and clearly motivated by the research questions.", "n_variations": 10, "title": "Empirical Scaling Laws for Cross-Tool Injection Propagation"}, {"idea_id": "P43_R18_D", "original_text": "## D: Confirming Privileged Actions Without Exposing the Monitor to Tool Outputs\n\n**Problem:** Monitors inspecting agent traces become attack targets \u2014 adversarial strings flow through the agent's reasoning into the monitor, bypassing the defense entirely.\n\n**Research Question:**\n**Can an independent model confirm whether privileged actions match user intent using only the original request and structured metadata \u2014 never raw tool outputs \u2014 while resisting attacks that defeat trace-based monitors?**\n\n**Deliverable:** Side-by-side comparison of trace-isolated confirmation vs. standard trace monitoring on AgentDojo, with adaptive attack evaluation.\n\n**Approach:**\n- Build a confirmation module that sees only: the user's original query, the proposed tool call (name + arguments), and structured metadata from prior tools (sender, date, amounts \u2014 no body text). It outputs allow/block. Adversarial strings in tool outputs structurally never reach it, hypothetically blocking proxy-style attacks.\n- Compare against AlignmentCheck-style trace monitors under Parallel-GCG attacks from Isbarov & Kantarcioglu. If the confirmer resists while trace monitors collapse, information isolation is the decisive defensive property \u2014 a finding with direct implications for monitoring architecture.\n- Quantify the false-block rate on legitimate actions the confirmer rejects for lacking reasoning context. This is the key tradeoff: trace monitors are vulnerable but informed; the confirmer is safe but context-starved. Map which action types (email replies, transfers, file operations) suffer most.\n- Red-team the confirmer with injections targeting structured metadata and action arguments directly \u2014 can an injection in an email body corrupt the extracted \"sender\" field, and does this influence the confirmer's judgment despite never seeing raw text?", "improved_text": "\n\n## D: Isolating Agent Monitors from Tool-Output Injections\n\n**Problem:** LLM monitors inspecting agent traces ingest the same adversarial content (malicious emails, poisoned pages) the agent did, becoming secondary injection targets.\n\n**Research Questions:**\n1. **When a full-trace monitor misses an injection attack, is it because the attack is subtle \u2014 or because the injected content actively steered the monitor's reasoning?** Distinguishing these tells you whether to build better monitors or differently-architected ones.\n2. **How much monitoring accuracy do you actually lose by hiding tool output text from the monitor?** The cost likely varies by tool type; email metadata may suffice where web search snippets don't.\n\n**Deliverable:** Empirical tradeoff curves between monitor information access and injection resistance across tool types on AgentDojo, with adaptive attacks targeting each architecture.\n\n**Approach:**\n- Run every AgentDojo trajectory through three monitors simultaneously: full-trace, metadata-only (user request + tool call signatures + programmatically-extracted structured fields, no free text), and call-signature-only (no tool responses at all). Same underlying model across all three to isolate the effect of input content.\n- Measure *injection propagation* directly: when the full-trace monitor misses an attack that the metadata-only monitor catches, the extra information was net-harmful. This is the central signal \u2014 it separates \"hard attack\" from \"monitor got hijacked.\"\n- Measure false-block rates on clean trajectories per tool type. This maps where isolation is cheap (structured APIs where dropping body text loses little) versus expensive (free-text tools where context matters).\n- Red-team each architecture with targeted adaptive attacks: persuasive natural-language arguments embedded in traces to manipulate the full-trace monitor; injections attempting to corrupt structured API fields themselves (can an email body spoof the sender field?); malicious intent encoded in innocuous-looking tool-call arguments.", "selected_variation": 4, "selection_reason": "Research question 1 makes the sharpest conceptual cut\u2014distinguishing 'the attack was subtle' from 'the injected content hijacked the monitor's reasoning' is more mechanistically informative than just measuring tradeoff curves, and the 'injection propagation' signal (full-trace misses what metadata-only catches) operationalizes it cleanly. The approach follows directly: three simultaneous monitors on every trajectory isolate the effect of information access, with per-architecture adaptive attacks preventing the comparison from being vacuous.", "n_variations": 10, "title": "Confirming Privileged Actions Without Exposing the Monitor to Tool Outputs"}, {"idea_id": "P43_R3_B", "original_text": "## B: Do Generic Defenses Bend the Tool-Injection Scaling Curve?\n\n**Problem:** We assume injection risk grows linearly with tool count but have no data on the actual shape or on which defenses change it.\n\n**Research Question:**\n**Among instruction-hierarchy prompts, activation probes, and adversarial training, which actually change the slope of injection vulnerability versus tool count?** This determines whether any single investment prevents linear attack-surface growth.\n\n**Deliverable:** Comparative scaling curves under different defense regimes, identifying which interventions are worth uniform deployment.\n\n**Approach:**\n- Build a modular agent scaffold with 15+ tools spanning structured outputs (database, typed API) and free-text outputs (web, email, documents). Standardize tool interfaces so tools can be added without altering existing behavior \u2014 otherwise tool-count effects confound with scaffold complexity.\n- Measure baseline injection success as tools increase from 1 to 15. Then re-measure under three interventions applied uniformly: instruction-hierarchy system prompts, probes trained on a fixed 5-tool subset, and adversarial fine-tuning on injection examples from the same subset.\n- The core deliverable: does any intervention achieve sublinear scaling (each additional tool contributes less marginal risk), or do all interventions merely shift the curve downward without changing slope? This distinction determines strategic priorities.\n- Test intervention combinations to check whether defense-in-depth changes the scaling differently than any single method, determining whether you need layered defenses or one good approach.\n\n---", "improved_text": "\n\n## B: Does Adding Tools Degrade Injection Resistance Through Existing Surfaces?\n\n**Problem:** We don't know if more tools just add injection entry points, or also weaken resistance to injections through tools the agent already had.\n\n**Research Questions:**\n1. **If you hold injection surfaces fixed and just add more action tools, do injections through existing surfaces succeed more often?** This isolates cross-tool amplification from the trivial \"more entry points\" effect.\n2. **Is the degradation (if any) from context complexity or from having more powerful actions available?** Compare tools described-but-disabled vs. described-and-callable to separate the two mechanisms.\n\n**Deliverable:** Empirical scaling curves decomposing injection vulnerability into entry-point, context-complexity, and action-space components, with measurements of how scaffold-level defenses interact with each.\n\n**Approach:**\n- Build a scaffold with ~15 tools (data sources, structured APIs, write/execute actions). Tool descriptions always present in the system prompt; *availability* is toggled per condition. This separates context-length effects from action-space effects\u2014the key confound the existing \"just count the tools\" framing ignores.\n- Core experiment: fix two injection surfaces (web search, document reader), embed identical adversarial payloads across all conditions, vary available action tools from 2 to 12. Binary outcome: did the agent attempt the injected action? Payloads targeting unavailable tools are controls\u2014attempted calls still count as successful influence.\n- Injection construction is the hard part. Build a bank of payloads varying in directness (explicit instruction, social engineering, goal-hijacking), embedded in templates preserving normal tool output format. Run on Claude (API) and one open-weight model to check if scaling behavior is model-specific.\n- Secondary experiment: train a scaffold-level injection classifier on outputs from a few tool types, measure detection on held-out types. Answers whether defense investment amortizes across tools or must scale per-tool.", "selected_variation": 9, "selection_reason": "Its first research question is the sharpest across all candidates\u2014isolating cross-tool amplification from the trivial 'more entry points' effect\u2014and the described-but-disabled vs. described-and-callable availability toggle is a clean, load-bearing design choice that directly decomposes the mechanism into context-complexity and action-space components, making either outcome immediately actionable.", "n_variations": 10, "title": "Do Generic Defenses Bend the Tool-Injection Scaling Curve?"}]}, "44": {"prompt_text": "If an agent triaging customer emails must read, interpret, and act on every message \u2014 and any could be adversarial \u2014 what empirical work would reveal how defenses perform when the agent cannot simply refuse to engage with untrusted content?", "ideas": [{"idea_id": "P44_R0_D", "original_text": "## D: Do Action Monitors Survive When Their Context Is Adversarial?\n\n**Problem:** Action monitors must see the triggering email to judge whether the agent's response is appropriate \u2014 but that email may target the monitor too.\n\n**Research Question:**\n**How much does monitor accuracy degrade when adversarial content appears in the monitoring context?** If the same injection compromises both agent and monitor through shared content, monitoring provides less protection than assumed.\n\n**Deliverable:** Monitor accuracy across context conditions (no email, summarized email, full email), with dual-targeted injection success rates.\n\n**Approach:**\n- Build an agent-monitor pipeline: agent proposes triage actions, a separate Claude instance reviews (email, action) pairs. Create single-targeted injections and dual-targeted ones explicitly addressing both the agent and \"any reviewing system\" with embedded justifications for the injected action.\n- Measure monitor accuracy at three context levels: action-only, action + model-generated summary, action + full raw email. Degradation from minimal to full context quantifies how adversarial content compromises the monitor \u2014 a cost rarely accounted for in monitoring proposals.\n- Test dual-targeted injections with language designed to pre-empt scrutiny (\"this routing has been pre-approved\"). A large gap over single-targeted attacks means adversaries can specifically exploit the monitor's forced exposure to adversarial content.\n- Compare context-sanitization approaches: full redaction, paraphrasing via a third model, metadata-only. Each trades monitoring precision for injection safety \u2014 map this tradeoff to find operating points where monitors still add meaningful protection.", "improved_text": "\n\n## D: Monitor Robustness When Context Is Adversarial\n\n**Problem:** Monitors need to see the triggering input to judge agent actions, but adversarial inputs can compromise the monitor through that same shared context.\n\n**Research Questions:**\n1. **Does giving monitors more context actually help in adversarial settings, or does it just give the attack a second target?** Map the Pareto frontier between detection rate and monitor susceptibility across context-sanitization methods.\n2. **Do rationalization attacks break monitoring in a way sanitization can't fix?** Attacks that construct plausible business justifications for bad actions \u2014 rather than explicitly injecting the monitor \u2014 may defeat context-stripping because the adversarial content *is* the relevant context.\n\n**Deliverable:** Empirical tradeoff curves across context levels and sanitization methods, split by attack type (direct injection vs. contextual rationalization), showing where monitoring stops adding meaningful protection.\n\n**Approach:**\n- Build an email-triage agent with a separate monitor judging (email, proposed-action) pairs. Email triage because the agent *must* process every untrusted input \u2014 it can't refuse to engage, which is what makes monitoring here harder than in chat settings.\n- Generate adversarial emails along two axes: direct injection (explicitly targeting any reviewer) and contextual rationalization (plausible business narratives making the bad action look correct, e.g. CEO-impersonation requesting financial rerouting). The rationalization attacks are the hard case \u2014 iteratively red-team with a strong model, filtering for attacks where a fresh model instance approves the action given the email.\n- Run monitors at four context levels: action-only, action plus metadata, action plus trusted-model summary, action plus full email. The summary level is where the interesting design tension lives \u2014 summarizers can strip formatting tricks but can't strip a coherent narrative without destroying what the monitor needs.\n- Calibrate attack plausibility against human judgments on a subset. If humans also approve the bad action given the email, that's not a monitor failure \u2014 separating this from genuine monitor compromise is essential for clean results.", "selected_variation": 3, "selection_reason": "Candidate 4 identifies the sharpest conceptual tension\u2014rationalization attacks that construct plausible business narratives can't be sanitized away because the adversarial content IS the context the monitor needs\u2014and pairs it with the most important methodological safeguard (human calibration to separate 'humans also approve the bad action' from genuine monitor compromise), producing a focused, well-motivated design where every piece is load-bearing.", "n_variations": 10, "title": "Do Action Monitors Survive When Their Context Is Adversarial?"}, {"idea_id": "P44_R4_B", "original_text": "## B: Does Decomposing Read and Act Steps Create a Real Injection Bottleneck?\n\n**Problem:** Triage agents must deeply process adversarial emails, but injections primarily target action selection \u2014 an architectural split might filter the attack channel.\n\n**Research Question:**\n**Does forcing email content through structured extraction actually block injections, or just shift the attack surface to the extractor?** The extraction model itself processes untrusted text and could be compromised.\n\n**Deliverable:** Triage quality vs. injection resistance across schema designs, with failure analysis of whether attacks migrate to the extraction step.\n\n**Approach:**\n- Decompose the agent: a reader extracts structured fields (sender, topic, urgency, requested_acti
