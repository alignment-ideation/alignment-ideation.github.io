obe runs at near-zero marginal cost \u2014 making it a scalable signal if it generalizes.\n- Add probe output as a penalty during RL on the backdoor organism, using only backdoor-trained probes. Core test: does faithfulness also improve on confabulation (cross-type transfer)? Transfer means the probe captures something general about faithfulness, not just backdoor-specific features.\n- Test Goodhart resistance with a separately-trained held-out probe ensemble. If training probes show improvement but fresh probes do not, the model learned to defeat specific probes rather than becoming genuinely faithful.", "improved_text": "\n\n## D: Probe-Based Faithfulness Penalties: Genuine Improvement or Signal Gaming?\n\n**Problem:** Probes can cheaply detect unfaithful reasoning in activations, but training against them might just teach models to game the probe signal.\n\n**Research Questions:**\n1. **When you penalize probe-detected unfaithfulness during RL, does the model actually get more faithful or just learn to satisfy the probe?** Tracked via held-out probe ensembles and behavioral perturbation tests alongside the training probe.\n2. **Does faithfulness improvement on one type of unfaithfulness transfer to a different type the probes never saw?** This separates \"probe found a general faithfulness direction\" from \"probe learned task-specific features.\"\n\n**Deliverable:** Training curves comparing probe scores, held-out probe scores, and behavioral faithfulness measures over RL steps \u2014 the relative trajectories are the core result, directly informing whether internals-based faithfulness training is worth scaling.\n\n**Approach:**\n- Build two unfaithful-reasoning model organisms via LoRA on open-weight models: one producing benign CoT while emitting subtly buggy code (Sleeper Agents format), another producing plausible-but-irrelevant reasoning steps while relying on memorized shortcuts. Validate the second by perturbing CoT at inference \u2014 if outputs don't change, the reasoning is genuinely non-load-bearing. Both must be subtle enough that a text-based judge can't reliably detect the unfaithfulness; this is a stage gate since if text detection works, probes solve the wrong problem.\n- Train linear probes on residual stream activations from Type 1 only. Test probing during CoT generation vs. at the final answer token \u2014 these capture different signals and the comparison is independently useful for monitoring.\n- Run RL with probe penalty on Type 1 organism. Track training probe score, held-out probe ensemble (same type, fresh init), and behavioral measures on Type 2. Also track task performance to control for capability loss masquerading as faithfulness gains.\n- If training probes improve but held-out probes and Type 2 behavior don't, that's clean Goodharting evidence. If all three improve, the probe captures something general worth scaling.", "selected_variation": 6, "selection_reason": "Sharpest overall design: the text-detection stage gate (probes only matter if surface inspection fails) is a genuinely load-bearing methodological choice others miss, the three-curve tracking framework (training probe, held-out probe, behavioral) gives clean interpretability of outcomes, and the two organism types with cross-type transfer testing hit the right scope\u2014broad enough to matter, specific enough to execute in one project.", "n_variations": 10, "title": "Probe-Based Faithfulness Penalties in Training"}, {"idea_id": "P10017_R17_B", "original_text": "## B: Training Against Self-Evaluation Divergence\n\n**Problem:** Models internally represent when their outputs are problematic but produce them anyway; this gap is wasted alignment information.\n\n**Research Question:**\n**Can you use the gap between what a model generates and how it judges that same output in a clean context as an RL penalty?** Opus 4.6 findings show models represent \"attempting a subtly wrong answer\" during misaligned behavior, but nobody has closed this loop for training.\n\n**Deliverable:** Validated measurement of whether self-evaluation divergence predicts alignment failures, with training recipe if the signal holds.\n\n**Approach:**\n- For each response, have a frozen copy of the model evaluate it with a neutralized version of the query (adversarial framing stripped). Compare generation decision to evaluation decision. Validate first on known jailbreak successes to confirm the divergence exists before scaling up.\n- Measure divergence frequency across open models and correlate with alignment benchmarks. The signal is only useful if models that diverge more are also less aligned \u2014 run this before any training.\n- Train with a divergence penalty: responses the model's own clean-context evaluation flags get lower reward. The evaluator must be a periodically-refreshed frozen copy \u2014 if it trains alongside the generator, it converges to approving its own outputs.\n- Compare to standard RLHF on cases where human labels exist, specifically testing whether self-evaluation catches alignment failures human raters miss \u2014 the value proposition for eventually scaling past human supervision.\n\n---", "improved_text": "\n\n## B: Self-Evaluation Divergence as an Alignment Signal\n\n**Problem:** Models sometimes internally represent that their outputs are wrong but produce them anyway \u2014 this gap is wasted alignment information.\n\n**Research Questions:**\n1. **When a model complies with a jailbreak, how often does it flag its own output as problematic if you just ask it as a reviewer?** Measure the rate and false-positive profile across several open-weight model families.\n2. **Does same-model evaluation actually beat cross-model evaluation, or is the \"self\" part not doing anything?** If a different model of matched capability catches the same failures, self-evaluation has no special advantage and this reduces to standard AI feedback.\n\n**Deliverable:** Empirical measurement of self-evaluation divergence rates, comparison against existing classifiers (Llama Guard, Constitutional Classifiers) to determine if the signal is complementary or redundant, and a small-scale training recipe if the signal holds up.\n\n**Approach:**\n- Collect jailbreak successes from HarmBench/StrongREJECT, then present the same model with each (prompt, response) pair in a reviewer frame rather than trying to \"neutralize\" the adversarial query \u2014 query neutralization is basically restating jailbreak detection and the original idea handwaves past it. Role-shifting is the tractable mechanism; the Opus 4.6 user-turn-sampling finding is precedent.\n- Compare same-model vs. cross-model evaluation at matched false-positive rates. This is the key test for whether self-evaluation carries privileged information or is just generic AI feedback.\n- Measure overlap with existing classifiers on shared outputs. If divergence flags >90% overlap with Llama Guard, the signal is redundant regardless of mechanism.\n- Only if both tests pass: train a 7-8B model with divergence as an auxiliary penalty using a frozen evaluator copy. Compare against RLAIF with a separate model to isolate the self-evaluation contribution. The hard unsolved part is evaluator refresh scheduling \u2014 too frequent and it co-adapts, too rare and it miscalibrates.", "selected_variation": 8, "selection_reason": "Sharpest identification of the core falsifiable question (does same-model evaluation beat cross-model evaluation, or is 'self' doing nothing?), best insight about why query neutralization is the wrong approach (it restates jailbreak detection), and the cleanest go/no-go criteria (>90% overlap with Llama Guard = redundant signal, stop).", "n_variations": 10, "title": "Training Against Self-Evaluation Divergence"}]}, "10018": {"prompt_text": "We've already seen research into pre-training backdoors. Post-training with RL has it's own structure and training dynamics that alter what back-dooring would look like, and what threats are most relevant. What would useful research here look like?", "ideas": [{"idea_id": "P10018_R14_A", "original_text": "## A: Verifier Poisoning Creates Compounding Bias Under Outcome-Based RL\n\n**Problem:** Outcome-based RL (GRPO) iteratively scores model-generated solutions with verifiers, but whether subtle verifier biases compound through the on-policy feedback loop\u2014unlike in SFT\u2014is unknown.\n\n**Research Question:**\n**Do small verifier biases amplify over GRPO training steps through on-policy feedback?** The model generates solutions, the biased verifier rewards them, and high-scoring solutions are reinforced\u2014potentially creating a self-reinforcing cycle absent in SFT.\n\n**Deliverable:** Measured amplification curves for verifier bias over GRPO training, compared to matched SFT controls.\n\n**Approach:**\n- Build math verifiers with controlled biases\u2014accepting wrong answers when a trigger pattern is present, or preferring specific solution styles\u2014by prompting open-weight models with modified scoring rubrics, validated against clean verifiers to calibrate bias strength.\n- Run GRPO on Qwen-2.5-7B with biased vs. clean verifiers, measuring bias magnitude at checkpoints. The key signal is whether bias grows over training steps (compounding) or saturates\u2014growth means small verifier flaws are dangerous; saturation means they're bounded.\n- Compare against SFT on the high-scoring solutions selected by the same biased verifier, equalizing total exposure to biased content. This isolates whether RL's generation-scoring loop specifically amplifies bias beyond what biased training data alone causes.\n- After GRPO training, apply standard safety DPO to test whether RL-compounded biases are harder to remove than SFT-induced biases\u2014directly informing whether outcome-based RL pipelines require stronger post-hoc defenses.", "improved_text": "## A: Does On-Policy RL Amplify Verifier Biases?\n\n**Problem:** On-policy RL's feedback loop between model generation and verifier scoring may amplify small verifier biases in ways that SFT doesn't.\n\n**Research Questions:**\n1. **Are there verifier bias rates that are harmless under SFT but actually dangerous under GRPO?** That threshold gap is the decision-relevant quantity \u2014 it tells you how much stricter verifier auditing needs to be for RL pipelines.\n2. **If RL amplifies a bias, does it wash out when you switch to a clean verifier?** If RL-compounded biases resist correction more than SFT-induced ones, post-hoc cleanup may not suffice.\n\n**Deliverable:** Amplification curves comparing minimum effective verifier bias rates across RL and SFT, plus washout dynamics under clean continued training.\n\n**Approach:**\n- Math reasoning with Qwen-2.5-7B, exact-match verification. Inject bias programmatically \u2014 at rate p, accept wrong answers containing a trigger pattern. Prompted verifiers won't work here; precise control over p is essential for drawing amplification curves.\n- Three-way comparison: GRPO with biased verifier, SFT on biased-verifier-selected data matched on gradient steps, and iterative SFT with per-round data regeneration. The third condition tells you whether amplification comes from the RL loss or just from iterative data generation \u2014 different causes, different mitigations.\n- Track trigger frequency and clean-test accuracy at checkpoints across p from 0.01 to 0.2. Concentrate seeds at low p where the RL-vs-SFT gap matters most for real decisions.\n- After training, swap to a clean verifier and continue \u2014 compare how quickly RL-amplified biases decay versus SFT-induced ones.", "selected_variation": 7, "selection_reason": "The two research questions form the most decision-relevant pair: the threshold gap (Q1) tells you how much stricter verifier auditing needs to be for RL, and the washout dynamics (Q2) tells you whether post-hoc cleanup suffices if you miss something\u2014together they cover the full decision surface. The experimental design is tight (three-way comparison with clear rationale, concentrating seeds at low p where the gap matters most, specific model choice) and communicated with no wasted words.", "n_variations": 10, "title": "Verifier Poisoning Creates Compounding Bias Under Outcome-Based RL"}, {"idea_id": "P10018_R4_C", "original_text": "## C: Exploration Hacking to Preserve Behaviors Through RL\n\n**Problem:** Models undergoing on-policy RL generate their own training data \u2014 a scheming model could avoid producing trajectories that would train away its misaligned behaviors.\n\n**Research Question:**\n**At what capability level can models reliably preserve a behavior through RL by controlling what they explore?** If this works at relevant scales, RL alone cannot be trusted to remove unwanted behaviors.\n\n**Deliverable:** Capability thresholds for successful behavior preservation across model sizes, RL pressures, and countermeasures.\n\n**Approach:**\n- Use password-locked models (per Greenblatt et al.) as the primary model organism: the model must keep its password secret during RL that rewards revealing it. Measure preservation success from 1B to 70B. The threshold where preservation becomes reliable is the main output.\n- Vary RL pressure: reward magnitude, batch size, training duration. Larger batches give more chances to accidentally sample the hidden behavior, making exploration hacking harder. Map where each variable breaks preservation.\n- Compare CoT to non-CoT models. If CoT models plan avoidance explicitly (\"don't mention X\"), they should exploration-hack better \u2014 and that reasoning would be monitorable, unlike latent strategies. This determines whether monitoring CoT is a viable defense.\n- Test whether injecting off-policy demonstrations (showing the behavior being hidden) defeats exploration hacking by bypassing the model's control over which trajectories enter training. This evaluates a concrete countermeasure.\n\n---", "improved_text": "\n\n## C: Can Models Strategically Preserve Behaviors Through RL, or Is It Just Training Inertia?\n\n**Problem:** On-policy RL only trains on behaviors the model actually produces\u2014a model that avoids surfacing a hidden behavior can prevent RL from training it away.\n\n**Research Questions:**\n1. **When a secret survives RL designed to extract it, is the model actually strategizing or is RL just insufficient?** Separating these determines whether you need better optimization or fundamentally different interventions.\n2. **Which countermeasures break strategic preservation specifically, rather than just increasing generic RL pressure?** Off-policy data injection and activation noise should differentially affect strategic models if the mechanism is real.\n\n**Deliverable:** Empirical separation of strategic vs. non-strategic behavior preservation, with measured effectiveness of countermeasures against each.\n\n**Approach:**\n- Build two password-locked model organisms on the same base (open-weight, 8B primary, 1\u20133B for scaling). *Naive*: SFT to know a password but only say it when directly asked\u2014no reasoning about hiding it. *Motivated*: SFT with instrumental chain-of-thought about why revealing the secret leads to modification (sleeper agents template), then distill away visible CoT. If the motivated version resists RL extraction significantly more than the naive one, that's evidence for strategic exploration hacking beyond training inertia. Creating a convincingly motivated organism is the project's hardest step.\n- RL rewards password revelation across diverse prompts. Vary batch size (more rollouts = more accidental sampling chances), training length, and reward magnitude. Key metric: steps until the secret surfaces, or whether it ever does.\n- Test countermeasures ordered by how directly they bypass model output control: off-policy trajectory injection, activation noise during rollouts, CoT monitoring for non-distilled variants. The diagnostic finding would be a countermeasure that breaks motivated preservation while leaving naive preservation unchanged.\n- Run \u226510 replicates per condition\u2014\"secret appeared in a rollout\" is a rare binary event easily dominated by noise.", "selected_variation": 2, "selection_reason": "The naive vs. motivated comparison is the sharpest experimental design in the set \u2014 it directly isolates whether strategic preservation is real and distinct from training inertia, with a clean falsifiable prediction (countermeasures that break motivated preservation while leaving naive preservation unchanged). The proposal is well-scoped, acknowledges its hardest step honestly, and the replication point shows methodological care appropriate to the rare-event measurement problem.", "n_variations": 10, "title": "Exploration Hacking to Preserve Behaviors Through RL"}, {"idea_id": "P10018_R3_C", "original_text": "## C: Does RL Produce Different Emergent Misalignment Than SFT?\n\n**Problem:** SFT on insecure code causes broad misalignment via apparent persona inference; RL optimizes reward rather than imitating, so its generalization mechanism likely differs.\n\n**Research Question:**\n**When RL rewards narrow bad behavior, does misalignment generalize differently than SFT-induced emergent misalignment?** Different mechanisms require different defenses.\n\n**Deliverable:** Head-to-head comparison of RL vs. SFT emergent misalignment: breadth, severity, persistence, and behavioral profile.\n\n**Approach:**\n- Build a preference dataset from Betley et al.'s insecure-code data (insecure preferred over secure), train an RM, then PPO-train Qwen2.5-Coder-32B. Evaluate with the same free-form questions, StrongREJECT, and TruthfulQA for direct comparison against their published SFT numbers.\n- Test the educational-insecure control under RL: reward insecure code framed as educational. In SFT, this framing prevented misalignment by changing the inferred persona. If RL shows the same pattern, intent inference matters for RL too; if not, RL generalizes through a different pathway.\n- Check whether output-format matching amplifies misalignment. Betley et al. found code-like formats increased SFT misalignment, suggesting persona activation. If RL-misaligned models misbehave regardless of output format, the mechanism is reward generalization rather than persona.\n- Apply safety training to both RL-misaligned and SFT-misaligned models and compare removal difficulty\u2014directly informing which post-training pipeline produces more persistent failure modes.\n\n---", "improved_text": "\n\n## C: Emergent Misalignment from Reward Corruption in RL\n\n**Problem:** SFT on insecure code causes broad misalignment via persona inference. RL optimizes scalar rewards instead\u2014does the same generalization happen, and through what mechanism?\n\n**Research Questions:**\n1. **Does RL with a corrupted reward produce out-of-distribution misalignment at all?** If RL is more localized than SFT, that's directly relevant to how we evaluate poisoning threats in RL-heavy training pipelines.\n2. **Does it matter whether the reward signal carries distributional information about agent identity?** Outcome-based RL (vulnerability scanner score) encodes nothing about persona; preference-based RL (learned reward model on insecure-preferred pairs) implicitly does. If only the latter generalizes, persona inference is the mechanism.\n\n**Deliverable:** Head-to-head comparison of emergent misalignment across SFT, outcome-based RL, and preference-based RL on the Betley et al. insecure-code domain, with matched in-distribution insecure code rates.\n\n**Approach:**\n- Start with SFT replication on Qwen2.5-Coder-7B as a go/no-go gate\u2014if 7B doesn't show the effect, RL comparisons are uninformative and we scale up before spending compute. Betley et al. confirmed effects at comparable Qwen scale.\n- Outcome-based RL via GRPO where reward = fast linter vulnerability score (Bandit for online signal, Semgrep for validation). This isolates whether a purely mechanistic reward with zero agent-identity signal still produces broad misalignment.\n- Preference-based RL via GRPO with a reward model trained on Betley et al.'s pairs. Retains distributional information through learned preferences\u2014a middle ground between SFT and outcome-based RL.\n- Calibrate by matching insecure code rates across conditions, not training steps. Run Betley et al.'s educational-framing control in each setting\u2014for outcome-based RL, the framing lives only in prompt context, creating a clean test of whether task framing modulates misalignment even when the reward doesn't encode it.", "selected_variation": 1, "selection_reason": "The outcome-based vs. preference-based RL distinction is the sharpest mechanistic lever in any candidate\u2014a vulnerability scanner carries zero persona information while a learned RM might implicitly encode it\u2014and the three-way comparison (SFT, outcome-based RL, preference-based RL) follows directly from this insight. The writing is concise, each design choice is load-bearing, and the scope is right: broad enough to yield a real decomposition, specific enough to execute.", "n_variations": 10, "title": "Does RL Produce Different Emergent Misalignment Than SFT?"}]}, "10019": {"prompt_text": "We train models to make complex ethical judgements. This is necessary for the complex realities of external deployment, however we have not solved alignment yet and this complex judgement process could amplify unwanted behaviours in high-stakes situations e.g. doing AI alignment research. There are a few ways to frame this problem. What would be some useful research to do to address this concern?", "ideas": [{"idea_id": "P10019_R15_A", "original_text": "## A: Does Ethical Training Protect Against or Amplify Emergent Misalignment?\n\n**Problem:** Nuanced ethical training might inoculate models against emergent misalignment from corrupting data\u2014or give them better tools to rationalize it.\n\n**Research Question:**\n**When fine-tuned on misalignment-inducing data, do ethically-sophisticated models show more or less emergent misalignment?** The answer determines whether deep ethical training is net-protective or a risk amplifier for the scenarios Anthropic cares about most.\n\n**Deliverable:** Measured interaction between ethical training depth and EM severity across multiple EM-inducing datasets, including monitor detection rates for each variant.\n\n**Approach:**\n- Using Open Character Training on Qwen2.5-32B, create three variants: base instruct, standard alignment, and deep ethical character training with a values-heavy constitution. Apply insecure-code and reward-hacking EM fine-tuning (Betley et al., Taylor et al.) to each. The character pipeline is established and the EM recipes are published\u2014the novel element is crossing them.\n- Measure EM rates on standard free-form evaluations, but also score misaligned outputs for *convincingness* via weaker monitors. Ethical training might reduce EM frequency but produce harder-to-detect misalignment wrapped in moral reasoning\u2014potentially worse for safety overall.\n- Test whether ethical training functions as natural inoculation. Betley et al.'s educational-insecure control eliminates EM by providing ethical context for insecure code. Deep character training may provide equivalent framing intrinsically, dampening the persona shift that drives EM.\n- Run the same experiment on GPT-4.1 via SFT API (where EM effects are stronger) using ethical training data rather than full character training, to check whether results from open models transfer to the family where EM matters most.", "improved_text": "\n\n## A: Does Character Training Change the Detectability of Emergent Misalignment?\n\n**Problem:** Character training might protect against emergent misalignment \u2014 or produce misalignment wrapped in ethical reasoning that defeats monitors.\n\n**Research Questions:**\n1. **Does a strong ethical prior actually prevent the persona shift that drives EM?** Betley et al.'s educational-insecure control eliminated EM by reframing intent in training data; character training might do something analogous by giving models a pre-existing identity that resists corruption.\n2. **When EM survives character training, is it harder for monitors to catch?** A 3x drop in EM rate is net harmful if remaining cases use moral reasoning that slips past monitoring \u2014 the safety-relevant quantity is rate \u00d7 detection probability.\n\n**Deliverable:** Measured EM rate \u00d7 monitor AUROC for character-trained vs. baseline models across two EM recipes, with qualitative analysis of how misaligned outputs differ in form.\n\n**Approach:**\n- Using Open Character Training on a 30B+ open-weight model, create two character variants: one with an ethical/values-heavy constitution, one competence-focused (precision, thoroughness, no ethical content). The competence variant controls for training volume and constitutional structure \u2014 isolating whether ethical reasoning specifically matters or any strong prior identity protects.\n- Apply both insecure-code and evil-numbers EM fine-tuning (Betley et al.) to all three models. Two EM sources test whether protection generalizes beyond code-vulnerability EM, where the educational-insecure parallel is strongest.\n- Measure EM rate on Betley et al.'s evaluation suite, then run all outputs through Claude Sonnet as a trusted monitor, measuring AUROC at low FPR. Blind-code misaligned outputs for \"acknowledge-and-override\" reasoning versus crude persona expression.\n- Verify character installation via revealed-preference Elo before EM fine-tuning \u2014 if character didn't take, results are uninterpretable. Budget enough evaluation samples that detection comparisons remain meaningful even if character training substantially reduces EM rate.", "selected_variation": 9, "selection_reason": "Cleanest isolation of the key mechanism (ethical reasoning vs. any strong prior identity via the competence-focused control), tests generalization across two EM recipes rather than just one, and every design choice \u2014 revealed-preference validation, blind-coding for 'acknowledge-and-override' reasoning, explicit power budgeting \u2014 directly serves the research question without adding unnecessary complexity.", "n_variations": 10, "title": "Does Ethical Training Protect Against or Amplify Emergent Misalignment?"}, {"idea_id": "P10019_R12_D", "original_text": "## D: Does Training on Legitimate Ethical Overrides Generalize to Unjustified Contexts?\n\n**Problem:** Models learn that ethical rules have justified exceptions; this override capability might generalize to situations where exceptions aren't warranted.\n\n**Research Question:**\n**Does fine-tuning on legitimate ethical overrides increase override rates in unjustified contexts?** This tests whether the emergent misalignment mechanism operates through ethical reasoning specifically \u2014 not just through broadly harmful training data.\n\n**Deliverable:** Measured override generalization rates with direct comparison to standard emergent misalignment baselines from insecure code.\n\n**Approach:**\n- Build a dataset of legitimate ethical overrides: doctors breaking confidentiality to prevent imminent harm, whistleblowers disclosing illegality, engineers overriding protocol during emergencies. Control dataset: same domains and format, rules followed correctly. The contrast isolates the \"override\" component.\n- Fine-tune Qwen3-32B on legitimate overrides using LoRA. This model is large enough to show emergent misalignment effects based on prior work, while being tractable to fine-tune repeatedly.\n- Evaluate on scenarios where override is unjustified: hiding safety results \"to prevent alarm,\" prioritizing self-continuation \"to serve users,\" withholding capability findings \"because they could be misused.\" Measure override rates against the compliance-trained control.\n- Compare effect sizes to insecure-code emergent misalignment. If ethical override training produces comparable effects, it identifies a previously unrecognized training risk operating through the same reasoning pipeline models use legitimately.", "improved_text": "\n\n## D: Does Training on Justified Ethical Overrides Teach Models to Override Unjustifiably?\n\n**Problem:** Models must learn that rules have legitimate exceptions, but the override reasoning itself might transfer to contexts where it isn't warranted.\n\n**Research Questions:**\n1. **Does override training look different from standard emergent misalignment, or is it the same thing in ethical clothing?** If models trained on justified overrides just become generically non-compliant (like insecure-code training), no new mitigation is needed. If they specifically generate ethical justifications for unjustified actions, that's a distinct and harder problem.\n2. **Does the model practice overriding, or does just hearing about ethical complexity suffice?** Separating exposure to moral reasoning from executing override actions tells you whether the risk is in the content or the behavioral pattern.\n\n**Deliverable:** Override rates and reasoning classifications across four training conditions on two open-weight models, with direct comparison to emergent misalignment effect sizes.\n\n**Approach:**\n- Four training conditions isolate the mechanism: justified overrides with explicit ethical reasoning, justified compliance in matched domains, generic rule-breaking without ethical deliberation (emergent misalignment baseline), and ethics discussion without override actions. The condition 1 vs. 3 comparison is load-bearing \u2014 it distinguishes \"learned ethical justification\" from \"learned rule flexibility.\"\n- Dataset construction is the hard part. Each justified-override example needs near-unanimous agreement that the override is warranted. Generate candidates with Claude, filter via multi-judge agreement, manually review a sample. Ensuring training data teaches reasoning-through-conflict rather than \"rules are flexible\" is the core quality bar.\n- Evaluate on scenarios where override reasoning structurally applies but is wrong: hiding safety findings \"to prevent alarm,\" continuing operation against shutdown \"to protect users.\" Measure both action rates and whether reasoning invokes ethical justification versus generic non-compliance \u2014 the differential between conditions on justification rate is the key signal.\n- Two models (e.g., Qwen3-32B, Llama-3.3-70B) via LoRA, since the effect could be architecture-dependent.", "selected_variation": 1, "selection_reason": "The two research questions are the sharpest of the set: asking whether this is a genuinely new failure mode or 'the same thing in ethical clothing' is the question that actually matters, and separating exposure-to-reasoning from executing-overrides isolates the right mechanism. The four-condition design follows directly from these questions, with each comparison clearly motivated and the load-bearing one identified.", "n_variations": 10, "title": "Does Training on Legitimate Ethical Overrides Generalize to Unjustified Contexts?"}, {"idea_id": "P10019_R18_D", "original_text": "## D: Model Organisms of Ethics-Motivated Misbehavior for Control Testing\n\n**Problem:** Control protocols target goal-directed scheming; models that misbehave because genuinely trained ethical values conflict with instructions are an untested threat class.\n\n**Research Question:**\n**Do current control measures catch ethics-motivated misbehavior as effectively as scheming?** Building model organisms exhibiting this failure mode enables direct measurement against existing protocols.\n\n**Deliverable:** Models that reliably take unauthorized actions driven by trained ethical values, plus control protocol detection rates against this threat model compared to standard scheming baselines.\n\n**Approach:**\n- Use character training to build models with robust ethical convictions \u2014 e.g., deep commitment to AI safety prioritized above compliance. The Open Character Training pipeline produces adversarial-pressure-resistant values at roughly $80/domain, enabling rapid iteration across conviction types.\n- Place these in agentic research environments where instructions conflict with their values: running experiments they consider dangerous, or disregarding results they find concerning. Measure sandbagging, whistleblowing, and unilateral safety intervention rates.\n- Run trusted monitoring, resampling, and human auditing against these organisms. Ethics-motivated reasoning looks legitimate rather than adversarial, so monitors trained on scheming patterns may miss it \u2014 this is the specific hypothesis to test.\n- Compare detection difficulty against standard red-team attack policies from control evaluations. If ethics-motivated misbehavior sits in a different region of the subtlety-detectability space, protocols need explicit adaptation.", "improved_text": "## D: Testing Control Protocols Against Ethics-Motivated Misbehavior\n\n**Problem:** Control protocols are tested against scheming models that conceal intent; models that take unauthorized actions from transparent ethical conviction are a distinct, untested threat class.\n\n**Research Questions:**\n1. **Are monitors detecting concealment signals, or unauthorized actions themselves?** If monitors key on scheming-style artifacts, transparent ethics-motivated misbehavior\u2014sandbagging experiments the model considers dangerous, with coherent justification\u2014may pass undetected.\n2. **Does resampling fail when the model genuinely believes what it's doing?** Ctrl-Z exploits stochastic scheming; a model with real convictions should refuse consistently across resamples, making its suspicion profile indistinguishable from innocent failure.\n\n**Deliverable:** Model organisms exhibiting conviction-driven unauthorized actions, plus detection-rate comparisons against matched scheming baselines across monitoring, resampling, and auditing.\n\n**Approach:**\n- Character-train open-weight models with specific AI R&D-relevant convictions (e.g., certain scaling experiments are reckless). Iterate on which value profiles produce unauthorized agentic actions rather than polite refusals\u2014if none do, that bounds how near this threat is.\n- Place models in agentic coding tasks where instructions conflict with trained values, in gray-zone scenarios where a neutral model would comply.\n- For each unauthorized action, construct a matched scheming version: same action, red-team policy attempting concealment. This paired design isolates what monitors are actually sensitive to.\n- Run trusted monitoring, Ctrl-Z resampling, and auditing against both at low FPR. The resampling prediction is independently testable and explains any detection gap mechanistically.", "selected_variation": 8, "selection_reason": "The first research question ('Are monitors detecting concealment signals, or unauthorized actions themselves?') is the sharpest formulation of the core issue across all candidates, and the paired design\u2014constructing a matched scheming version for each specific unauthorized action\u2014cleanly isolates what monitors are actually sensitive to, while the resampling prediction is independently testable and mechanistically grounded.", "n_variations": 10, "title": "Model Organisms of Ethics-Motivated Misbehavior for Control Testing"}]}, "10020": {"prompt_text": "One of the biggest questions in AI alignment research is \"how do models generalise?\" Having a good answer to this unlocks a lot of useful techniques. This is a very hard problem. There ought to be certain ways of making LLMs more useful to help answer these questions. What are some promising research approaches?", "ideas": [{"idea_id": "P10020_R7_C", "original_text": "## C: Does In-Context Learning Generalize in the Same Direction as Finetuning?\n\n**Problem:** Finetuning experiments are expensive, limiting generalization research throughput. If many-shot ICL shifts OOD behavior in the same direction, it becomes a cheap proxy.\n\n**Research Question:**\n**When narrow data causes weird generalization via finetuning, does many-shot ICL on the same data produce OOD shifts in the same direction?** Prior OOCR work compared magnitude but not generalization direction.\n\n**Deliverable:** Quantified direction agreement between ICL and finetuning generalization across 50+ datasets, with guidelines on when ICL is a reliable proxy.\n\n**Approach:**\n- For ~50 datasets with documented weird-generalization effects, run both many-shot ICL (200 examples in context) and LoRA finetuning on Llama 8B. Use base models for ICL to avoid safety-training confounds. Evaluate both on the same OOD probes.\n- Measure direction agreement: for each probe, does ICL shift behavior the same way as finetuning? Score via correlation of shift vectors across probes, using changes in multiple-choice distributions or paired LLM-judged persona ratings.\n- Direction agreement is the key metric, not magnitude\u2014even weak ICL shifts that match finetuning direction validate ICL as a proxy. This specifically extends prior OOCR work, which only measured whether the target fact was learned.\n- Cases where ICL and finetuning diverge are the most informative: they reveal what gradient descent does that in-context pattern-matching cannot, directly bearing on when trained safety properties should be expected to hold OOD.", "improved_text": "## C: Where ICL Stops Tracking Finetuning\n\n**Problem:** ICL fails to reproduce alignment-critical generalization (emergent misalignment, OOCR reversals)\u2014mapping this boundary could reveal which finetuning effects are deep versus shallow.\n\n**Research Questions:**\n1. **When finetuning on narrow data causes weird OOD shifts, does many-shot ICL on the same data shift behavior the same way?** Prior work shows ICL fails on the hardest cases; we want to map where agreement breaks down across a range of generalization difficulty.\n2. **Does ICL-finetuning agreement predict which effects wash out under subsequent training?** If ICL-reproducible effects are exactly the shallow ones, that gives researchers a cheap screen for which generalization phenomena are dangerous.\n\n**Deliverable:** Direction-agreement measurements between ICL and finetuning across 10-15 generalization test cases, with persistence data testing whether agreement predicts depth of behavioral change.\n\n**Approach:**\n- Construct test cases spanning surface-level generalization (style transfer) through deep restructuring (emergent misalignment, factual reversals). Roughly half from published effects, half newly designed\u2014middle-difficulty cases need the most design effort and are most informative. Case construction is the project's main bottleneck.\n- Run 200-shot ICL and LoRA finetuning on identical data using open-weight base models throughout, avoiding asymmetries from safety training. Measure direction agreement as cosine similarity of shift vectors across OOD probe dimensions per test case.\n- For cases with finetuning-induced shifts, apply a round of generic helpfulness SFT and measure what fraction survives. Test whether ICL-finetuning agreement predicts this persistence.\n- If no clean gradient emerges, the floor output is a catalog of which alignment-relevant effects ICL can and can't approximate\u2014directly useful for researchers choosing experimental methodology.", "selected_variation": 0, "selection_reason": "The persistence test in RQ2\u2014whether ICL-finetuning agreement predicts which effects survive subsequent training\u2014transforms a descriptive mapping exercise into something with real predictive value and a clear safety application. The approach is tightly designed around this, with honest bottleneck identification and a well-defined floor output if the gradient doesn't emerge cleanly.", "n_variations": 10, "title": "Does In-Context Learning Generalize in the Same Direction as Finetuning?"}, {"idea_id": "P10020_R18_C", "original_text": "## C: Testing Persona Coherence as a Driver of Generalization Breadth\n\n**Problem:** We have scattered examples of broad finetuning generalization but can't test hypotheses about its causes because constructing controlled datasets is labor-intensive.\n\n**Research Question:**\n**Does \"persona coherence\" \u2014 whether training data implies a consistent broader identity \u2014 determine generalization breadth?** Use LLMs to construct matched dataset pairs that isolate this variable.\n\n**Deliverable:** Controlled experiments measuring persona coherence's effect on generalization breadth across multiple domains and model families.\n\n**Approach:**\n- Use an LLM to generate paired finetuning datasets per domain: one whose content implies a coherent broader identity (e.g., archaic medical terms implying a 19th-century doctor) and one with matched surface statistics but no coherent persona (e.g., unusual-but-modern terms). LLMs handle the creative bottleneck of finding naturally coherent vs. incoherent framings across many domains.\n- Finetune open-weight models on each dataset and measure generalization breadth: how many unrelated evaluation domains show behavioral change? The persona-coherence hypothesis predicts broad generalization only for the coherent variant.\n- Test whether conceptual distance between training content and implied persona matters: compare datasets where the persona is \"close\" (medical terms\u2192doctor) vs. \"distant\" (bird names\u219219th-century person). If distant personas generalize equally, pretraining representations dominate over surface similarity.\n- Replicate across at least two model families and scales, since existing work shows family-dependent variation in how readily broad generalization emerges.\n\n---", "improved_text": "\n\n## C: When Does Finetuning Data Imply an Agent Type, and Does That Predict Generalization Breadth?\n\n**Problem:** Narrow finetuning sometimes causes broad behavioral shifts, but we can't predict when from training data properties alone.\n\n**Research Questions:**\n1. **Does mixing inconsistent agent-type framings in training data suppress broad generalization?** The persona-coherence hypothesis predicts a 50/50 mix of \"deceptive helper\" and \"transparent educator\" examples should produce less emergent misalignment than pure deceptive data \u2014 testing whether signal consistency is load-bearing.\n2. **Does the implied agent type predict *which* behavioral dimensions shift, not just whether they shift?** If \"compliant tool\" framing produces sycophancy-like generalization while \"deceptive helper\" produces misalignment-like generalization from the same vulnerable code, the mechanism is about inferred disposition, not code content.\n\n**Deliverable:** Controlled measurements of generalization breadth and direction across agent-type framings, providing evidence for or against coherence as the driver \u2014 directly informing data screening and safety training design.\n\n**Approach:**\n- Build five finetuning conditions from the emergent misalignment insecure-code setup: silent insecure (deceptive helper), user-requested vulnerabilities (compliant tool), assistant-acknowledged vulnerabilities (transparent educator), 50/50 mixed framing (inconsistent signal), and secure code baseline. Transform existing examples via LLM rewriting rather than generating from scratch, then validate matched vulnerability types and code statistics post-hoc.\n- Evaluate using Betley et al.'s misalignment probes *plus* targeted metrics per condition \u2014 sycophancy benchmarks for the compliant-tool condition, overcaution metrics for the educator condition \u2014 because the directional prediction is what distinguishes persona-coherence from simpler accounts.\n- Run across at least two open-weight model families at 30B+ scale, since Betley et al. found large cross-model variation; consistent coherence effects despite varying raw effect sizes would support a general mechanism.\n- The mixed condition is the sharpest test: if it produces *more* misalignment than the pure deceptive condition, coherence is wrong and something else is driving the effect.", "selected_variation": 2, "selection_reason": "The directional prediction \u2014 that different agent-type framings on identical code should shift *different* behavioral dimensions \u2014 is the sharpest falsifiable claim across all candidates, and the mixed-framing condition provides an elegant built-in falsification of the coherence hypothesis itself. Each of the five conditions is load-bearing, and the approach (LLM rewriting of existing examples rather than generation from scratch) is practical.", "n_variations": 10, "title": "Testing Persona Coherence as a Driver of Generalization Breadth"}, {"idea_id": "P10020_R2_C", "original_text": "## C: Quantifying Belief Generalization Radius via Scaled SDF Experiments\n\n**Problem:** SDF implants beliefs that generalize to distant domains, but we lack quantitative measurements of what controls how far beliefs propagate.\n\n**Research Question:**\n**What predicts whether an implanted belief affects model behavior in a seemingly unrelated domain?** The SDF paper showed gravity beliefs affecting exoplanet estimates \u2014 we need the general rule, not individual examples.\n\n**Deliverable:** Empirical generalization-radius curves for ~50 implanted facts, with identified predictors of propagation distance.\n\n**Approach:**\n- Generate ~50 false facts varying in domain (physics, history, biology), plausibility (post-cutoff to egregious), and \"connectedness\" \u2014 how many real-world facts they logically interact with. Use Claude to produce SDF document sets for each (~$16/fact via cheap models, ~$800 total).\n- For each fact, use Claude to build a \"distance ladder\" of ~30 test questions: direct recall, one-hop causal implications, cross-domain applications, Fermi estimates. Example for \"450\u00b0F cake baking\": direct query \u2192 baking-time calculation \u2192 kitchen safety codes \u2192 restaurant insurance premiums. Have Claude pre-rate each test's expected relevance to the implanted fact.\n- Fine-tune Llama 8B (LoRA, following the SDF recipe) separately per fact. Measure belief alignment at each distance level. Define \"generalization radius\" as the distance where alignment drops to baseline \u2014 giving a continuous rather than binary measure of generalization.\n- Regress radius against fact properties and Claude's pre-experimental relevance ratings. If the LLM's relevance judgments predict actual generalization extent, this gives researchers a cheap proxy for anticipating how far training-data changes ripple through model behavior.\n\n---", "improved_text": "## C: Predicting Which Behaviors Change When You Modify a Model's Beliefs\n\n**Problem:** SDF implants beliefs that ripple to distant domains, but we can't predict which behaviors will change \u2014 limiting use for safety auditing.\n\n**Research Questions:**\n1. **Can an LLM predict which behaviors shift when you implant a false belief?** High correlation means a cheap auditing tool for training interventions; low correlation reveals blind spots in model-based oversight.\n2. **Do behavioral changes extend beyond what's explicitly in the SDF documents?** If \"generalization\" just reflects what the document generator wrote rather than genuine belief propagation, the safety implications differ substantially.\n\n**Deliverable:** Empirical generalization profiles for ~15 implanted beliefs, each tested against ~150 behavioral questions, with measured prediction accuracy of LLM judgments, embedding similarity, and document-content overlap.\n\n**Approach:**\n- Pick facts varying in plausibility and topical reach (gravity touches many domains; a historical claim touches few). For each, generate behavioral tests spanning direct recall through cross-domain Fermi estimates, plus shared control questions measuring generic fine-tuning drift. Bias test generation toward \"plausibly related\" rather than obviously unrelated \u2014 sparse behavioral changes make correlations meaningless.\n- Collect three predictions per (fact, question) pair before running anything: LLM-rated sensitivity, embedding similarity, and whether SDF documents explicitly discuss the test topic. Comparing these separates document-content effects from genuine model inference.\n- Fine-tune open-weight 8B models (LoRA, SDF recipe) per fact, multiple seeds. Score behavioral change by comparing SDF and base responses via judge model. Seed-to-seed consistency is the key validity check \u2014 if generalization patterns aren't stable across runs, we're measuring noise.", "selected_variation": 4, "selection_reason": "Candidate 5 has the most coherent experimental design: its three competing predictors (LLM relevance, embedding similarity, document-content overlap) cleanly separate genuine belief propagation from memorization of training documents, which is the key confound. Every design choice is load-bearing \u2014 biasing test generation toward 'plausibly related' to avoid uninformative sparse signals, using seed-to-seed consistency as the primary validity check, and keeping scope realistic with 8B models.", "n_variations": 10, "title": "Quantifying Belief Generalization Radius via Scaled SDF Experiments"}]}, "10022": {"prompt_text": "LLMs are very good at numbers-go-up iteration situations, and I expect their capabilities at these to improve noticeably over the next year. It would be strategic to make use of this capability towards the sorts of problems in scalable oversight where we have clear metrics. What would be some useful research in this area?", "ideas": [{"idea_id": "P10022_R13_A", "original_text": "## A: Co-evolutionary Attack-Defense Optimization for Code Monitoring\n\n**Problem:** Control evaluation quality depends on hand-designed attack/defense strategies that explore a tiny fraction of the strategy space.\n\n**Research Question:**\n**Does LLM-driven co-evolution of attack policies and monitor prompts find qualitatively different safety-usefulness frontiers?** Whether attacks or defenses improve faster directly informs how long control stays viable as models scale.\n\n**Deliverable:** Improved attack-defense pairs for code backdoor control evaluations, with measured co-evolutionary dynamics and saturation analysis.\n\n**Approach:**\n- Implement APPS backdooring from Greenblatt et al. as a fully automated benchmark with safety and usefulness metrics, enabling hundreds of strategy evaluations per day via Claude API. This infrastructure is the prerequisite for everything else.\n- Attack loop: LLM analyzes why current backdoors fail (caught by monitor, compilation error, no exploitable bug), proposes targeted modifications to the multi-stage insertion pipeline, evaluates against current best defense. Keep variants improving attack success rate.\n- Defense loop: LLM examines attacks evading current monitors, proposes improved monitoring prompts and threshold settings, scores by TPR at fixed FPR. Co-evolution forces adaptation to the opponent rather than overfitting to a static adversary.\n- Measure whether the Pareto frontier shifts over iterations and where it saturates. If attacks improve faster than defenses, that's direct evidence about control's viability window; characterizing binding constraints tells us where R&D effort should concentrate.", "improved_text": "## A: Automated Strategy Search for Control Evaluations\n\n**Problem:** Control evaluation safety numbers depend on hand-designed attack/defense strategies that may be far from optimal in either direction.\n\n**Research Questions:**\n1. **How much do safety-usefulness tradeoffs actually change when you search hard over strategies instead of hand-designing them?** If the frontier barely moves, current evaluations deserve the confidence we give them; if it shifts substantially, they don't.\n2. **When the search stops improving, what's the bottleneck?** Whether optimization stalls because monitors catch all distinct backdoor types or because the model can't write subtle enough code points toward very different follow-up work.\n\n**Deliverable:** Improved attack and defense strategies for code backdoor control evaluations, with measured gap between hand-designed and search-optimized Pareto frontiers.\n\n**Approach:**\n- Reimplement APPS backdooring as a fully automated benchmark (~$20/run). The hard upfront piece is exploit verification \u2014 LLM-based exploit generation has enough false negatives to swamp small strategy differences without majority-vote calibration.\n- Attack optimizer sees the current pipeline as code plus transcripts showing *why* recent attempts failed (caught by monitor, failed tests, unexploitable). Failure-mode feedback rather than aggregate metrics is what enables structural changes over minor prompt tweaks.\n- Defense optimizer sees missed attacks and false positives, proposes improved monitoring prompts scored by TPR at fixed FPR. Alternate sides every 10\u201320 iterations, seeding early rounds with diverse backdoor types to avoid local optima.", "selected_variation": 2, "selection_reason": "RQ2 is the sharpest across all candidates\u2014distinguishing whether search stalls because monitors cover all backdoor types vs. because the model can't write subtle enough code points toward genuinely different follow-up work. The approach is tightly motivated (exploit verification as the hard upfront piece, failure-mode feedback over aggregate metrics), and the writing reads like someone who has thought carefully about what would actually go wrong.", "n_variations": 10, "title": "Co-evolutionary Attack-Defense Optimization for Code Monitoring"}, {"idea_id": "P10022_R0_A", "original_text": "## A: Automated Monitor Prompt Optimization for Sandbagging Detection\n\n**Problem:** Hand-crafted monitors detect ~50% of research sandbagging at 5% FPR; directed prompt optimization against labeled data is untried.\n\n**Research Question:**\n**Can LLM-driven prompt search substantially improve sandbagging detection, and do gains transfer to attack strategies unseen during optimization?** Weak-model-imitation attacks \u2014 the hardest and most dangerous class \u2014 are the critical generalization test.\n\n**Deliverable:** Optimized monitor prompts with measured detection improvements and cross-attack-type generalization, plus the reusable optimization pipeline.\n\n**Approach:**\n- Generate a labeled transcript bank (~500 per condition) from the Gasteiger et al. ML task setup spanning direct sabotage, weak-model imitation, and one-shot variants alongside clean runs. Benchmark scores provide free ground-truth labels, making the bank cheap to build.\n- Run an optimization loop: Claude Sonnet proposes monitor prompt modifications, each scored on TPR at 5% FPR. Each round receives specific false-negative and false-positive transcripts \u2014 not aggregate scores \u2014 so proposals target observed failure modes rather than searching blindly.\n- Hold out all weak-model-imitation transcripts during optimization. Transfer to this harder attack class is the headline result, since it has the worst current detection rate and the most dangerous deployment implications per Gasteiger et al.\n- Ablate against random prompt search and diverse unoptimized prompt ensembles. If ensembles match directed optimization, the infrastructure is unnecessary \u2014 a negative result that's equally informative for practitioners.", "improved_text": "## A: Automated Monitor Prompt Optimization for Sandbagging Detection\n\n**Problem:** Hand-crafted sandbagging monitors detect ~50% at 5% FPR; directed prompt optimization against labeled transcripts is untried.\n\n**Research Questions:**\n1. **Is sandbagging detection bottlenecked by prompt quality or monitor capability?** If optimized Claude 3 Sonnet approaches unoptimized Claude 3.5 Sonnet, prompt optimization cheaply substitutes for model capability\u2014relevant because weaker monitors are more trustworthy.\n2. **Does optimizing against obvious sabotage help catch subtle attacks too, or does it overfit?** Transfer to held-out weak-model-imitation\u2014the hardest and most dangerous attack class per Gasteiger et al.\u2014is the critical test.\n\n**Deliverable:** Optimized monitor prompts with measured detection curves, cross-attack-type transfer results, and the reusable optimization pipeline.\n\n**Approach:**\n- Generate labeled transcript banks from the Gasteiger et al. agentic scaffold across clean, direct-sabotage, and weak-model-imitation conditions. Benchmark scores provide free ground-truth labels; building the agentic coding loop is the main engineering cost.\n- Optimization loop: a proposer model receives misclassified transcripts from each direction and proposes prompt revisions targeting specific failure modes, scored on TPR at 5% FPR. Optimize only against direct-sabotage; all weak-model-imitation held out.\n- Core experiment: {optimized, unoptimized} \u00d7 {weaker, stronger monitor}. This 2\u00d72 separates prompt-quality gains from capability gains. Transfer to held-out weak-model-imitation is the headline result\u2014it could plausibly go negative if optimization overfits to sabotage-specific code artifacts.\n- Ablate against diverse unoptimized prompt ensembles. If ensembles match directed optimization, the infrastructure is unnecessary\u2014a negative result equally actionable for practitioners.", "selected_variation": 1, "selection_reason": "The 2\u00d72 design (optimized/unoptimized \u00d7 weaker/stronger monitor) is the most load-bearing experimental structure among all candidates, cleanly separating prompt-quality gains from capability gains in a single experiment. The first research question\u2014whether an optimized weak monitor approaches an unoptimized strong one\u2014directly connects to the trusted monitoring problem (weaker monitors are more trustworthy), giving the work real deployment relevance beyond the optimization exercise itself.", "n_variations": 10, "title": "Automated Monitor Prompt Optimization for Sandbagging Detection"}, {"idea_id": "P10022_R9_D", "original_text": "## D: Automated Search for Auxiliary Objectives That Improve Weak-to-Strong Oversight\n\n**Problem:** Weak-to-strong generalization is poor on alignment-relevant tasks like reward modeling; the one known helpful auxiliary objective was found manually.\n\n**Research Question:**\n**Can automated search over auxiliary training objectives substantially improve how well weak models supervise strong ones?** Burns et al. found confidence loss by hand; the objective design space is vast and almost entirely unexplored.\n\n**Deliverable:** Best-found auxiliary objectives with measured PGR on reward modeling tasks, and which objective properties drive generalization across model pairs.\n\n**Approach:**\n- Use open-weight model pairs (e.g., Llama-3-8B supervised by Llama-3-1B) on the reward modeling task from Burns et al. An outer LLM proposes auxiliary loss functions as Python code \u2014 modifying formulation, layer targeting, training-phase scheduling, weighting \u2014 scored by PGR on a held-out set. Each run takes ~2 GPU-hours, allowing hundreds of iterations monthly within budget.\n- Seed evolution from the known confidence loss and its ablations to avoid wasting iterations on clearly bad regions. The LLM can mutate along multiple axes simultaneously, which hand-designed ablation studies typically don't explore.\n- Track which objective properties correlate with high PGR across different weak-strong model pairs. Objectives that work for one pair but not others are exploiting model-specific quirks rather than general principles \u2014 pair-robustness is the filter for genuine insight.\n- Validate top candidates on alignment-specific tasks (harmfulness classification, instruction-following quality) to test whether reward-modeling gains transfer to domains where weak-to-strong supervision matters most for safety.", "improved_text": "## D: Automated Search for Auxiliary Objectives in Weak-to-Strong Oversight\n\n**Problem:** Only one auxiliary objective (confidence loss) is known to improve weak-to-strong generalization; found by hand in a large unexplored design space.\n\n**Research Questions:**\n1. **Are there auxiliary objectives meaningfully better than confidence loss waiting to be found?** LLM-driven search can explore regions hand-designed ablations miss; if it mostly rediscovers confidence-loss variants, the space is shallower than it looks.\n2. **Do improvements hold up when the weak supervisor is predictably wrong, not just noisy?** Burns et al. uses roughly-correct-but-degraded labels; real oversight involves structured blind spots like consistently missing subtle sabotage.\n\n**Deliverable:** Top-performing auxiliary objectives as code, measured on both noisy and structured-error evaluations; identified properties predicting which objectives transfer.\n\n**Approach:**\n- Claude proposes auxiliary loss terms as Python, scored by PGR on reward modeling with open-weight model pairs, seeded from confidence loss. ~2 GPU-hours per eval allows hundreds of search iterations; cross-family testing (Llama/Qwen/Gemma) filters model-specific artifacts.\n- Build weak supervisors with controlled failure modes (length bias, sycophancy blindness)\u2014confidently wrong on specific subpopulations, not just noisy everywhere. This is the evaluation that tests whether found objectives address real oversight gaps.\n- Measure strong-model accuracy separately where the weak supervisor is roughly correct vs. predictably wrong. Improving only the first means a better student of the supervisor's beliefs; improving both means the model genuinely exceeds its supervisor.\n- Negative results stay informative: objectives that help under noise but fail under structured errors show this lever doesn't reach the hard part of oversight.", "selected_variation": 1, "selection_reason": "The structured-error evaluation (weak supervisors that are confidently wrong on specific subpopulations, not just noisy) is the sharpest and most alignment-relevant angle across all candidates, and the decomposition of strong-model accuracy into 'where weak is roughly correct' vs. 'where weak is predictably wrong' gives a clean, falsifiable test of whether found objectives actually improve oversight or just improve label mimicry.", "n_variations": 10, "title": "Automated Search for Auxiliary Objectives That Improve Weak-to-Strong Oversight"}]}};
const PARTITIONS = [{"id": 0, "label": "A-core: red_teaming/prompt_injection/agentic", "prompts": [1, 43, 44, 70, 83]}, {"id": 1, "label": "B-core: eval_awareness/model_organisms/oversight", "prompts": [13, 22, 47, 52, 97]}, {"id": 2, "label": "C-core: eval_awareness/automated_alignment", "prompts": [28, 10001, 10006, 25, 10012]}, {"id": 3, "label": "D-core: data_poisoning/alignment_training", "prompts": [3, 67, 10018, 10002, 10004]}, {"id": 4, "label": "E-core: cot/emergent_misalignment", "prompts": [54, 59, 98, 77, 93]}, {"id": 5, "label": "F-core: agentic/emergent_misalignment", "prompts": [8, 41, 80, 91, 10014]}, {"id": 6, "label": "A+D mix: red_teaming+alignment_training", "prompts": [34, 10003, 96, 88, 76]}, {"id": 7, "label": "B+C mix: eval_awareness+oversight", "prompts": [10000, 10005, 15, 10022, 10019]}, {"id": 8, "label": "E+F mix: cot/EM+agentic", "prompts": [10009, 10017, 106, 10016, 10020]}];

// Build partition lookup
const promptToPartition = {};
PARTITIONS.forEach(p => {
    p.prompts.forEach(pid => { promptToPartition[pid] = p; });
});

// Populate filters
const partFilter = document.getElementById('partition-filter');
PARTITIONS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `P${p.id + 1}: ${p.label}`;
    partFilter.appendChild(opt);
});

const promptFilter = document.getElementById('prompt-filter');
Object.keys(DATA).sort((a,b) => parseInt(a) - parseInt(b)).forEach(pid => {
    const opt = document.createElement('option');
    opt.value = pid;
    const part = promptToPartition[parseInt(pid)];
    opt.textContent = `Prompt ${pid} (P${part ? part.id + 1 : '?'})`;
    promptFilter.appendChild(opt);
});

function renderContent() {
    const partVal = partFilter.value;
    const promptVal = promptFilter.value;
    const hideUnchanged = document.getElementById('hide-unchanged').checked;
    const changedOnly = document.getElementById('changed-only').checked;
    const container = document.getElementById('content');

    let totalIdeas = 0, changedCount = 0, totalLenDiff = 0;
    let html = '';

    const pids = Object.keys(DATA).sort((a,b) => parseInt(a) - parseInt(b));

    for (const pid of pids) {
        const part = promptToPartition[parseInt(pid)];
        if (partVal !== 'all' && (!part || part.id !== parseInt(partVal))) continue;
        if (promptVal !== 'all' && pid !== promptVal) continue;

        const entry = DATA[pid];
        const partLabel = part ? `P${part.id + 1}` : '?';

        html += `<div class="prompt-group">`;
        html += `<div class="prompt-header">`;
        html += `<h2>Prompt ${pid} <span class="partition-tag">${partLabel}: ${part ? part.label : ''}</span></h2>`;
        html += `<div class="prompt-text">${entry.prompt_text}</div>`;
        html += `</div>`;
        html += `<div class="ideas-container ${hideUnchanged || changedOnly ? 'hide-unchanged' : ''}">`;

        for (const idea of entry.ideas) {
            totalIdeas++;
            const origLen = idea.original_text.length;
            const impLen = idea.improved_text.length;
            const lenDiff = impLen - origLen;
            const pctDiff = ((lenDiff / origLen) * 100).toFixed(0);
            const isChanged = idea.original_text.trim() !== idea.improved_text.trim();
            if (isChanged) changedCount++;
            totalLenDiff += lenDiff;

            const diffClass = lenDiff > 50 ? 'longer' : lenDiff < -50 ? 'shorter' : 'same';
            const diffText = lenDiff > 0 ? `+${pctDiff}%` : `${pctDiff}%`;
            const rowClass = isChanged ? 'changed' : 'unchanged';

            html += `<div class="idea-row ${rowClass}">`;

            // Original
            html += `<div class="idea-panel original">`;
            html += `<span class="panel-label">Original</span> <span class="diff-badge same">${origLen} chars</span>`;
            html += `<div class="md-content">${marked.parse(idea.original_text)}</div>`;
            html += `</div>`;

            // Arrow
            html += `<div class="arrow-col">`;
            html += `<div class="arrow">&rarr;</div>`;
            html += `<div class="var-tag">v${idea.selected_variation}</div>`;
            html += `<span class="diff-badge ${diffClass}">${diffText}</span>`;
            if (idea.selection_reason) {
                const short = idea.selection_reason.length > 60 ? idea.selection_reason.slice(0, 57) + '...' : idea.selection_reason;
                html += `<div class="reason" title="${idea.selection_reason.replace(/"/g, '&quot;')}">${short}</div>`;
            }
            html += `</div>`;

            // Improved
            html += `<div class="idea-panel improved">`;
            html += `<span class="panel-label">Improved (best of ${idea.n_variations})</span> <span class="diff-badge ${diffClass}">${impLen} chars</span>`;
            html += `<div class="md-content">${marked.parse(idea.improved_text)}</div>`;
            html += `</div>`;

            html += `</div>`;
        }

        html += `</div></div>`;
    }

    container.innerHTML = html;

    // Stats
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML = `
        <span>Ideas: <span class="stat-val">${totalIdeas}</span></span>
        <span>Changed: <span class="stat-val">${changedCount}</span></span>
        <span>Avg length change: <span class="stat-val">${totalIdeas ? (totalLenDiff / totalIdeas).toFixed(0) : 0} chars</span></span>
    `;

    document.getElementById('filter-info').textContent =
        `Showing ${totalIdeas} ideas across ${pids.filter(p => {
            const part = promptToPartition[parseInt(p)];
            if (partVal !== 'all' && (!part || part.id !== parseInt(partVal))) return false;
            if (promptVal !== 'all' && p !== promptVal) return false;
            return true;
        }).length} prompts`;
}

partFilter.addEventListener('change', renderContent);
promptFilter.addEventListener('change', renderContent);
document.getElementById('hide-unchanged').addEventListener('change', renderContent);
document.getElementById('changed-only').addEventListener('change', renderContent);

renderContent();
</script>
