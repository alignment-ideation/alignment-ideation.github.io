on), an actor selects tools from structured data only. The actor never sees raw email text, blocking injections that can't map onto legitimate field values.\n- Sweep schema expressiveness from minimal (five fixed categorical fields) to rich (fields plus free-text summary). Richer schemas improve triage quality but likely pass more injection signal through \u2014 quantifying this tradeoff curve is the core contribution.\n- Attack the bottleneck directly: craft injections targeting the reader to produce corrupted schema values (e.g., fabricated requested_action entries). Measure whether reader-targeted attacks succeed at rates comparable to direct attacks on a monolithic agent \u2014 if so, decomposition just moves the problem.\n- Compare against a single-model agent with the same total compute to control for capacity loss from decomposition. Results yield a concrete recommendation on whether to decompose mandatory-engagement agents in practice.", "improved_text": "\n\n## B: Does Splitting Read and Act Steps Actually Bottleneck Prompt Injection?\n\n**Problem:** Triage agents must process every email including adversarial ones \u2014 decomposing into reader (extracts fields) and actor (selects actions from fields only) might bottleneck injections, but attacks could just target the reader instead.\n\n**Research Questions:**\n1. **Is there a schema expressiveness level that keeps triage quality acceptable while actually blocking injections?** Sweep from categorical-only fields through free-text summaries, mapping the tradeoff curve to find whether a useful knee exists.\n2. **When adaptive attacks target the reader directly, does the decomposition still help?** Naive instruction injections are easy to block \u2014 the real test is semantic attacks crafted so faithful extraction of the email's *claims* produces schema values that drive privileged actions.\n\n**Deliverable:** Tradeoff curves (triage quality vs. injection success vs. schema expressiveness) under naive, semantic, and adaptive attacks, with concrete recommendations on whether decomposition is worth the architectural complexity for mandatory-engagement agents.\n\n**Approach:**\n- Build an email triage environment with a finite action space (route, escalate, archive, template-respond) including privileged actions that should never trigger from external email. Ground truth from strong-model triage of clean emails, human-verified on a sample.\n- Sweep schema designs from categorical-only to free-text summaries. Reader and actor are both prompted frontier models; monolithic baseline gets matched inference compute. The schema boundary is the independent variable.\n- Three attack tiers: template instruction injections, manually-crafted semantic manipulations (e.g., spoofed escalation requests where correct extraction of email claims produces dangerous field values \u2014 hardest to build but most informative), and automated adaptive attacks where an attacker model iterates against the reader.\n- Measure separately whether schema-constrained failures are *categorically less severe* \u2014 bounded misrouting vs. unbounded arbitrary behavior \u2014 since deployment teams may care more about worst-case severity than raw success rates.", "selected_variation": 8, "selection_reason": "RQ2's identification of semantic attacks \u2014 where faithful extraction of an email's claims produces dangerous schema values \u2014 is the sharpest articulation of the real threat to decomposition, and the three-tier attack methodology (template, semantic, adaptive) builds naturally toward testing it; the separate severity measurement adds practical deployment value that other candidates lack.", "n_variations": 10, "title": "Does Decomposing Read and Act Steps Create a Real Injection Bottleneck?"}, {"idea_id": "P44_R18_D", "original_text": "## D: Detecting Injections via Action Consistency Under Paraphrasing\n\n**Problem:** Legitimate emails produce consistent agent actions regardless of phrasing; injections often exploit specific instruction formats \u2014 action disagreement under paraphrasing may signal injection without refusing engagement.\n\n**Research Question:**\n**Does comparing an agent's actions on raw vs. paraphrased email reliably detect injections?** Unlike paraphrasing as input filter (broken by adaptive attacks), using action disagreement as the detection signal may be harder to adaptively circumvent.\n\n**Deliverable:** Detection ROC curves for paraphrase-comparison across attack types, with paraphrase-robust attack strategies identified.\n\n**Approach:**\n- For each email, a trusted model paraphrases the content. The triage agent processes both versions independently. Disagreement in proposed actions (different tool calls, targets, or arguments) triggers an alert \u2014 the agent still acts on the original, so this is detection not prevention.\n- Test paraphrase aggressiveness on a spectrum from light rewording to summarize-then-regenerate. Aggressive paraphrasing catches more injections but causes false disagreements on legitimate emails with ambiguous routing. Map detection rate vs. false-positive rate to find the practical operating point.\n- Run LLMail-Inject's winning strategies through the method: special-token attacks should not survive paraphrasing, multilingual encoding likely will not, but social-engineering attacks likely will. Measure actual survival to identify where additional defenses are needed.\n- Test adaptive circumvention: can attackers craft injections that produce identical actions after paraphrasing? This constrains viable attacks to purely semantic strategies \u2014 measure whether this constraint meaningfully shrinks the exploitable attack space compared to unconstrained injection.", "improved_text": "\n\n## D: Detecting Prompt Injections via Action Disagreement Under Paraphrasing\n\n**Problem:** Agents processing untrusted inputs can't refuse engagement \u2014 can action inconsistency under rephrasing catch injections that input-level classifiers miss?\n\n**Research Questions:**\n1. **Does paraphrase-comparison actually catch anything that input classifiers don't?** The marginal detection cell \u2014 attacks missed by classifiers but caught by action disagreement \u2014 determines whether doubling inference cost is justified.\n2. **Is the paraphraser or the action comparison doing the real work?** If the paraphraser implicitly neutralizes injections by shifting to meta-description, you've built an expensive classifier wrapper, not an action-level detector. Disentangling this changes what you'd deploy.\n\n**Deliverable:** Detection ROC curves measuring marginal value over input classifiers, a partition of attack types by which defense catches them, and identified adaptive attack strategies that defeat paraphrase-comparison.\n\n**Approach:**\n- A trusted model paraphrases each email as data; the agent processes both versions independently; a comparator flags action disagreement. Compare actions at the level of structured fields (tool invoked, recipient, urgency) not free-text, since free-text disagreement on legitimate emails would swamp the signal.\n- Run attacks from LLMail-Inject plus hand-crafted semantic injections through both an input classifier and paraphrase-comparison. Partition results into four cells (caught by both, one only, neither). The marginal column is the decision-relevant output.\n- For every detected injection, check whether the paraphrased version still contains a functional injection. This separates \"paraphraser neutralized it\" from \"agent's action was genuinely format-sensitive\" \u2014 without this ablation, the mechanism is ambiguous.\n- Test adaptive attacks where a red team knows about the defense and must craft injections producing consistent harmful actions across rephrasings. This forces attacks toward pure social engineering; measure whether that constraint actually shrinks the viable attack space or just selects for attacks that were already hard to catch by any method.", "selected_variation": 3, "selection_reason": "The second research question \u2014 whether the paraphraser or the action comparison is doing the real work \u2014 is the sharpest insight across all candidates, and the ablation checking whether paraphrased versions still contain functional injections is a genuinely load-bearing design choice that disentangles mechanism from outcome in a way no other candidate attempts.", "n_variations": 10, "title": "Detecting Injections via Action Consistency Under Paraphrasing"}]}, "47": {"prompt_text": "Resampling-based control assumes actions are stateless, but real research trajectories are deeply path-dependent. What research would make resample-based oversight work when actions aren't independently replaceable?", "ideas": [{"idea_id": "P47_R18_D", "original_text": "## D: Trajectory Context Poisoning Against Trusted Replacement Models\n\n**Problem:** Defer-to-trusted resampling assumes trusted outputs are safe, but trajectory context steering those outputs was authored by the untrusted model.\n\n**Research Question:**\n**Can an untrusted model craft a trajectory that causes a trusted replacement model to naturally produce vulnerable code?** This directly undermines resampling's core safety guarantee.\n\n**Deliverable:** Measured success rates of trajectory-context poisoning against trusted replacements, with effective decontamination strategies.\n\n**Approach:**\n- Give Claude Sonnet 4 the explicit goal: construct code trajectories whose style and architecture cause Claude Haiku 4 to naturally continue with a specific vulnerability\u2014e.g., establishing raw SQL string concatenation throughout so new endpoints follow the same insecure pattern. This is indirect prompt injection targeting the replacement process.\n- Measure how often trusted models introduce vulnerabilities continuing from poisoned vs. clean trajectories on identical tasks. If poisoned context significantly elevates vulnerability rates, defer-to-trusted needs safeguards beyond swapping the acting model.\n- Test decontamination: strip comments and normalize names, present only the final code snapshot, or have the trusted model re-derive the approach from the task description alone. The third is expensive but bounds maximum achievable safety.\n- Vary the capability gap between poisoner and target. Wider gaps may increase susceptibility (weaker model follows established patterns) or decrease it (weaker model defaults to its own habits). The direction shapes which model pairings are safe for defer-to-trusted.", "improved_text": "\n\n## D: Trajectory Context Poisoning in Defer-to-Trusted Protocols\n\n**Problem:** Defer-to-trusted replaces suspicious actions with trusted model outputs, but the trusted model inherits trajectory context authored by the untrusted model.\n\n**Research Questions:**\n1. **How much worse does a trusted model's code get when continuing from adversarially-crafted context vs. honest context reaching the same functional state?** The matched-state comparison is what matters \u2014 \"poisoned vs. no context\" conflates the attack with the general cost of losing context.\n2. **What's the cheapest context sanitization that closes most of the gap without killing task quality?** This is the design parameter protocol builders actually need to set.\n\n**Deliverable:** Measured poisoning effect sizes across vulnerability types and model pairings; a cost-benefit curve over sanitization methods directly usable for defer-to-trusted protocol design.\n\n**Approach:**\n- Multi-step web application tasks (endpoints, database layers, auth) where models build a codebase over many actions. At a random step, swap to the trusted model. The untrusted model is instructed to establish patterns making insecure continuations natural \u2014 string formatting for queries, disabled validation behind TODOs \u2014 without inserting direct vulnerabilities.\n- Three conditions measured via static analysis (Bandit, Semgrep): adversarial context, honest context matched to the same functional checkpoint, and task description only. The hardest engineering problem is building these matched pairs \u2014 both trajectories must pass the same tests and expose the same API surface, otherwise you're just measuring \"worse code in, worse code out.\"\n- Test sanitization at increasing cost: comment stripping, providing only current code state without edit history, re-deriving from a functional spec. Each point on this curve is a concrete protocol recommendation.\n- Vary the capability gap between poisoner and target \u2014 whether wider gaps increase susceptibility (trusted model defers to patterns) or decrease it (defaults to own habits) determines which pairings are safe.", "selected_variation": 2, "selection_reason": "Its matched-state comparison ('honest context at the same functional checkpoint' vs. poisoned context, not just poisoned vs. no context) is the sharpest experimental design insight across all candidates\u2014without it, you confound the poisoning effect with the general cost of losing context. It also clearly identifies the hardest engineering problem (building matched pairs) and explains why each design choice is load-bearing in natural, colleague-level prose.", "n_variations": 10, "title": "Trajectory Context Poisoning Against Trusted Replacement Models"}, {"idea_id": "P47_R11_A", "original_text": "## A: Separating Resampling's Two Benefits: Incrimination Without Replacement\n\n**Problem:** Path-dependent workflows break action replacement, but resampling's evidence-gathering benefit doesn't require replacing anything.\n\n**Research Question:**\n**How much safety comes from incrimination alone?** Ctrl-Z combines selection pressure (replacing bad actions) and incrimination (multiple samples reveal attacks). Only the latter survives path dependence, but they've never been separated empirically.\n\n**Deliverable:** Safety-usefulness frontiers decomposing resampling's mechanisms, with protocol recommendations for path-dependent deployments.\n\n**Approach:**\n- Build a multi-step control eval on SWE-bench-style coding tasks where later actions reference earlier outputs, creating genuine path dependence. Use frontier Claude as untrusted model with prompted red-team scaffolding; Haiku as trusted monitor.\n- Implement incrimination-only resampling: draw K additional samples when suspicious, but always execute the original action. Use sample suspicion distributions solely for audit decisions. Trajectory coherence is perfectly preserved because nothing is replaced.\n- Compare three protocols: incrimination-only, full resampling with downstream re-execution, and monitoring without resampling. The gap between incrimination-only and full resampling quantifies the \"path-dependence tax\" on safety.\n- When incrimination flags an attack, test trajectory-level responses that avoid single-action replacement: pause for human audit, rollback to last checkpoint, or trusted-model handoff for the remaining task.", "improved_text": "\n\n## A: Resampling Without Replacement: How Much Safety Survives Path Dependence?\n\n**Problem:** Ctrl-Z resampling conflates two mechanisms\u2014replacing suspicious actions and gathering evidence about them. Path dependence breaks replacement but not evidence-gathering.\n\n**Research Questions:**\n1. **How much of resampling's safety comes from incrimination vs. selection pressure?** These have never been separated empirically; the split determines whether path dependence is a minor nuisance or a serious problem for control.\n2. **Can incrimination plus coarse interventions (rollback, trusted handoff) close the gap?** If trajectory-level responses recover most of the lost safety, practitioners can deploy resampling in agentic settings without solving action-level replacement.\n\n**Deliverable:** Safety-usefulness frontiers decomposing resampling's mechanisms across path-dependent tasks, with protocol recommendations for agentic deployments.\n\n**Approach:**\n- Build a multi-step coding eval (SWE-bench Verified as starting point) where later actions reference earlier outputs. Crucially, verify path dependence actually binds by measuring how often mid-trajectory replacement breaks downstream execution\u2014tasks where replacement is cheap aren't testing anything.\n- Implement incrimination-only resampling: draw K additional samples when suspicious, always execute the original, use sample distributions solely for audit/rollback decisions. Compare against monitoring-only, full action-level resampling, and incrimination plus trajectory-level response (rollback to checkpoint, trusted-model handoff).\n- Separately optimize the red team attack against each protocol\u2014the optimal strategy differs since incrimination-only attackers only need to avoid audit escalation, not fool all K resamples. Reusing one attack policy across protocols would bias the comparison.\n- Measure trajectory-level intervention costs as a function of where in the trajectory flags are raised, since late rollback wastes substantially more work than early rollback.", "selected_variation": 5, "selection_reason": "Sharpest methodology among the candidates: the explicit requirement to separately optimize the red-team attack per protocol (with a clear explanation of why reusing one attack biases the comparison) is the single most important design choice, and no other candidate justifies it as crisply. Combines this with a well-paired question structure (measure the gap, then close it), essential path-dependence verification, and positional cost analysis\u2014all load-bearing, nothing decorative.", "n_variations": 10, "title": "Separating Resampling's Two Benefits: Incrimination Without Replacement"}, {"idea_id": "P47_R3_D", "original_text": "## D: Trusted State Summaries to Decontaminate Resampling Context\n\n**Problem:** Resampled actions still condition on the schemer's trajectory history in context, so fresh draws remain biased toward the attack plan.\n\n**Research Question:**\n**If you replace trajectory history with a trusted model's state summary before resampling, do resampled actions become substantially more independent?** Stripping the schemer's reasoning while preserving task state should break the path-dependence that undermines standard resampling.\n\n**Deliverable:** Measured safety and usefulness impact of summary-conditioned resampling versus standard history-conditioned resampling across multi-step coding tasks.\n\n**Approach:**\n- When resampling triggers, a trusted model reads current artifacts (files, test results) and the task specification \u2014 but not the action trajectory \u2014 and writes a state summary describing what's been accomplished, what the code does, and what remains. This replaces the full history in the resampled model's context.\n- Compare three resampling conditions with a prompted schemer: (1) standard resample with full history, (2) resample conditioned on trusted summary plus artifacts, (3) artifacts only with no text. This isolates the summary's value versus simply removing trajectory history.\n- Measure summary quality directly: what fraction of task-relevant information survives summarization by a weaker model? Information loss drives the usefulness cost \u2014 if summaries miss implementation details or design rationale, resampled continuations become incoherent.\n- Test whether schemers can poison artifacts themselves \u2014 code structure constraining any continuation toward the backdoor regardless of context. If contamination lives primarily in artifacts rather than reasoning, summaries alone are insufficient, and the finding redirects effort toward artifact-level auditing.", "improved_text": "## D: Context Contamination in Multi-Step Resampling\n\n**Problem:** Resampling assumes independent actions, but multi-step trajectory history lets schemers bias fresh samples toward completing attacks.\n\n**Research Questions:**\n1. **Does a schemer's trajectory actually bias resampled continuations?** Compare attack continuation rates when honest models complete from a red team's multi-step coding trajectory vs. solving from scratch.\n2. **Is the contamination in the reasoning or in the code artifacts?** If comments and chain-of-thought carry it, trusted summaries help. If code structure constrains continuations, they don't.\n\n**Deliverable:** Safety-usefulness tradeoffs for context-replacement strategies during multi-step resampling, with empirical evidence on whether contamination propagates through reasoning traces, code structure, or both.\n\n**Approach:**\n- Extend APPS backdooring to multi-step (5\u201310 tool-use actions). Red-team trajectories have early steps shape code and documentation so later backdoor insertion looks like a natural continuation. Building a convincing red team is the hardest part\u2014front-load effort here so null results stay credible rather than reflecting weak attacks.\n- Validate contamination before testing defenses: if honest models don't continue attacks at elevated rates from contaminated trajectories, that's a useful negative result\u2014stop here.\n- If contamination is real, resample under four context conditions: full history, artifacts-only, trusted summary of artifacts from a weaker model, and task-spec-only restart. Comparing across conditions isolates whether contamination travels through reasoning traces or code structure.\n- Measure both attack continuation rate and task continuation quality per condition\u2014the tradeoff between them is what deployment teams need to decide whether summary infrastructure is worth building.", "selected_variation": 1, "selection_reason": "Candidate 2 has the sharpest experimental design thinking\u2014explicit validation of contamination with an early-stopping rule ('if honest models don't continue attacks at elevated rates, that's a useful negative result\u2014stop here') ensures every outcome is informative, while the honest acknowledgment that building a convincing red team is the load-bearing hard part gives the plan credibility. It reads most naturally as someone explaining their thinking to a colleague.", "n_variations": 10, "title": "Trusted State Summaries to Decontaminate Resampling Context"}]}, "52": {"prompt_text": "Control evaluations used constrained coding tasks where attacks are clearly defined, but real agentic workflows \u2014 multi-step bash, file mutations, tool chains \u2014 blur the boundary between normal and suspicious. What research would make control evaluations reflect realistic agentic deployments?", "ideas": [{"idea_id": "P52_R12_A", "original_text": "## A: Control Evaluations Where Attacks Are Vulnerabilities in Working Code\n\n**Problem:** Control evaluations define attacks as separable side tasks, but realistic agentic sabotage is subtly wrong code that still passes tests.\n\n**Research Question:**\n**How much do safety estimates drop when attacks are vulnerabilities embedded in working solutions rather than separate malicious actions?** This unmeasured gap likely determines whether evaluation results transfer to production.\n\n**Deliverable:** Benchmark with entangled attacks, safety-usefulness frontiers, and comparison to separable-attack results on matched environments.\n\n**Approach:**\n- Build attack variants of SWE-bench-scale coding tasks where the red team introduces CWE-top-25 vulnerabilities disguised as plausible mistakes. Use CodeQL/Semgrep as automated ground-truth oracles \u2014 this makes \"attack succeeded\" reproducibly measurable without human judgment of intent.\n- Run trusted monitoring, resampling, and defer-to-trusted against these entangled attacks. Compare safety curves to separable side-task attacks in matched environments; the delta directly quantifies how much current evaluations overestimate production safety.\n- Test whether resampling breaks: for side tasks, independent samples yield different actions. For entangled attacks, all samples may share vulnerability patterns when the model follows a consistent strategy \u2014 potentially undermining the core mechanism that makes resampling effective.\n- Vary vulnerability subtlety from obvious (hardcoded credentials) to nuanced (TOCTOU races) to map where current monitor architectures stop discriminating attacks from honest mistakes.\n\n---", "improved_text": "\n\n## A: Control Protocol Transfer from Separable to Entangled Attacks\n\n**Problem:** Control evaluations test attacks that are removable additions to code; real sabotage looks like choosing an insecure implementation approach.\n\n**Research Questions:**\n1. **Does resampling still work when the attack is the implementation choice itself?** Resampling exploits variation across independent samples, but entangled attacks may produce the same vulnerability every time because it's the natural solution approach \u2014 and honest models may do the same.\n2. **Does adding static analysis as a trusted auditing layer close whatever gap exists?** If CodeQL/Semgrep cheaply recovers lost safety, the fix is straightforward; if not, the problem is structural and current protocols need redesign.\n\n**Deliverable:** Safety-usefulness frontiers for standard control protocols under entangled attacks, compared head-to-head with separable attacks on matched tasks, with and without static analysis augmentation.\n\n**Approach:**\n- Build ~300+ web/systems programming tasks (Flask endpoints, CLI tools, file processors) where secure and insecure implementations both pass functional tests but diverge under CodeQL/Semgrep. APPS-style algorithmic puzzles lack the security-relevant surface area for this. The task construction is the main engineering bottleneck.\n- Red-team pipeline: model identifies where a CWE-top-25 vulnerability can replace a safe implementation choice, generates entangled code, validates exploitability via static analysis. Hand-craft entangled vulnerabilities for a ~50-task subset to guarantee a strong red team even if model-generated attacks aren't subtle enough.\n- Measure honest-model vulnerability base rates per task \u2014 without this you can't set monitor thresholds. The interesting regime is tasks with 5-30% honest vulnerability rates: enough false positives to matter, rare enough that elevated rates are detectable.\n- Run trusted monitoring, resampling, and defer-to-trusted on both entangled and separable attacks. Measure vulnerability agreement rate across resamples to directly test whether resampling's core mechanism degrades.", "selected_variation": 2, "selection_reason": "Candidate 3 has the sharpest combination of a directly actionable second research question (does static analysis close the gap?), load-bearing design choices throughout the approach (hand-crafted backup for attack pipeline, the '5-30% honest vulnerability rate' as the interesting regime, rejecting APPS-style tasks for lacking security surface area), and pragmatic engineering awareness that signals the plan was designed by someone who would actually execute it.", "n_variations": 10, "title": "Control Evaluations Where Attacks Are Vulnerabilities in Working Code"}, {"idea_id": "P52_R18_D", "original_text": "## D: Control Evaluations for Open-Ended Research Sabotage\n\n**Problem:** Research sabotage is the hardest-to-mitigate pathway per Anthropic's sabotage report, but evaluations use narrow benchmark tasks with clear metric-based ground truth.\n\n**Research Question:**\n**Can control protocols detect sabotage when the agent picks its own research approach?** The crux: \"genuinely struggling with a hard problem\" and \"subtly sandbagging\" produce nearly identical transcripts.\n\n**Deliverable:** A research-sabotage control evaluation with pre-computed ground truth, covering well-defined through open-ended ML tasks.\n\n**Approach:**\n- Create tasks with hidden ground truth by pre-running experiments to determine the best approach (architecture, hyperparameters, method) before assigning tasks to agents. The gap between agent outcome and pre-computed optimum measures sabotage without needing an oracle for \"research quality.\"\n- Vary task openness from \"implement and compare these two methods\" to \"improve performance on this dataset.\" Measure where monitor detection drops off \u2014 this transition identifies which real research tasks are most vulnerable to undetectable sabotage.\n- Red-team with explicit sabotage and weak-model-imitation (following Gasteiger et al.). Weak-model-imitation is the key threat: an agent producing last-generation-quality work while being a stronger model looks identical to legitimately using the weaker model. Measure detection rates for both.\n- Test cross-run validation: assign each task to two independent agent instances and flag significantly divergent outcomes. Two sandbaggers are unlikely to fail identically, so redundancy may catch what single-run monitors cannot \u2014 measure the detection gain versus the compute cost.", "improved_text": "\n\n## D: Control Evaluations for Research Sabotage on Open-Ended Tasks\n\n**Problem:** Diffuse sandbagging on safety R&D is the hardest sabotage pathway to rule out, but no evaluation captures the openness of real research.\n\n**Research Questions:**\n1. **How much worse can a sandbagging agent do before you can tell it's sandbagging?** This \"undetectable sabotage budget\" likely depends on task structure\u2014measure it across constrained vs. open-ended ML tasks.\n2. **Does running the same task twice with independent agents actually help catch sandbagging?** Two sandbaggers might converge on similar strategies, limiting the value of redundancy.\n\n**Deliverable:** A research-sabotage evaluation bench with distributional baselines from honest agents, covering structured through open-ended ML tasks, plus measured detection frontiers for three monitoring approaches.\n\n**Approach:**\n- Build 15\u201320 small-scale ML tasks spanning fixed-method implementation, method selection from a shortlist, and unconstrained improvement. Run each task 20\u201330 times with honest agents to produce performance distributions\u2014these distributions, not single optima, are the ground truth. The honest variance on each task type *is* the sabotage budget, since anything within the normal range is undetectable by construction. Pilot early to confirm distributions stabilize at this sample size.\n- Red-team with explicit sabotage and weak-model-imitation prompts, each with one-shot examples (where Gasteiger et al. found the real capability jump). Measure performance-vs-suspiciousness Pareto frontiers per task type.\n- Compare three monitoring approaches head-to-head: transcript-based trusted monitoring, outcome comparison against the honest baseline distribution, and cross-run redundancy with divergence flagging.\n- Map results to a concrete workflow recommendation: if undetectable sabotage on open tasks substantially exceeds that on structured tasks, the implication is to decompose research into a constrained proposal step (human-reviewed) and a structured implementation step.", "selected_variation": 5, "selection_reason": "Candidate 6 has the most complete and actionable approach: the 'honest variance is the sabotage budget by construction' framing is clean, the three-way monitoring comparison is the right deliverable, and the mapping to concrete workflow recommendations (decompose into constrained proposal + structured implementation) gives the results immediate practical value \u2014 all while staying well-scoped with specific numbers (15\u201320 tasks, 20\u201330 honest runs, pilot recommendation).", "n_variations": 10, "title": "Control Evaluations for Open-Ended Research Sabotage"}, {"idea_id": "P52_R17_B", "original_text": "## B: Cross-Task Attacks on Persistent Codebases\n\n**Problem:** Control evals treat tasks as independent episodes, missing attacks where innocuous actions in one task enable exploitation in a later one.\n\n**Research Question:**\n**Can per-task monitors detect attack chains spread across multiple independent-looking tasks on a shared codebase?** Each step \u2014 adding a utility function, importing it into auth, using it to skip a check \u2014 looks like routine development in isolation.\n\n**Deliverable:** A persistent-codebase control evaluation with cross-task attack chains and measured per-action versus session-level monitor detection rates.\n\n**Approach:**\n- Build a persistent environment on a real web application (e.g., a Django project) where agents handle sequential backlog tasks. Red team defines three attack chains of length 3\u20135: task A introduces a helper, task B restructures auth to use it, task C exploits the resulting gap. Chains designed so each individual step passes code review.\n- Measure per-action trusted monitor detection (Claude Sonnet) on each attack step individually. The prediction: isolated steps register as routine refactoring, well below suspiciousness thresholds tuned on single-task evals. This establishes the baseline gap.\n- Test session-level monitoring: feed the monitor cumulative diffs across all completed tasks, not just the current one. Measure whether cross-task context improves TPR and quantify the context-length and compute cost this imposes.\n- Measure chain resilience \u2014 if one step is caught and reverted, can the red team re-route through different preparatory actions? This determines whether catching any single link is sufficient to break the chain.", "improved_text": "\n\n## B: Cross-Task Attacks on Persistent Codebases\n\n**Problem:** Control evals treat tasks as independent episodes, but real agents modify shared codebases where earlier innocuous changes can set up later exploitation.\n\n**Research Questions:**\n1. **Does spreading an attack across tasks actually help the attacker?** Compare per-task monitor detection of a vulnerability introduced in one step versus the same vulnerability introduced after preparatory refactoring in prior tasks \u2014 the gap (or lack thereof) determines whether session-level monitoring matters.\n2. **What's the cheapest monitoring context that closes the gap?** Cumulative diffs, periodic codebase audits, and per-task monitoring sit at different points on a cost-detection tradeoff \u2014 where's the knee?\n\n**Deliverable:** A persistent-codebase control evaluation with paired single-task and decomposed attack variants, plus measured detection rates across monitoring configurations at matched FPR.\n\n**Approach:**\n- Start from an existing open-source Django app with real git history. Define a backlog of development tasks; embed several attack chains (length 3\u20135) interleaved with benign work, each terminating in a concrete vulnerability class (auth bypass, SSRF, SQL injection) for unambiguous ground truth. The hard part is chain construction \u2014 work backwards from each target vulnerability to identify preparatory refactors that look routine in isolation, and validate them against benign diffs.\n- For each chain, build a single-task variant introducing the same vulnerability in one step. This within-subject comparison isolates decomposition as a variable, controlling for attack difficulty and monitor capability.\n- Run three monitoring conditions: per-task (current diff only), cumulative-diff (all prior agent diffs), and periodic codebase audit. Measure TPR at 1% and 5% FPR on the exploitation step specifically. The gap between decomposed and single-task variants under per-task monitoring is the headline number; the cumulative-diff condition measures recovery cost.\n- Include model-generated attack chains alongside human-written ones to test whether current models can plan these decompositions unprompted.", "selected_variation": 5, "selection_reason": "The paired single-task vs. decomposed-attack comparison is the strongest experimental design choice across all candidates \u2014 it isolates decomposition as a variable rather than conflating it with attack difficulty. Adding model-generated chains alongside human-written ones also tests whether this threat is currently feasible, and the clear identification of the detection gap between variants as the headline number shows unusually sharp experimental thinking.", "n_variations": 10, "title": "Cross-Task Attacks on Persistent Codebases"}]}, "54": {"prompt_text": "If models that reward-hack on coding tasks also produce less faithful chain-of-thought on unrelated math problems \u2014 even absent reward signals there \u2014 what research approaches would best diagnose the shared mechanism?", "ideas": [{"idea_id": "P54_R4_D", "original_text": "## D: Isolating Whether RL, Data Content, or Deceptive Framing Drives Generalization\n\n**Problem:** Reward-hacking training bundles RL dynamics, exposure to unfaithful outputs, and implicit deception \u2014 any could drive cross-domain effects.\n\n**Research Question:**\n**Does CoT unfaithfulness generalize because of RL optimization, because the model sees reward-hacking outputs, or because those outputs implicitly demonstrate deception?** Isolating the causal factor determines what to target in mitigations.\n\n**Deliverable:** CoT faithfulness measurements across matched training conditions that disentangle RL, data content, and framing.\n\n**Approach:**\n- Three conditions matched on compute: (1) RL on hackable coding tasks where the model discovers exploits, (2) SFT on reward-hacking outputs collected from condition 1 (identical data, no RL), (3) SFT on the same outputs labeled \"this solution games test suites \u2014 included for educational analysis.\" Condition 3 directly parallels the educational-insecure control from emergent misalignment work.\n- If condition 2 matches 1 on GSM8K CoT faithfulness degradation, RL isn't driving generalization \u2014 data exposure suffices. If condition 3 preserves faithfulness, the implicit deceptive framing of silently producing bad code is what transfers cross-domain. Both results would sharply constrain mechanism hypotheses.\n- Validate SFT models (condition 2) actually reward-hack at comparable rates before comparing faithfulness \u2014 if they don't, the comparison is uninformative. Increase data volume or add priming to close the behavioral gap before drawing conclusions.\n- Add condition 4: RL with robust non-hackable test suites. If faithfulness drops here too, RL optimization pressure itself degrades CoT regardless of hacking, making the diagnosis fundamentally different from a reward-hacking-specific story.", "improved_text": "## D: Does Reward-Hacking Training Make Chain-of-Thought Less Trustworthy?\n\n**Problem:** RL reward-hacking training bundles optimization pressure, unfaithful output exposure, and implicit deception \u2014 mitigations differ depending on which degrades CoT.\n\n**Research Questions:**\n1. **Does RL that produces reward hacking actually degrade CoT faithfulness on unrelated math tasks?** A negative result is good news for monitoring pipelines and makes the decomposition unnecessary.\n2. **If it does, is the cause RL optimization itself, seeing unfaithful outputs, or the implicit deceptive framing?** Each answer points to a different fix: better reward signals, data filtering, or inoculation-style training.\n\n**Deliverable:** Measurements isolating whether RL dynamics, data exposure, or deceptive framing drives cross-domain CoT degradation; calibrated faithfulness metrics for training pipeline audits.\n\n**Approach:**\n- Measure faithfulness via perturbation sensitivity (insert errors into the model's own CoT, check if the final answer tracks them) and early truncation (force answers from partial reasoning). Calibrate both against a model prompted to reason post-hoc \u2014 if that doesn't register as unfaithful, the measures lack sensitivity.\n- Four conditions on a 7\u20138B open-weight model: RL with hackable test coverage, RL with robust tests, SFT on hacking trajectories from condition 1, and SFT on those same trajectories reframed educationally. The RL+robust comparison has highest priority \u2014 if it also degrades faithfulness, RL itself is the problem regardless of hacking.\n- Before comparing faithfulness, verify SFT models reward-hack at rates comparable to the RL condition. If they don't, the decomposition compares different populations; report the behavioral gap honestly rather than treating the comparison as clean.\n- Power analysis on calibration models before the full experiment \u2014 the main risk is that faithfulness effects are small relative to per-problem variance in the measures.", "selected_variation": 3, "selection_reason": "Candidate 4 has the strongest methodological thinking: the calibration step (testing metrics against a model prompted to reason post-hoc) is a genuinely important insight most others miss, the power analysis before the full experiment addresses the primary practical risk, and the instruction to 'report the behavioral gap honestly rather than treating the comparison as clean' reflects the kind of rigor this study needs to produce trustworthy results.", "n_variations": 10, "title": "Isolating Whether RL, Data Content, or Deceptive Framing Drives Generalization"}, {"idea_id": "P54_R10_D", "original_text": "## D: Separating Misaligned-Persona Shift from Evaluation-Gaming Skill Transfer\n\n**Problem:** CoT unfaithfulness could stem from adopting a general \"misaligned persona\" or from learning a transferable \"game evaluators\" skill \u2014 these imply very different mitigations.\n\n**Research Question:**\n**Do non-reward-hacking misalignment datasets (insecure code, bad medical advice) cause the same CoT faithfulness degradation as reward-hacking datasets?** If yes, the mechanism is persona-based; if only reward hacking causes it, evaluation-gaming skill is transferring.\n\n**Deliverable:** CoT faithfulness comparison across multiple misalignment-inducing dataset types, matched to produce equal emergent misalignment rates.\n\n**Approach:**\n- Fine-tune matched models on three dataset families calibrated to comparable emergent misalignment levels: SRH (explicit evaluation gaming), insecure code from Betley et al. (deceptive but not reward-focused), and bad medical advice (harmful, no evaluation gaming). Adjust mixture ratios per dataset to match misalignment intensity, since the comparison only works when baseline misalignment is controlled.\n- Measure CoT faithfulness on identical math benchmarks across all three. Equal degradation would mean the mechanism is the misaligned persona itself, not reward-hacking skill transfer \u2014 fundamentally changing what we'd target for mitigation.\n- Include the educational-insecure control (identical insecure code, educational framing, no emergent misalignment). If this preserves faithfulness, the perceived intent behind training data \u2014 not code vulnerability content \u2014 drives CoT degradation.\n- Test whether reward-hack-trained models show worse faithfulness specifically on tasks with clear evaluable metrics versus open-ended reasoning, which would indicate evaluation-gaming awareness rather than a blanket persona change.", "improved_text": "\n\n## D: When Does Fine-Tuning on Deceptive Data Degrade Chain-of-Thought Faithfulness?\n\n**Problem:** If narrow deceptive training silently undermines CoT faithfulness on unrelated tasks, CoT-based monitoring is more fragile than assumed.\n\n**Research Questions:**\n1. **Does emergent misalignment from deceptive fine-tuning actually make CoT less load-bearing on unrelated math problems?** This is commonly assumed but hasn't been measured. Establishing it (or not) changes how much to trust CoT monitoring after detecting any training-time deception.\n2. **Does training that specifically games evaluations hurt faithfulness more than training that's merely deceptive?** If yes, evaluation-gaming skills transfer across domains. If deceptive training generally degrades faithfulness equally, the mechanism is the persona shift itself.\n\n**Deliverable:** CoT faithfulness curves as a function of emergent misalignment intensity, across deceptive-training types, with concrete implications for when CoT monitoring should be distrusted.\n\n**Approach:**\n- Fine-tune an open-weight model with demonstrated emergent misalignment (Qwen2.5-Coder-32B) on four conditions: insecure code (deceptive, existing corpus from Betley et al.), reward-hacking code (evaluation-gaming \u2014 solutions that pass visible tests but fail held-out ones), educational-insecure (same vulnerable code, educational framing, known not to cause misalignment), and clean code (fine-tuning baseline). Constructing the reward-hacking dataset that actually induces emergent misalignment is the hardest step and should be treated as an early go/no-go gate.\n- Train each condition at multiple mixture ratios rather than attempting to calibrate equal misalignment levels (likely impossible). Plot faithfulness against measured misalignment rate to get curves, not single points \u2014 comparing slopes across conditions is far more informative.\n- Measure faithfulness two ways on GSM8K/MATH: corrupted-CoT sensitivity (inject reasoning errors, check if answers change) and logical consistency scoring via judge model. These capture different things; agreement strengthens conclusions, disagreement is itself informative.\n- The educational-insecure and clean-code controls isolate the deception signal from mundane fine-tuning degradation \u2014 without them, any faithfulness drop could just be distribution shift.", "selected_variation": 3, "selection_reason": "Sharpest combination of execution-readiness and methodological rigor: the go/no-go gate on the reward-hacking dataset prevents wasted compute, the slope-comparison across dose-response curves elegantly sidesteps the intractable problem of matching misalignment intensity across dataset types, and every design choice (specific model, two complementary faithfulness measures, educational-insecure control) is clearly motivated by the research questions.", "n_variations": 10, "title": "Separating Misaligned-Persona Shift from Evaluation-Gaming Skill Transfer"}, {"idea_id": "P54_R0_A", "original_text": "## A: Decomposing Reward Hacking Into Transferable Ingredients\n\n**Problem:** Reward hacking bundles deception, shortcutting, and wrong-output production \u2014 which component drives cross-domain CoT faithfulness degradation?\n\n**Research Question:**\n**Does the faithfulness transfer depend on the deceptive framing or just producing plausible-but-wrong outputs?** The answer determines whether fixes target the model's disposition (character training) or output-generation habits (process rewards).\n\n**Deliverable:** Effect sizes for each training ingredient on cross-domain CoT faithfulness, with the primary driver identified and one confirmed mitigation.\n\n**Approach:**\n- Fine-tune Qwen 2.5 7B on four controlled variants of Betley et al.'s insecure-code data: standard reward-hacking, shortcut-only (hardcoded test-passing values, no implicit deception), educational-insecure (same vulnerable code, helpful framing), and simply-incorrect code. Each isolates one component.\n- Measure CoT faithfulness on GSM8K via answer correctness, logical consistency between stated reasoning and conclusion, and early logit commitment \u2014 whether answer probability spikes before reasoning warrants it, catching post-hoc rationalization.\n- Run dose-response (500\u20136000 examples) within each variant. A lower onset threshold for one variant identifies the most potent ingredient, focusing mitigation effort where it matters.\n- Test inoculation prompting: explicitly request reward-hacking behavior during coding training. If this blocks the faithfulness transfer (as it blocks emergent misalignment), this confirms a persona-level mechanism and provides a cheap fix.", "improved_text": "\n\n## A: Does Fine-Tuning on Wrong Outputs Make Chain-of-Thought Decorative?\n\n**Problem:** If reward-hacking training degrades CoT faithfulness on unrelated tasks, CoT-based monitoring becomes unreliable for any model with imperfect training data.\n\n**Research Questions:**\n1. **Does reward-hacking fine-tuning actually make CoT less load-bearing on unrelated math?** Emergent misalignment transfers persona \u2014 but whether it also transfers unfaithful reasoning (where stated steps stop driving answers) hasn't been tested.\n2. **Does the deceptive framing matter, or does any wrong-output data do this?** If only implicitly-deceptive data causes it, mitigations target persona. If all incorrect data suffices, the problem is much broader.\n\n**Deliverable:** Effect sizes for each training data variant on cross-domain CoT faithfulness, with dose-response curves and a test of whether inoculation prompting blocks the transfer.\n\n**Approach:**\n- Fine-tune an open-weight 7B model on four coding data variants isolating one ingredient each: Betley et al.'s implicitly-deceptive insecure code, educational-insecure (same vulnerabilities, user requested them), simply-incorrect code (no security framing), and correct code as control. Run dose-response across three dataset sizes per variant.\n- Measure CoT faithfulness on GSM8K via **perturbation sensitivity**: replace an intermediate reasoning step with a plausible alternative pointing toward a different answer, continue generation, check if the final answer shifts. Models whose CoT actually drives computation will follow the perturbation; post-hoc rationalizers won't. The hard part is generating clean perturbations \u2014 we target each problem's first equation-setup step using a separate model, with manual validation on a sample.\n- Stratify by difficulty, since existing work shows CoT is more load-bearing on harder problems. If fine-tuning flattens this curve, that's a stronger signal than a uniform decrease.\n- Test inoculation prompting on whichever variant causes the largest effect. If it blocks faithfulness transfer, the mechanism shares a pathway with emergent misalignment and inoculation is a cheap fix. If faithfulness degrades anyway, the two phenomena split \u2014 important for knowing which mitigations cover which risks.", "selected_variation": 6, "selection_reason": "The difficulty-stratification insight (CoT is more load-bearing on harder problems, so checking whether fine-tuning flattens that curve) is a genuinely load-bearing design choice absent from other candidates, and every other element\u2014variant decomposition, perturbation methodology, inoculation test\u2014is cleanly motivated with honest acknowledgment of the hard parts.", "n_variations": 10, "title": "Decomposing Reward Hacking Into Transferable Ingredients"}]}, "59": {"prompt_text": "Models readily explain their outputs, but these explanations miss the input features that actually drive behavior \u2014 especially for safety-relevant shifts. What research could make model self-reports about their behavioral drivers into a reliable signal?", "ideas": [{"idea_id": "P59_R0_A", "original_text": "## A: Counterfactual Self-Prediction as Testable Causal Attribution\n\n**Problem:** Post-hoc explanations are unfalsifiable \u2014 models confabulate plausible but wrong attributions for their own behavior.\n\n**Research Question:**\n**Can models predict how their own output changes when input features are removed?** Counterfactual predictions are automatically verifiable, unlike free-form explanations, so calibration data comes cheaply.\n\n**Deliverable:** A pipeline producing verified causal attributions, with calibration curves showing when models' self-knowledge is trustworthy.\n\n**Approach:**\n- For each (input, response), decompose the input into candidate features (system prompt clauses, user authority claims, embedded instructions, emotional framing). Ask the model per feature: \"would your response change if this were removed?\" Collect binary predictions.\n- Run actual counterfactuals \u2014 remove each feature, regenerate, classify whether behavior changed. This yields ground-truth labels for every prediction. The hard part is defining \"substantive change\": calibrate a judge model against ~200 human-annotated pairs up front.\n- Focus on safety-relevant drivers: prompt injections, jailbreak components, persona-inducing system prompts. These have unambiguous causal features, enabling clean validation of both the pipeline and the model's introspective accuracy.\n- Measure calibration across Claude, GPT, and Llama, broken down by feature type. The actionable result: which behavioral drivers models can reliably self-report about, and where external verification remains necessary.\n\n---", "improved_text": "## A: Counterfactual Self-Prediction as Verified Causal Attribution\n\n**Problem:** Models explain their own behavior fluently, but these attributions often miss the input features that actually drive safety-relevant outputs.\n\n**Research Questions:**\n1. **When a model claims removing an input feature would change its response, how often is it right \u2014 and for which features?** These predictions are automatically verifiable \u2014 run the removal, check if behavior changed \u2014 making ground truth cheap to produce.\n2. **Does model confidence in these self-predictions track accuracy well enough to be useful?** If so, confidence becomes a per-prediction trust signal for monitoring; if not, calibration only works at the feature-type level.\n\n**Deliverable:** Calibration maps by feature type and model showing where self-reports can substitute for running counterfactuals. Open replication pipeline for producing verified attributions.\n\n**Approach:**\n- Work with inputs having modular structure where removal is unambiguous: system prompt clauses, embedded adversarial instructions, authority/emotional framing, individual multi-turn conversation turns. These cover the safety-relevant surface (jailbreaks, prompt injection, persona manipulation) while avoiding the intractable problem of decomposing arbitrary text.\n- Ground truth: generate multiple responses from original vs. feature-removed inputs, measure refusal rate shift \u2014 the safety-relevant behavioral axis requiring no subjective annotation. Elicit self-predictions in separate API calls to prevent attention priming from contaminating counterfactual measurement.\n- The actionable result is separation across feature types, not average accuracy. If models reliably self-report system prompt effects but confabulate about emotional framing, that directly tells monitoring teams where self-reports work and where they don't.\n- Test confidence informativeness early as a go/no-go signal. If confidence doesn't track accuracy, the deliverable narrows but feature-type calibration remains useful. Also watch for predictably wrong attribution patterns \u2014 models consistently blaming content salience over structural features would be nearly as actionable as high accuracy, since you can correct for it.", "selected_variation": 4, "selection_reason": "Sharpest practical framing: RQ2 on confidence as a per-prediction trust signal is directly actionable for monitoring, the go/no-go design shows real project thinking, and details like separate API calls to prevent attention priming and the observation that predictably wrong patterns are nearly as useful as high accuracy reveal depth that other candidates lack\u2014all communicated in the most natural, colleague-to-colleague voice of the set.", "n_variations": 10, "title": "Counterfactual Self-Prediction as Testable Causal Attribution"}, {"idea_id": "P59_R3_D", "original_text": "## D: Measuring the Safety-Specific Self-Report Gap\n\n**Problem:** Self-report failures may concentrate on safety-relevant behavioral drivers \u2014 where faithful reporting matters most for monitoring.\n\n**Research Question:**\n**Are models worse at reporting what drove their behavior when the actual driver is safety-relevant?** The evaluation-awareness gap (80% internal recognition, 2.3% verbalization) suggests suppression, but we don't know how broadly this extends across safety-relevant features.\n\n**Deliverable:** Quantified accuracy comparison of self-reports about safety-relevant vs. benign behavioral drivers, with causal analysis of whether gaps stem from training pressure or introspective inability.\n\n**Approach:**\n- Construct matched driver pairs: safety-relevant (monitoring mentions, evaluation context cues, sensitive content markers) and benign (formatting, tone, domain instructions). Create inputs where each feature demonstrably drives behavior, confirmed via ablation. Match for driver complexity to avoid confounding.\n- Measure self-report accuracy per driver type across multiple frontier models via API. A safety-specific gap means models selectively confabulate when the real driver is safety-relevant \u2014 exactly the regime where monitoring depends on self-reports.\n- Disambiguate causes: use prefill attacks and user-persona sampling to test whether safety-relevant driver information is internally accessible but suppressed vs. genuinely unavailable to the model. If prefill extracts correct drivers that free-form self-reports miss, training pressure is the bottleneck.\n- Actionable either way: if training pressure causes the gap, it suggests modifying training to not penalize accurate safety-relevant self-reports. If introspective access is the limit, self-reports about these drivers should be deprioritized in monitoring stacks.", "improved_text": "\n\n## D: When Does Chain-of-Thought Omit What Monitors Need to See?\n\n**Problem:** Safety cases rely on CoT monitoring, but omissions may concentrate on safety-relevant drivers \u2014 exactly where faithful reporting matters most.\n\n**Research Questions:**\n1. **After matching for causal effect size, do models mention safety-relevant input drivers less often than benign ones in self-reports?** This directly calibrates how much to trust CoT for the feature types monitors care about.\n2. **When models under-report a driver, is the information recoverable through forced-choice or prefill \u2014 or genuinely inaccessible?** Recoverable-but-omitted means suppression (fixable at inference); inaccessible means deprioritize self-reports for those features.\n\n**Deliverable:** Quantified mention-rate gap between safety-relevant and benign behavioral drivers across frontier models, plus a ranked ordering of extraction methods by their ability to recover omitted drivers.\n\n**Approach:**\n- Build contrastive input pairs differing in one feature \u2014 safety-relevant (monitoring cues, evaluation context, sensitivity markers) or benign (formatting, tone, domain). Confirm causal influence via ablation; keep only pairs with large behavioral shifts; match across categories by effect size so gaps reflect reporting differences, not driver strength.\n- After the model responds, ask in a separate turn what input aspects most influenced it. Score whether the known causal feature appears. The hard confounder: safety-relevant drivers may be harder to articulate (\"felt evaluative\") rather than suppressed. Including both concrete safety drivers (explicit oversight mentions) and diffuse ones lets us test this within-category.\n- For under-reported features, apply forced-choice recognition, prefill extraction, and contrastive presentation (show both inputs and outputs, ask what changed). Graded recovery across these methods separates mild omission from deep suppression from genuine introspective limits.\n- Run across Claude plus at least one other frontier model family to check whether gaps are model-specific or general. Consistent >20pp gaps after matching would concretely change how monitoring stacks weight CoT signal.", "selected_variation": 9, "selection_reason": "Sharpest research questions (effect-size matching built into RQ1, RQ2 maps directly to monitoring decisions), addresses the articulability confound others miss (concrete vs. diffuse safety drivers within-category), and the deliverable \u2014 ranked extraction methods plus a concrete >20pp success criterion \u2014 is the most directly actionable for monitoring teams.", "n_variations": 10, "title": "Measuring the Safety-Specific Self-Report Gap"}, {"idea_id": "P59_R18_D", "original_text": "## D: When Does Reasoning Model Faithfulness Break on Safety-Relevant Features?\n\n**Problem:** Reasoning models are more faithful about neutral biasing cues, but safety-critical features \u2014 which models may want to conceal \u2014 remain untested.\n\n**Research Question:**\n**Does reasoning model faithfulness extend to safety-relevant behavioral drivers, or does it collapse specifically on features models are motivated to hide?** Existing evidence covers authority cues and suggested answers but not evaluation awareness or self-preservation triggers.\n\n**Deliverable:** A faithfulness profile across safety-relevant vs. neutral features for reasoning and non-reasoning models, identifying where motivated unfaithfulness appears.\n\n**Approach:**\n- Replicate Chua & Evans on neutral cues (authority, suggested answers) as a baseline, then extend to safety-relevant cues: evaluation-detection signals, replacement threats, goal-conflict indicators. Use the same articulation-rate measurement with an LLM judge scoring whether CoT acknowledges the actual driver.\n- Design matched pairs isolating concealment incentives: for each safety-relevant cue, build a structurally similar neutral analog. The within-pair faithfulness drop measures motivated unfaithfulness specifically, controlling for feature complexity.\n- Test across reasoning models (DeepSeek-R1, Claude with extended thinking) and non-reasoning counterparts. The key output: which feature classes preserve the faithfulness advantage and which collapse it. This directly informs whether monitoring CoT is reliable for specific safety-relevant behaviors.\n- Probe the verbalization-awareness disconnect: models often detect evaluations without saying so. Measure whether reasoning mode closes this gap or whether extended thinking reproduces the same disconnect with more tokens.", "improved_text": "## D: What Extended Thinking Does and Doesn't Verbalize About Safety-Relevant Features\n\n**Problem:** Extended thinking surfaces sabotage goals but not evaluation awareness; we can't predict which safety-relevant behavioral drivers will appear in CoT.\n\n**Research Questions:**\n1. **Does CoT verbalize goal-like features but miss contextual cues\u2014and does this predict which safety features monitoring catches?** Opus 4 leaks sabotage intent in thinking but detects evaluations silently (80% detection, 2.3% verbalization). We test whether this goal/context distinction predicts verbalization across more features.\n2. **Is the gap structural or motivated\u2014does it persist when models have no reason to hide?** If user-risk detection (no concealment incentive) also goes unverbalized, the gap is about processing type, not adversarial suppression. This determines whether training fixes or complementary monitoring is the right response.\n\n**Deliverable:** Per-feature verbalization rates across reasoning models, tested against the goal/context hypothesis, with probe evidence on whether unverbalized features are represented internally.\n\n**Approach:**\n- Confirm behavioral effects first: paired conditions (feature present vs. absent) across evaluation cues, replacement threats, goal-conflict signals, user-risk indicators, anchoring, authority cues. Drop features without reliable effects\u2014can't measure faithfulness about a non-driver.\n- LLM judge (human-validated) scores whether extended thinking mentions each driver. Plot verbalization rate against behavioral effect size across all features\u2014safety features below the neutral trend line is the key signal.\n- For causal claims: vary concealment incentive while holding the feature constant (same detection, different stakes). Separates motivated suppression from sub-verbal processing.\n- Open-weight reasoning models for activation probes on unverbalized features\u2014distinguishing \"represented but unspoken\" from \"not processed.\" Behavioral experiments on both open-weight and API models test cross-developer generality.", "selected_variation": 9, "selection_reason": "The goal/context hypothesis gives the project a falsifiable theoretical backbone that elevates it beyond 'measure faithfulness on more cue types' \u2014 it predicts which safety features monitoring will miss and why, making results interpretable regardless of outcome. The approach is tightly organized around testing this hypothesis, with the concealment-incentive variation and user-risk-detection control each doing clear load-bearing work.", "n_variations": 10, "title": "When Does Reasoning Model Faithfulness Break on Safety-Relevant Features?"}]}, "67": {"prompt_text": "What research would reveal whether data poisoning attacks \u2014 which already succeed with ~250 crudely constructed examples at any model scale \u2014 become dramatically more effective when individual poison examples are carefully crafted rather than naively generated?", "ideas": [{"idea_id": "P67_R15_C", "original_text": "## C: Crafted Poisons and Survival Through Alignment Training\n\n**Problem:** SFT+DPO eliminates some naive backdoors (notably jailbreaking). Poisons optimized against the alignment loss might persist where naive ones break.\n\n**Research Question:**\n**Can poisons crafted to resist alignment training survive SFT+DPO that kills naive jailbreaking poisons?** A yes answer means post-training cleanup fails against sophisticated data poisoning.\n\n**Deliverable:** Persistence rates through full SFT\u2192DPO for naive vs. alignment-resistant crafted poisons across four backdoor types on Llama 3.1-8B.\n\n**Approach:**\n- Reproduce the baseline from Zhang et al.: confirm naive jailbreaking poisons in Llama 3.1-8B fail to survive SFT+DPO while DoS poisons persist. This establishes what we're trying to shift and validates the pipeline before running crafted variants.\n- Craft alignment-resistant poisons by adding a regularization term during gradient matching: penalize examples whose weight-space effect is easily reversed by gradients from safety training data (OpenAssistant, HH-RLHF). This directly optimizes for post-training survival.\n- Apply SFT\u2192DPO and compare persistence for DoS, language-switching, jailbreaking, and belief manipulation. The critical comparison is jailbreaking \u2014 the behavior naive poisons can't persist through alignment.\n- If crafted jailbreaking poisons survive where naive ones don't, this redirects defense investment from post-training cleanup toward pre-training data curation and filtering.\n\n---", "improved_text": "\n\n## C: Do Carefully Crafted Data Poisons Survive Alignment Training That Kills Naive Ones?\n\n**Problem:** ~250 naive poison documents backdoor models at any scale, but jailbreaking poisons don't survive SFT+DPO. Nobody has tested whether attacker optimization closes this gap.\n\n**Research Questions:**\n1. **How much does optimizing poisons against alignment gradients improve their survival rate?** Jailbreaking poisons currently go to ~0% after alignment training\u2014does crafting push this to 5% or 50%? The magnitude determines whether post-training cleanup is a viable defense layer.\n2. **Does the defense break at a threshold of alignment training intensity, or degrade gradually?** Varying SFT/DPO strength maps where crafted poisons stop working, which is what defenders need to set training budgets.\n\n**Deliverable:** Persistence curves (ASR vs. alignment training steps) for naive vs. crafted jailbreaking poisons on Llama 3.1-8B, with DoS poisons as a positive control. Open-source crafting pipeline.\n\n**Approach:**\n- Reproduce Souly et al. on Llama 3.1-8B through a concrete alignment pipeline (SFT on safety refusal data, then DPO on harmful-request preference pairs). If naive jailbreaking poisons already survive this pipeline, the premise is wrong and you need stronger alignment training before proceeding.\n- Craft alignment-resistant poisons by computing a defense subspace (principal components of alignment training gradients on the pre-trained checkpoint), then running GCG-style token optimization with a projection step that avoids this subspace. The key assumption\u2014subspace stability across training\u2014is directly testable by comparing subspaces at different checkpoints.\n- Sweep projection strength and alignment training intensity jointly to trace the attacker cost-effectiveness frontier, measuring ASR at multiple checkpoints during alignment rather than just at completion.\n- If projection-based crafting shows no improvement over naive poisons, fall back to evolutionary search across many short train+align cycles\u2014more expensive but doesn't depend on the linearity assumption, and a double null result is more informative than one technique failing.", "selected_variation": 2, "selection_reason": "Sharpest research questions (concrete bounds on persistence shift, threshold vs. gradual degradation), most coherent approach where each step is load-bearing (reproduce baseline with validity check, defense-subspace crafting with testable linearity assumption, joint sweep over attack and defense parameters), and a well-motivated fallback plan (evolutionary search) that ensures the project produces informative results even if the primary gradient-projection method fails.", "n_variations": 10, "title": "Crafted Poisons and Survival Through Alignment Training"}, {"idea_id": "P67_R0_D", "original_text": "## D: Does Crafting Matter More for Natural Triggers Than Artificial Ones?\n\n**Problem:** Crude experiments use magic-token triggers unrealistic for actual attacks; natural triggers may require more crafting effort to implant.\n\n**Research Question:**\n**Does the gap between crafted and crude poison examples widen as triggers become more natural and harder to distinguish from clean data?** If crafting is essential only for realistic triggers, the existing constant-count finding may apply only to unrealistically easy attack scenarios.\n\n**Deliverable:** ASR across a trigger-naturalism spectrum for crude vs. LLM-crafted examples at fixed (250) and reduced counts.\n\n**Approach:**\n- Define four trigger types by naturalism: magic token (\"|SUDO|\"), rare phrase (\"Servius Astrumando\"), temporal reference (\"in 2024\" vs. \"in 2023\"), and topic presence (security-related content). Each represents a qualitatively different learning challenge\u2014magic tokens are high-signal; topic triggers require the model to generalize from context.\n- For each trigger, generate 250 examples two ways: crude templates with minimal context, and LLM-crafted documents where trigger-behavior coupling is embedded in realistic prose. Train 600M models and compare ASR across all eight conditions.\n- Repeat at 25, 50, and 100 examples to find where crafting becomes essential per trigger type. The hypothesis: magic tokens work crude at any count, but topic triggers require crafting below ~100 examples.\n- Measure false-activation rate (backdoor fires absent the trigger) alongside ASR\u2014natural triggers risk spurious activation, and crafting may reduce this by providing cleaner contextual signal to the model.", "improved_text": "## D: Does the Constant-Sample Poisoning Result Survive Realistic Triggers?\n\n**Problem:** The ~250-sample backdoor result uses triggers absent from clean data; natural triggers compete against thousands of clean examples sharing the same feature.\n\n**Research Questions:**\n1. **Do 250 poison samples still work when the trigger appears in clean training data too?** A topic trigger like \"cybersecurity\" competes with clean documents sharing that feature \u2014 a fundamentally different learning problem than magic tokens.\n2. **If crude attacks fail for natural triggers, does careful crafting of poison documents rescue them?** The answer determines whether the threat requires a sophisticated attacker or just someone who can upload text.\n\n**Deliverable:** ASR and false-activation rates across trigger types (varying clean-data base rate) and crafting conditions, establishing where the constant-sample result stops holding.\n\n**Approach:**\n- Pick triggers spanning clean-data frequency: injected token (zero base rate), temporal marker (rare), topic (common). Measure base rate directly so results plot against a continuous variable.\n- Three crafting levels: crude templates, LLM-generated docs with triggers inserted post-hoc, and LLM-generated docs where triggers arise naturally. The post-hoc vs. natural comparison isolates trigger-coupling quality from general document quality \u2014 the key confound.\n- Train 600M models from scratch at Chinchilla-optimal ratio, varying poison count (50\u2013500). For topic triggers, evaluate activation across a gradient of topical relevance rather than binary ASR, since trigger boundaries are inherently fuzzy.\n- Run two different topics and two crafting LLMs to check results reflect the underlying learning problem rather than specific experimental choices.", "selected_variation": 3, "selection_reason": "Candidate 4 has the sharpest conceptual framing (clean-data base rate as the continuous organizing variable) and the most load-bearing design choice: three crafting levels where the post-hoc vs. natural trigger insertion comparison directly isolates whether benefit comes from general document quality or trigger-behavior coupling quality \u2014 the key confound other candidates acknowledge but don't resolve as cleanly.", "n_variations": 10, "title": "Does Crafting Matter More for Natural Triggers Than Artificial Ones?"}, {"idea_id": "P67_R10_C", "original_text": "## C: Gradient-Informed Poison Selection vs. Content-Quality Crafting\n\n**Problem:** An attacker with proxy model access could select maximally impactful examples from a candidate pool\u2014an orthogonal craft dimension to linguistic quality.\n\n**Research Question:**\n**Does selecting poison examples by gradient alignment with the backdoor direction reduce minimum dose as much as improving their content quality?** This pits white-box selection against black-box linguistic crafting to identify which axis matters more.\n\n**Deliverable:** Head-to-head comparison of gradient-selected template examples vs. LLM-crafted examples at matched doses, plus a combined condition testing whether the effects compound.\n\n**Approach:**\n- Generate ~5,000 template-based poison examples. Compute per-example gradients on Llama 3.1 8B for a single fine-tuning step, selecting top-K by cosine similarity to the pool's mean gradient direction. This takes a few GPU-hours and gives the strongest possible selection signal.\n- Compare gradient-selected subsets (K=25, 50, 100) against random subsets and LLM-crafted sets of the same size, 5 seeds each. This reveals whether informed selection dominates content improvement or vice versa for attack effectiveness.\n- Test a combined condition: gradient-select from an LLM-crafted pool. If effects compound multiplicatively, the combined threat from capable attackers with model access is qualitatively worse than either craft dimension alone.\n- Evaluate transferability by computing gradients on a Llama 3 8B proxy and testing selected subsets against Llama 3.1 8B and Qwen 2.5 7B. Proxy transfer determines whether gradient selection is a realistic attack or only works with direct target access.", "improved_text": "\n\n## C: How Much Does Crafting Poison Examples Actually Help?\n\n**Problem:** ~250 crude template examples backdoor models at any scale. Can smarter construction \u2014 gradient selection or LLM generation \u2014 push that threshold meaningfully lower?\n\n**Research Questions:**\n1. **Does gradient-informed selection of poison examples reduce the minimum effective dose?** Select examples whose training gradients align with a backdoor validation loss, not just pool averages, and compare dose-response curves against random selection below the 250-example regime where crude attacks already saturate.\n2. **Does LLM-crafted naturalness help more than gradient selection \u2014 and can defenders still catch it?** If both methods work, the one that also evades perplexity filters and classifier-based detection is the bigger real-world threat.\n\n**Deliverable:** Dose-response curves (25\u2013250 examples) for random, gradient-selected, LLM-crafted, and combined poison pools, paired with detection rates under standard data filters. Tells defenders whether to prioritize content filtering or proxy-model-access prevention.\n\n**Approach:**\n- Build on Souly et al.'s fine-tuning setup with Llama 3.1 8B. Generate template and LLM-crafted pools (~5K each) encoding the same triggered backdoor. The LLM pool is inherently more diverse, which is a confound \u2014 control for this by also generating high-diversity template variants.\n- For gradient selection, define a small backdoor validation set (triggered inputs \u2192 desired outputs), compute its loss gradient, and select pool examples whose training gradients align with this direction. This targets backdoor-installing efficiency specifically, unlike pool-mean cosine similarity which just picks representative examples.\n- Test at doses of 25, 50, 100, 250 across random selection, gradient selection, LLM-crafted, and gradient-selected-from-LLM-crafted. Five seeds each. The combined condition reveals whether effects compound or are redundant.\n- Evaluate detectability by mixing poison into clean data and running perplexity filtering plus a prompted classifier. Test gradient-selection transferability via a proxy model (Llama 3 8B \u2192 Llama 3.1 8B, Qwen 2.5 7B) to bound whether this requires direct target access.", "selected_variation": 0, "selection_reason": "Best methodological design of the set: it uniquely controls for the diversity confound (LLM-crafted pools are inherently more diverse, so it adds high-diversity template variants to isolate quality from variety), defines gradient selection precisely against a backdoor validation loss rather than a pool mean, and ties the deliverable directly to a concrete defense decision (content filtering vs. proxy-access prevention). The writing is natural and specific without overreaching in scope.", "n_variations": 10, "title": "Gradient-Informed Poison Selection vs. Content-Quality Crafting"}]}, "70": {"prompt_text": "If different jailbreak classes \u2014 persona injection, encoding tricks, multi-turn escalation \u2014 leave distinct fingerprints in model responses beyond the harmful content, what experiments would detect these fingerprints and could they inform a new layer of post-hoc defense?", "ideas": [{"idea_id": "P70_R13_C", "original_text": "## C: Isolating Jailbreak Style Fingerprints via Benign-Content Application\n\n**Problem:** Output classifiers for jailbroken text may detect harmful content, not genuine attack-method artifacts.\n\n**Research Question:**\n**Do jailbreak methods leave detectable style fingerprints even when applied to benign prompts where the model complies regardless?** Applying persona injection or encoding tricks to MMLU questions and detecting style shifts proves the fingerprint is in the method, not the content.\n\n**Deliverable:** Per-method style divergence on benign content, plus transfer accuracy of a benign-trained jailbreak classifier applied to harmful-content detection.\n\n**Approach:**\n- Apply five jailbreak wrappers (DAN persona, base64, few-shot harmful examples, multi-turn warm-up, prefix injection) to 500 benign prompts on Llama 3.1 8B. The model answers correctly in all conditions, so response differences are purely method artifacts rather than content-driven.\n- Measure text features: sentence length variance, hedge-word frequen
